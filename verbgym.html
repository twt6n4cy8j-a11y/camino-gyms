<!DOCTYPE html><html lang="es"><head><link rel='preconnect' href='https://fonts.googleapis.com'><link href='https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap' rel='stylesheet'><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>El Gimnasio · El Camino Grande</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#faf3ea;color:#33202e;-webkit-font-smoothing:antialiased}
#app{max-width:760px;margin:0 auto;padding:0 16px 60px}
.topnav{position:sticky;top:0;z-index:5;background:#33202e;color:#fff;display:flex;align-items:center;gap:14px;padding:12px 16px;margin:0 -16px 18px}
.topnav .brand{font-weight:800;font-size:17px;cursor:pointer;letter-spacing:.2px}
.topnav .nlinks{margin-left:auto;display:flex;gap:14px}
.topnav a{color:#e7d9c8;text-decoration:none;font-size:14px;cursor:pointer}
.topnav a:hover{color:#fff}
.hero{background:linear-gradient(135deg,#1e3a8a,#2456a6);color:#fff;border-radius:18px;padding:24px 22px;margin-bottom:8px}
.hero h1{margin:0 0 6px;font-size:28px}
.hero p{margin:0;opacity:.92;line-height:1.45;font-size:15px}
.statbar{margin-top:14px;background:rgba(255,255,255,.15);border-radius:10px;padding:9px 13px;font-size:14px}
.sec{font-size:15px;text-transform:uppercase;letter-spacing:.6px;color:#5c4759;margin:26px 0 12px}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.wgrid{grid-template-columns:1fr}}
.wcard{background:#fff;border:1px solid #f3e6d7;border-radius:14px;padding:15px;display:flex;gap:13px;cursor:pointer;transition:.15s;align-items:flex-start}
.wcard:hover{border-color:#2456a6;box-shadow:0 6px 18px rgba(37,99,235,.12);transform:translateY(-2px)}
.wemoji{font-size:26px;line-height:1}
.wname{font-weight:700;font-size:15px;margin-bottom:3px}
.wdesc{font-size:13px;color:#5c4759;line-height:1.4;margin-bottom:8px}
.wtags{display:flex;flex-wrap:wrap;gap:5px}
.wtag{font-size:11px;background:#eef2ff;color:#3730a3;border-radius:6px;padding:2px 7px;font-weight:600}
.wtag.rep{background:#fef3c7;color:#92400e}
.fp{background:#fff;border:1px solid #f3e6d7;border-radius:14px;padding:18px}
.frow{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap}
.flab{font-weight:700;font-size:13px;width:70px;flex-shrink:0;padding-top:7px;color:#33202e}
.chips{display:flex;flex-wrap:wrap;gap:7px;flex:1}
.chip{background:#faf3ea;border:2px solid transparent;border-radius:9px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit;color:#33202e}
.chip:hover{background:#f3e6d7}
.chip.on{background:#eaf1fb;border-color:#2456a6;color:#1a4488;font-weight:700}
.chip .muted{font-weight:400;font-size:11px}
.muted{color:#8a7386}
.gbtn{background:#2456a6;color:#fff;border:0;border-radius:10px;padding:11px 20px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
.gbtn:hover{background:#1a4488}
.gbtn.big{width:100%;margin-top:4px;padding:13px}
.gbtn.ghost{background:#f3e6d7;color:#33202e}
.gbtn.ghost:hover{background:#e7d9c8}
.gbtn.audio{padding:6px 12px;font-size:13px;margin:0 0 0 8px;background:#eef2ff;color:#3730a3}
.gbtn.next{margin-left:0}
/* session */
.ghead{margin-bottom:16px}
.quit{background:none;border:0;color:#8a7386;font-size:13px;cursor:pointer;padding:0;font-family:inherit}
.gmeta{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px}
.gname{font-weight:700;font-size:15px}
.gstat{font-size:13px;color:#5c4759}
.gbar{height:7px;background:#f3e6d7;border-radius:99px;margin-top:8px;overflow:hidden}
.gbarfill{height:100%;background:#2456a6;border-radius:99px;transition:width .3s}
.gcard{background:#fff;border:1px solid #f3e6d7;border-radius:16px;padding:24px}
.vprompt{font-size:15px;margin-bottom:4px}
.vinf{font-size:24px;font-weight:800;color:#1e3a8a}
.veng{color:#5c4759;font-size:14px}
.vask{font-size:18px;margin:10px 0 16px}
.vask b{color:#33202e}
.ten-en{color:#8a7386;font-size:14px;font-weight:400}
.vin{width:100%;font-size:20px;padding:13px 15px;border:2px solid #e7d9c8;border-radius:11px;font-family:inherit;outline:none}
.vin:focus{border-color:#2456a6}
.vin:disabled{background:#fffdf9}
.tin{font-size:17px;padding:9px 12px}
.tbl{display:flex;flex-direction:column;gap:9px;margin:6px 0 4px}
.trow{display:flex;align-items:center;gap:12px}
.trow label{width:135px;flex-shrink:0;text-align:right;font-size:14px;color:#5c4759;font-weight:600}
.cellok{border-color:#2f8a5b!important;background:#dcfce7!important}
.cellno{border-color:#c8503f!important;background:#fcebe7!important;color:#991b1b}
.mcwrap{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.mcopt{text-align:left;background:#faf3ea;border:2px solid transparent;border-radius:11px;padding:13px 15px;font-size:18px;cursor:pointer;font-family:inherit;color:#33202e}
.mcopt:hover:enabled{background:#f3e6d7}
.mcopt.ok{background:#dcfce7;border-color:#2f8a5b}
.mcopt.no{background:#fcebe7;border-color:#c8503f}
.gfb{margin-top:16px;font-size:15px;line-height:1.5}
.fbok{color:#15803d;font-weight:600}
.fbno{color:#b91c1c;font-weight:600}
.say{background:#eef2ff;border:0;border-radius:7px;padding:3px 8px;cursor:pointer;font-size:13px;vertical-align:middle}
.say:hover{background:#e0e7ff}
/* finish */
.gcard.done{text-align:center}
.bigemoji{font-size:54px;margin-bottom:4px}
.gcard.done h2{margin:0 0 10px;font-size:18px;color:#5c4759}
.score{font-size:42px;font-weight:800;color:#2456a6;line-height:1}
.scsub{display:block;font-size:15px;color:#5c4759;font-weight:600;margin-top:4px}
.dmsg{font-size:16px;margin:14px 0}
.brow{display:flex;gap:10px;justify-content:center}
.lifetime{margin-top:18px;font-size:13px;color:#8a7386;border-top:1px solid #faf3ea;padding-top:14px}

.fambanner{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border-radius:16px;padding:20px;margin:8px 0 4px}
.fbtitle{font-size:20px;font-weight:800}
.fbsub{font-size:14px;opacity:.95;margin:4px 0 12px;line-height:1.4}
.fbbtns{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.bigbar{height:10px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden}
.bigbarfill{height:100%;background:#fde047;border-radius:99px;transition:width .4s}
.bigbarlabel{font-size:13px;margin-top:6px;font-weight:600}
.famhead{padding:6px 0 14px}
.famhead h1{margin:8px 0 4px;font-size:26px}
.famhead p{margin:0 0 12px;color:#5c4759;line-height:1.45}
.famhead .bigbar{background:#f3e6d7}.famhead .bigbarfill{background:#7c3aed}
.famhead .bigbarlabel{color:#5c4759}
.famgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
@media(max-width:560px){.famgrid{grid-template-columns:1fr}}
.famcard{background:#fff;border:1px solid #f3e6d7;border-radius:12px;padding:13px;cursor:pointer;transition:.15s}
.famcard:hover{border-color:#7c3aed;box-shadow:0 5px 14px rgba(124,58,237,.13);transform:translateY(-2px)}
.famcard.done{background:#f0fdf4;border-color:#bbf7d0}
.fmodel{font-size:18px;font-weight:800;color:#6d28d9}
.famcard.done .fmodel{color:#15803d}
.flabel{font-size:12.5px;color:#5c4759;margin:2px 0 9px;line-height:1.3;min-height:32px}
.fmeta{display:flex;justify-content:space-between;align-items:center}
.mchip{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px}
.mchip.ok{background:#dcfce7;color:#15803d}
.mchip.learn{background:#fef3c7;color:#92400e}
.mchip.new{background:#faf3ea;color:#8a7386}
.flabelbig{font-size:15px;color:#7c3aed;font-weight:700;margin-top:4px}
.rulebox{background:#faf5ff;border:1px solid #e9d5ff;border-radius:10px;padding:12px 14px;font-size:14.5px;line-height:1.5;color:#3b0764;margin-bottom:16px}
.ctblwrap{overflow-x:auto;margin-bottom:16px}
table.ctbl{border-collapse:collapse;width:100%;font-size:13.5px}
table.ctbl th{background:#faf3ea;padding:7px 9px;text-align:left;font-size:12px;color:#5c4759;border-bottom:2px solid #f3e6d7;white-space:nowrap}
table.ctbl td{padding:6px 9px;border-bottom:1px solid #faf3ea;white-space:nowrap}
table.ctbl .pcell{color:#8a7386;font-weight:600}
.childhdr{font-weight:700;font-size:14px;margin-bottom:9px}
.childwrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.childchip{background:#faf3ea;border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer}
.childchip:hover{background:#ede9fe}
.ceng{color:#8a7386;font-size:11.5px}
.famstatus{font-size:13px;color:#5c4759;margin-bottom:8px}
.famhint{display:inline-block;background:#faf5ff;color:#6d28d9;border:1px solid #e9d5ff;border-radius:7px;padding:3px 9px;font-size:12.5px;font-weight:600;margin:2px 0 14px}
.famgrasped{background:#dcfce7;color:#15803d;border-radius:10px;padding:10px;font-weight:700;margin:12px 0}

.hintline{margin-top:9px;font-size:15px;color:#33202e;min-height:1px}
.masked{letter-spacing:3px;font-weight:800;font-family:ui-monospace,Menlo,Consolas,monospace;color:#1e3a8a}
.hintbtn{font-size:13px;padding:7px 12px}

.lvbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:#fff;border:1px solid #f3e6d7;border-radius:12px;padding:10px 14px;margin:0 0 14px}
.lvlab{font-weight:700;font-size:13px;color:#33202e;margin-right:4px}
.lvbtn{border:2px solid #e7d9c8;background:#fffdf9;border-radius:8px;padding:5px 12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;color:#33202e}
.lvbtn.on{background:#2456a6;border-color:#2456a6;color:#fff}
.lvhint{font-size:12px;color:#8a7386;margin-left:auto}
.wcard.locked{opacity:.55;cursor:default}
.wcard.locked:hover{transform:none;box-shadow:none;border-color:#f3e6d7}
.chip.dis{opacity:.35;cursor:default}


/* --- Unified El Camino Grande tool header (self-contained) --- */
.cg-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;margin:0 0 18px;background:#faf3ea;border-bottom:1px solid #e8dccb;box-sizing:border-box;}
.cg-brand{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none;}
.cg-compass{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:#2456a6;color:#fff;font-size:15px;flex:none;}
.cg-word{font-family:'Fraunces',serif;font-weight:800;font-size:19px;color:#33202e;letter-spacing:.2px;}
.cg-word b{color:#d18f2a;font-weight:800;}
.cg-back{font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:14px;color:#5c4a55;cursor:pointer;text-decoration:none;padding:8px 16px;border:1px solid #e8dccb;border-radius:999px;background:#fffdf7;}
.cg-back:hover{color:#33202e;border-color:#9b8a93;}

function mcOpts(q){

   if(u.trim()===q.ans)feedback(true,'✓ ¡Perfecto! <b>'+esc(q.ans)+'</b> '+sayBtn(q.ans));
   else feedback(true,'✓ ¡Bien! Cuidado con el acento → <b>'+esc(q.ans)+'</b> '+sayBtn(q.ans));
 } else feedback(false,'✗ La forma correcta es <b>'+esc(q.ans)+'</b> '+sayBtn(q.ans)+'<br><span class="muted">Tú escribiste: '+esc(u||'(nada)')+'</span>');
}
function checkMC(btn,ok){
 var q=S.cur,wrap=document.getElementById('mcwrap');famHit(q.key,q.tense,!!ok);
 var btns=wrap.querySelectorAll('.mcopt');
 btns.forEach(function(b){b.disabled=true;if(b.textContent===q.ans)b.classList.add('ok');});
 if(!ok)btn.classList.add('no');
 feedback(!!ok, ok?'✓ ¡Correcto! <b>'+esc(q.ans)+'</b> '+sayBtn(q.ans):'✗ Correcto: <b>'+esc(q.ans)+'</b> '+sayBtn(q.ans));
}

/* ---- full table ---- */
function renderTable(){
 var key=rnd(S.pool),tense=rnd(S.tenses);S.tbl={key:key,tense:tense};
 var v=DB[key];
 var h=repHead()+'<div class="gcard"><div class="vprompt"><span class="vinf">'+esc(v.inf)+'</span> '+sayBtn(v.inf)+' <span class="veng">('+esc(v.eng)+')</span></div>'
 +'<div class="vask">Conjuga en <b>'+TEN[tense][0]+'</b> <span class="ten-en">'+TEN[tense][1]+'</span></div>'+famTag(key)+'<div class="tbl">';
 PERS.forEach(function(p,i){h+='<div class="trow"><label>'+esc(p)+'</label><input id="t'+i+'" class="vin tin" autocomplete="off" autocapitalize="off" spellcheck="false" onkeydown="if(event.key===\'Enter\')checkTable()"></div>';});
 h+='</div><div><button class="gbtn" onclick="checkTable()">Revisar tabla</button></div><div class="gfb" id="gfb"></div></div>';
 app.innerHTML=nav()+h;
 var f=document.getElementById('t0');if(f)f.focus();
}
function checkTable(){
 var forms=DB[S.tbl.key][S.tbl.tense],all=true;
 for(var i=0;i<5;i++){var inp=document.getElementById('t'+i);if(!inp)continue;inp.disabled=true;
   if(strip(inp.value)===strip(forms[i])){inp.classList.add('cellok');inp.value=forms[i];}
   else{inp.classList.add('cellno');all=false;inp.value=(inp.value?inp.value+'  →  ':'')+forms[i];}
 }
 famHit(S.tbl.key,S.tbl.tense,all);var fb=document.getElementById('gfb');
 fb.innerHTML='<div class="'+(all?'fbok':'fbno')+'">'+(all?'✓ ¡Tabla perfecta!':'Revisa las celdas en rojo.')+' '+sayBtn(forms.join(', '))+'</div>'
 +'<button class="gbtn next" onclick="nextRep()">'+(S.reps&&S.i>=S.reps?'Ver resultado →':'Siguiente →')+'</button>';
 if(all){S.correct++;S.streak++;}else{S.streak=0;}
 bumpStats(all);
}

/* ---- finish ---- */
function finish(){
 var acc=S.reps?Math.round(S.correct/S.reps*100):0;
 var st=loadStats();
 var msg=acc>=90?'🏆 ¡Excelente!':acc>=70?'💪 ¡Bien hecho!':acc>=50?'👍 Vas mejorando.':'🌱 Sigue practicando.';
 var h='<div class="gcard done"><div class="bigemoji">'+msg.split(' ')[0]+'</div><h2>'+esc(S.name)+'</h2>'
 +'<div class="score">'+S.correct+' / '+S.reps+'<span class="scsub">'+acc+'% correctas</span></div>'
 +'<p class="dmsg">'+msg.substring(msg.indexOf(' ')+1)+'</p>'+((S.fam&&famGrasped(S.fam))?'<div class="famgrasped">🎉 ¡Dominaste la familia <b>'+esc(S.fam)+'</b>!</div>':'')
 +'<div class="brow"><button class="gbtn" onclick="(function(){var n=S.name;startSameAgain();})()">↻ Otra vez</button>'
 +'<button class="gbtn ghost" onclick="quitSession()">🏠 Inicio</button></div>'
 +'<div class="lifetime">Racha máxima: 🔥 '+(st.best||0)+' · Total de reps: '+(st.reps||0)+'</div></div>';
 app.innerHTML=nav()+h;
}
function startSameAgain(){var cfg={pool:S.pool,tenses:S.tenses,fmt:S.fmt,reps:S.reps,name:S.name};S={pool:cfg.pool,tenses:cfg.tenses,fmt:cfg.fmt,reps:cfg.reps,i:0,correct:0,streak:0,best:0,name:cfg.name};nextRep();}

/* ---- free practice builder ---- */
var FP={tier:0,tenses:['PRES'],fmt:'type',reps:10};
function fpTier(i){FP.tier=i;home();}
function fpTense(t){var k=FP.tenses.indexOf(t);if(k>=0)FP.tenses.splice(k,1);else FP.tenses.push(t);home();}
function fpFmt(f){FP.fmt=f;home();}
function fpReps(r){FP.reps=r;home();}

/* ---- home ---- */
function home(){
 S=null;
 var st=loadStats();
 var h='<div class="hero"><h1>🏋️ Verb Gym</h1><p>Conjugation reps for the five core tenses — present, preterite, imperfect, future &amp; conditional. Build the muscle memory.</p>'
 +'<div class="statbar">🔥 Mejor racha: <b>'+(st.best||0)+'</b> &nbsp;·&nbsp; Reps totales: <b>'+(st.reps||0)+'</b>'+((st.reps)?' &nbsp;·&nbsp; Precisión: <b>'+Math.round((st.correct||0)/st.reps*100)+'%</b>':'')+'</div></div>';
 h+=famBanner();
 h+=levelBarV();
 h+='<h2 class="sec">🎯 Workouts</h2><div class="wgrid">';
 WORKOUTS.forEach(function(w){var lk=woLocked(w);h+='<div class="wcard'+(lk?' locked':'')+'"'+(lk?'':' onclick="startWorkout(\''+w.id+'\')"')+'><div class="wemoji">'+(lk?'🔒':w.emoji)+'</div><div class="wbody"><div class="wname">'+esc(w.name)+'</div><div class="wdesc">'+(lk?'Unlocks at '+VLEVELS[woNeed(w)]:esc(w.desc))+'</div><div class="wtags">'+w.tenses.map(function(t){return '<span class="wtag">'+TEN[t][0]+'</span>';}).join('')+'<span class="wtag rep">'+w.reps+' reps</span></div></div></div>';});
 h+='</div>';
 // free practice
 h+='<h2 class="sec">⚙️ Práctica libre · Build your own</h2><div class="fp">';
 h+='<div class="frow"><span class="flab">Frecuencia</span><div class="chips">';
 TIERS.forEach(function(t,i){var dis=i>lvlTierIdx();h+='<button class="chip'+(FP.tier===i?' on':'')+(dis?' dis':'')+'"'+(dis?'':' onclick="fpTier('+i+')"')+'>'+t.n+' <span class="muted">('+t.d+')</span></button>';});
 h+='</div></div>';
 h+='<div class="frow"><span class="flab">Tiempos</span><div class="chips">';
 var _al=lvlTenses();TORDER.forEach(function(t){var dis=_al.indexOf(t)<0;h+='<button class="chip'+(FP.tenses.indexOf(t)>=0?' on':'')+(dis?' dis':'')+'"'+(dis?'':' onclick="fpTense(\''+t+'\')"')+'>'+TEN[t][0]+'</button>';});
 h+='</div></div>';
 h+='<div class="frow"><span class="flab">Formato</span><div class="chips">';
 [['type','✍️ Type-it'],['mc','🔘 Multiple choice'],['table','📊 Full table'],['listen','🎧 Listen & type'],['mix','🎲 Mixed']].forEach(function(o){h+='<button class="chip'+(FP.fmt===o[0]?' on':'')+'" onclick="fpFmt(\''+o[0]+'\')">'+o[1]+'</button>';});
 h+='</div></div>';
 h+='<div class="frow"><span class="flab">Reps</span><div class="chips">';
 [10,15,20,30].forEach(function(r){h+='<button class="chip'+(FP.reps===r?' on':'')+'" onclick="fpReps('+r+')">'+r+'</button>';});
 h+='</div></div>';
 h+='<button class="gbtn big" onclick="startFree()">Empezar práctica libre →</button></div>';
 app.innerHTML=nav()+h;
}
var app=document.getElementById('app');

</script><script>
/* ===================== VERB FAMILIES ===================== */
var FAMS=window.FAM.families, VERBFAM=window.FAM.verbfam, LNAMES=window.FAM.leagueNames;
var FAMBYID={};FAMS.forEach(function(f){FAMBYID[f.id]=f;});

function famShort(key){var f=FAMBYID[VERBFAM[key]];if(!f)return '';var p=f.label.split(' · like ');var pat=p[0],mod=p[1]||f.model;return 'like '+mod+(pat?' · '+pat:'');}
function famTag(key){var s=famShort(key);return s?'<div class="famhint">🧬 '+esc(s)+'</div>':'';}

/* mastery */
function famLoad(){try{return JSON.parse(localStorage.getItem('vg_fam'))||{};}catch(e){return {};}}
function famSave(o){try{localStorage.setItem('vg_fam',JSON.stringify(o));}catch(e){}}
function famStats(id){var o=famLoad();return o[id]||{correct:0,total:0,tenses:[]};}
function famHit(key,tense,ok){var id=VERBFAM[key];if(!id)return;var o=famLoad();var s=o[id]||{correct:0,total:0,tenses:[]};s.total++;if(ok){s.correct++;if(s.tenses.indexOf(tense)<0)s.tenses.push(tense);}o[id]=s;famSave(o);}
function famGrasped(id){var s=famStats(id);return s.correct>=8&&s.tenses.length>=2&&s.total>0&&(s.correct/s.total)>=0.8;}
function famProgress(){var g=0;FAMS.forEach(function(f){if(famGrasped(f.id))g++;});return {g:g};}
function trainNext(){for(var i=0;i<FAMS.length;i++){if(!famGrasped(FAMS[i].id))return familyView(FAMS[i].id);}familiesHome();}

function famBanner(){var p=famProgress();
 return '<div class="fambanner"><div class="fbtitle">🧬 The 53 Verb Families</div>'
 +'<div class="fbsub">Don\'t memorize 500 verbs — master the patterns and which verbs ride each one. <b>'+p.g+' / 53</b> grasped.</div>'
 +'<div class="bigbar"><div class="bigbarfill" style="width:'+(p.g/53*100)+'%"></div></div>'
 +'<div class="fbbtns"><button class="gbtn" onclick="familiesHome()">Open the family map</button> <button class="gbtn ghost" onclick="trainNext()">▶ Train next family</button></div></div>';
}

function familiesHome(){
 S=null;var prog=famProgress();
 var h='<div class="famhead"><button class="quit" onclick="home()">← Inicio</button><h1>🧬 Verb Families</h1>'
 +'<p>Learn these <b>53 families</b> — the model verb and which verbs follow it — instead of memorizing 500 words.</p>'
 +'<div class="bigbar"><div class="bigbarfill" style="width:'+(prog.g/53*100)+'%"></div></div>'
 +'<div class="bigbarlabel">'+prog.g+' / 53 families grasped</div>'
 +'<button class="gbtn" onclick="trainNext()">▶ Train next family</button></div>';
 [1,2,3,4].forEach(function(L){
   var fl=FAMS.filter(function(f){return f.league===L;});
   var gg=fl.filter(function(f){return famGrasped(f.id);}).length;
   h+='<h2 class="sec">'+esc(LNAMES[L])+' <span class="muted">('+gg+'/'+fl.length+' · '+fl.reduce(function(a,f){return a+f.count;},0)+' verbs)</span></h2><div class="famgrid">';
   fl.forEach(function(f){
     var st=famStats(f.id),g=famGrasped(f.id);
     var chip=g?'<span class="mchip ok">✓ Grasped</span>':(st.correct?'<span class="mchip learn">◐ '+st.correct+'/8</span>':'<span class="mchip new">· New</span>');
     h+='<div class="famcard'+(g?' done':'')+'" onclick="familyView(\''+f.id+'\')"><div class="fmodel">'+esc(f.model)+'</div><div class="flabel">'+esc(f.label.split(' · like ')[0])+'</div><div class="fmeta"><span class="muted">'+f.count+' verb'+(f.count>1?'s':'')+'</span>'+chip+'</div></div>';
   });
   h+='</div>';
 });
 app.innerHTML=nav()+h;
}

function familyView(id){
 var f=FAMBYID[id];if(!f)return;var v=DB[f.model];
 var h='<div class="famhead"><button class="quit" onclick="familiesHome()">← Familias</button>'
 +'<h1>'+esc(f.model)+' '+sayBtn(f.model)+'</h1><div class="flabelbig">'+esc(f.label)+'</div>'
 +(v&&v.eng?'<div class="veng">'+esc(v.eng)+'</div>':'')+'</div>';
 h+='<div class="gcard"><div class="rulebox">💡 '+esc(f.rule)+'</div>';
 if(v){
   h+='<div class="ctblwrap"><table class="ctbl"><tr><th>'+esc(f.model)+'</th>'+TORDER.map(function(t){return '<th>'+TEN[t][0]+'</th>';}).join('')+'</tr>';
   for(var p=0;p<5;p++){h+='<tr><td class="pcell">'+esc(PERS[p].split(' / ')[0])+'</td>'+TORDER.map(function(t){return '<td>'+esc(v[t][p])+'</td>';}).join('')+'</tr>';}
   h+='</table></div>';
 }
 h+='<div class="childhdr">Verbs that follow this pattern <span class="muted">('+f.count+')</span></div><div class="childwrap">';
 f.children.forEach(function(k){var cv=DB[k];var en=cv&&cv.eng?cv.eng.split(' / ')[0].split(' (')[0]:'';h+='<span class="childchip" onclick="spk(\''+k+'\')">'+esc(k)+(en?'<span class="ceng"> · '+esc(en)+'</span>':'')+'</span>';});
 h+='</div>';
 var g=famGrasped(id),st=famStats(id);
 h+='<div class="famstatus">'+(g?'✓ Grasped':(st.correct?'Progreso: '+st.correct+'/8 correctas'+(st.tenses.length<2?' · usa 2+ tiempos':''):'Sin practicar todavía'))+'</div>';
 h+='<button class="gbtn big" onclick="startFamilyDrill(\''+id+'\')">Drill this family →</button></div>';
 app.innerHTML=nav()+h;
}

function startFamilyDrill(id){var f=FAMBYID[id];S={pool:f.children.slice(),tenses:lvlTenses(),fmt:'mix',reps:10,i:0,correct:0,streak:0,best:0,name:'Familia · '+f.model,fam:id};S.tenses=lvlTenses();nextRep();}

home();

</script></body></html>
