 var list=RD.filter(function(r){return r.level===LV;});
 h+='<div class="rgrid">';
 list.forEach(function(r){h+='<div class="rcard" onclick="openReading(\''+r.id+'\')"><div class="rtitle">'+esc(r.title)+(readDone(r.id)?' <span class="rdone">✓</span>':'')+'</div><div class="rsub">'+esc(r.titleEn)+'</div><div class="rmeta"><span class="rlv">'+r.level+'</span> <span class="muted">'+r.s.length+' sentences · '+r.q.length+' questions</span></div></div>';});
 h+='</div>';
 app.innerHTML=nav()+h;window.scrollTo&&window.scrollTo(0,0);
}
function wordize(sent){return sent.replace(/([A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+)/g,function(m){return '<span class="rw" onclick="gw(this)">'+m+'</span>';});}
function openReading(id){CUR=RD.filter(function(r){return r.id===id;})[0];if(!CUR)return;CURGLOSS=CUR.gloss;SHOWEN=false;renderReader();}
function renderReader(){
 var h='<div class="rhead"><button class="quit" onclick="home()">← Lecturas</button><h1>'+esc(CUR.title)+'</h1><div class="rsub2">'+esc(CUR.titleEn)+' · '+CUR.level+'</div>'
 +'<div class="rtools"><button class="gbtn" onclick="playAll()">🔊 Escuchar todo</button> <button class="gbtn ghost" onclick="toggleEn()">'+(SHOWEN?'Ocultar inglés':'🔤 Mostrar inglés')+'</button> <button class="gbtn ghost" onclick="openRSVP()">⚡ Lectura rápida</button></div></div>';
 h+='<div class="gcard read">';
 CUR.s.forEach(function(p,i){h+='<div class="sline"><span class="spk2" onclick="spk(\''+p[0].replace(/'/g,'')+'\')">🔊</span> <span class="estxt">'+wordize(p[0])+'</span>'+(SHOWEN?'<div class="entxt">'+esc(p[1])+'</div>':'')+'</div>';});
 h+='</div>';
 h+='<div class="glossbar" id="glossbar">👆 Tap any word to see its meaning</div>';
 h+='<button class="gbtn big" onclick="startQuiz()">Comprensión ('+CUR.q.length+' preguntas) →</button>';
 app.innerHTML=nav()+h;window.scrollTo&&window.scrollTo(0,0);
}
function gw(el){var w=el.textContent.toLowerCase();var g=CURGLOSS[w]||'—';
 document.querySelectorAll('.rw.hl').forEach(function(x){x.classList.remove('hl');});el.classList.add('hl');
 var gb=document.getElementById('glossbar');if(gb)gb.innerHTML='<b>'+esc(el.textContent)+'</b> — '+esc(g)+' <button class="say" onclick="spk(\''+w.replace(/'/g,'')+'\')">🔊</button>';}
function toggleEn(){SHOWEN=!SHOWEN;renderReader();}
function playAll(){spk(CUR.s.map(function(p){return p[0];}).join(' '));}

var QZ=null;
function startQuiz(){QZ={i:0,correct:0,q:CUR.q.slice()};quizRender();}
function quizRender(){if(QZ.i>=QZ.q.length)return quizDone();var it=QZ.q[QZ.i];
 var opts=it[1].map(function(o,i){return '<button class="mcopt" onclick="quizAns('+i+','+it[2]+',this)">'+esc(o)+'</button>';}).join('');
 app.innerHTML=nav()+'<div class="rhead"><button class="quit" onclick="renderReader()">← Texto</button><div class="gstat">Pregunta '+(QZ.i+1)+' / '+QZ.q.length+'</div></div><div class="gcard"><div class="qq">'+esc(it[0])+'</div><div class="mcwrap">'+opts+'</div><div class="gfb" id="gfb"></div></div>';
}
function quizAns(i,ans,btn){var btns=document.querySelectorAll('.mcopt');btns.forEach(function(b,j){b.disabled=true;if(j===ans)b.classList.add('ok');});if(i!==ans)btn.classList.add('no');else QZ.correct++;
 document.getElementById('gfb').innerHTML='<button class="gbtn next" onclick="quizNext()">'+(QZ.i+1>=QZ.q.length?'Resultado →':'Siguiente →')+'</button>';}
function quizNext(){QZ.i++;quizRender();}
function quizDone(){var acc=Math.round(QZ.correct/QZ.q.length*100);if(acc>=60)markDone(CUR.id);
 var msg=acc>=80?'🏆 ¡Muy bien!':acc>=60?'👍 ¡Aprobado!':'🌱 Vuelve a leer y reintenta.';
 app.innerHTML=nav()+'<div class="gcard done"><div class="bigemoji">'+msg.split(' ')[0]+'</div><h2>'+esc(CUR.title)+'</h2><div class="score">'+QZ.correct+' / '+QZ.q.length+'<span class="scsub">'+acc+'%</span></div><p class="dmsg">'+msg.substring(msg.indexOf(' ')+1)+'</p><div class="brow"><button class="gbtn" onclick="renderReader()">↺ Releer</button><button class="gbtn ghost" onclick="home()">📚 Más lecturas</button></div></div>';
}
/* ===== RSVP speed-reading ===== */
var RS=null;
function rsvpWord(t){t=t||'';var n=t.length;var p=n<=1?0:(n<=5?1:(n<=9?2:(n<=13?3:4)));return '<span class="rz-l">'+esc(t.slice(0,p))+'</span><span class="rz-p">'+esc(t.charAt(p)||'')+'</span><span class="rz-r">'+esc(t.slice(p+1))+'</span>';}
function openRSVP(){var words=CUR.s.map(function(p){return p[0];}).join(' ').split(/\s+/).filter(Boolean);var wpm=300;try{wpm=parseInt(localStorage.getItem('read_wpm'))||300;}catch(e){}RS={words:words,i:0,wpm:wpm,playing:false,timer:null};rsvpFrame();}
function rsvpFrame(){
 var h='<div class="rhead"><button class="quit" onclick="rsvpExit()">← Texto</button><h1>⚡ '+esc(CUR.title)+'</h1><div class="rsub2">Lectura rápida · una palabra a la vez</div></div>';
 h+='<div class="gcard"><div class="rsvpstage"><div class="rsvpguide"></div><div class="rsvpword" id="rsvpw">'+rsvpWord(RS.words[RS.i]||'')+'</div></div>';
 h+='<div class="rsvpbar"><div class="rsvpfill" id="rsvpprog" style="width:0%"></div></div>';
 h+='<div class="rsvpmeta" id="rsvpmeta">'+Math.min(RS.i+1,RS.words.length)+' / '+RS.words.length+' · '+RS.wpm+' wpm</div>';
 h+='<div class="rsvpctl"><button class="gbtn" id="rsvpbtn" onclick="rsvpToggle()">▶ Play</button> <button class="gbtn ghost" onclick="rsvpRestart()">↺ Reiniciar</button></div>';
 h+='<div class="wpmrow">Velocidad: '+[150,250,350,450,600].map(function(w){return '<button class="wpmchip'+(RS.wpm===w?' on':'')+'" onclick="rsvpSetWpm('+w+')">'+w+'</button>';}).join('')+' <span class="muted">palabras/min</span></div>';
 h+='</div>';
 app.innerHTML=nav()+h;
}
function rsvpExit(){if(RS&&RS.timer)clearTimeout(RS.timer);if(RS)RS.playing=false;renderReader();}
function rsvpShow(){var w=document.getElementById('rsvpw');if(w)w.innerHTML=rsvpWord(RS.words[RS.i]||'');var pr=document.getElementById('rsvpprog');if(pr)pr.style.width=Math.round(RS.i/RS.words.length*100)+'%';var m=document.getElementById('rsvpmeta');if(m)m.textContent=Math.min(RS.i+1,RS.words.length)+' / '+RS.words.length+' · '+RS.wpm+' wpm';}
function rsvpToggle(){if(RS.playing)rsvpPause();else rsvpPlay();}
function rsvpPlay(){if(RS.i>=RS.words.length)RS.i=0;RS.playing=true;var b=document.getElementById('rsvpbtn');if(b)b.textContent='⏸ Pausa';rsvpTick();}
function rsvpPause(){RS.playing=false;if(RS.timer)clearTimeout(RS.timer);var b=document.getElementById('rsvpbtn');if(b)b.textContent='▶ Play';}
function rsvpTick(){if(!RS.playing)return;if(RS.i>=RS.words.length){rsvpPause();rsvpShow();return;}rsvpShow();var t=RS.words[RS.i];var base=60000/RS.wpm;var extra=/[.,;:!?…»)]$/.test(t)?base*0.9:0;var lng=t.length>8?base*0.4:0;RS.i++;RS.timer=setTimeout(rsvpTick,base+extra+lng);}
function rsvpRestart(){rsvpPause();RS.i=0;rsvpShow();}
function rsvpSetWpm(w){RS.wpm=w;try{localStorage.setItem('read_wpm',w);}catch(e){}var was=RS.playing;if(RS.timer)clearTimeout(RS.timer);rsvpFrame();if(was){RS.playing=true;var b=document.getElementById('rsvpbtn');if(b)b.textContent='⏸ Pausa';rsvpTick();}}

var app=document.getElementById('app');
home();

</script></body></html>
