async function loadBook(meta){

  try{
    var r=await fetch(''+meta.slug+'.json');

var BK=null,BKID=null,WK=0,CH=0;var RMODE='read';var TKEYS=[['presente','present'],['pretérito','preterite'],['imperfecto','imperfect'],['futuro','future'],['condicional','conditional'],['subj. presente','pres. subjunctive'],['subj. imperfecto','imperf. subjunctive'],['imperativo','imperative'],['gerundio','gerund'],['participio','participle'],['infinitivo','infinitive']];var PKEYS=[['yo','I'],['tú','you'],['él/ella/Ud.','he/she/you'],['nosotros','we'],['ellos/ellas/Uds.','they/you-pl'],['—','']];

/* ---- speech (sanitized; never reads phonetics/parentheticals) ---- */
function pickES(){var vs=window.speechSynthesis?speechSynthesis.getVoices():[];return vs.find(function(v){return /es(-|_)?(MX|419|US)/i.test(v.lang)})||vs.find(function(v){return /^es/i.test(v.lang)})||null;}
function spk(t){if(!('speechSynthesis'in window))return;t=(t||'').replace(/\([^)]*\)/g,'').replace(/\[[^\]]*\]/g,'').replace(/[“”"«»]/g,'').replace(/\s+/g,' ').trim();if(!t)return;try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='es-MX';u.rate=.92;var v=pickES();if(v)u.voice=v;speechSynthesis.speak(u);}catch(e){}}

/* ---- preferences ---- */
function getFont(){var n=parseInt(localStorage.getItem('lib_font'));return (n>=15&&n<=30)?n:20;}
function getTheme(){return localStorage.getItem('lib_theme')||'light';}
function applyTheme(){document.body.className='';var t=getTheme();if(t!=='light')document.body.classList.add(t);}
function progKey(id){return 'lib_'+id+'_ch';}

/* ---- catalog (cover-tile redesign) ---- */
function tileCover(cover,title,accent){
 if(cover) return '<div class="tcov" style="background-image:url('+cover+')"></div>';
 return '<div class="tcov tph" style="background:linear-gradient(150deg,'+(accent||'#5D4037')+',#1b2230)"><span>'+title+'</span></div>';
}
function bookCard(id){var b=LIB[id];var accent=(LV[b.level]||{}).c;var open=b.coll?'storyGrid':'openBook';
 var n=(b.n!==undefined)?b.n:(b.works?b.works.length:(b.chapters?b.chapters.length:0));
 var sub=b.coll?('<div class="tsub">'+n+' '+(b.works?(n===1?'obra':'obras'):(n===1?'cuento':'cuentos'))+'</div>'):'';
 return '<div class="tile" onclick="'+open+'(\''+id+'\')">'+tileCover(b.cover,b.title,accent)+'<div class="tname">'+b.title+'</div>'+sub+'</div>';
}
function catalog(){
 BK=null;BKID=null;hideGloss();
 var h='<div class="hero"><h1>📚 Biblioteca</h1><p>Lecturas para disfrutar, ordenadas por nivel (A1 → B2). Toca una portada para abrirla; toca cualquier palabra para ver su significado.</p></div>';
 [1,2,3,4].forEach(function(lv){var L=LV[lv];
  var ids=Object.keys(LIB).filter(function(k){return LIB[k].level===lv;});
  h+='<div class="shelf"><h2>'+L.n+'<span class="lvtag" style="background:'+L.bg+';color:'+L.c+'">'+L.cefr+'</span></h2><div class="sd">'+L.d+'</div>';
  if(!ids.length){h+='<div class="empty">Próximamente — más lecturas en camino.</div></div>';return;}
  h+='<div class="grid">'+ids.map(bookCard).join('')+'</div></div>';});
 app.innerHTML=h;window.scrollTo(0,0);
}
function storyTile(id,i,ch,accent){var cover=ch.cov||(ch.imgs&&ch.imgs[0])||'';
 return '<div class="tile" onclick="openChapter(\''+id+'\','+i+')">'+tileCover(cover,ch.title,accent)+'<div class="tname">'+ch.title+'</div></div>';
}
function workTile(id,wk,W,accent){var cover=W.cov||'';
 var badge=(W.type==='novela'?'Novela':'Relato')+' · '+W.chapters.length+(W.chapters.length===1?' cap.':' caps.')+(W.wip?' · en progreso':'');
 return '<div class="tile" onclick="openWork(\''+id+'\','+wk+')">'+tileCover(cover,W.title,accent)+'<div class="tname">'+W.title+'</div><div class="tsub">'+badge+'</div></div>';
}
function storyGrid(id){
 BK=null;BKID=null;hideGloss();var b=LIB[id];var accent=(LV[b.level]||{}).c;
 var hc=b.cover?('<div class="ghcov" style="background-image:url('+b.cover+')"></div>'):('<div class="ghcov" style="background:linear-gradient(150deg,'+accent+',#1b2230)">'+(b.cov||'📚')+'</div>');
 var h='<div class="rdtop"><button class="btn ghost" onclick="catalog()">← Biblioteca</button></div>';
 h+='<div class="ghdr">'+hc+'<div><h1>'+b.title+'</h1><div class="ghau">'+b.author+'</div></div></div>';
 h+='<p class="sub" style="margin:12px 2px 18px">'+b.blurb+'</p>';
 if(b.works){h+='<div class="grid">'+b.works.map(function(W,i){return workTile(id,i,W,accent);}).join('')+'</div>';}
 else{h+='<div class="grid">'+b.chapters.map(function(ch,i){return storyTile(id,i,ch,accent);}).join('')+'</div>';}
 app.innerHTML=h;window.scrollTo(0,0);
}
/* ---- reader ---- */
function curWork(){var b=LIB[BKID];return (b&&b.works)?b.works[WK]:b;}
function curGloss(){var W=curWork();return (W&&W.gloss)||(LIB[BKID]&&LIB[BKID].gloss)||{};}
function curVT(){var W=curWork();var ch=W&&W.chapters[CH];return (ch&&ch.vt)||null;}
function setMode(m){var y=window.scrollY;RMODE=m;hideGloss();reader();window.scrollTo(0,y);}
function pk(){return 'lib_'+BKID+(LIB[BKID]&&LIB[BKID].works?('_w'+WK):'')+'_ch';}
async function hydrate(id){
  var b=LIB[id];
  if(b._loaded) return;
  var full=await loadBook(b);
  if(full.chapters!==undefined) b.chapters=full.chapters;
  if(full.works!==undefined) b.works=full.works;
  if(full.gloss!==undefined) b.gloss=full.gloss;
  b._loaded=true;
}
async function openBook(id){await hydrate(id);BKID=id;WK=0;var W=curWork();var saved=parseInt(localStorage.getItem(pk()));CH=(saved>=0&&W.chapters&&saved<W.chapters.length)?saved:0;reader();}
async function openChapter(id,i){await hydrate(id);BKID=id;WK=0;CH=i;reader();}
async function openWork(id,wk){await hydrate(id);BKID=id;WK=wk;var W=curWork();var saved=parseInt(localStorage.getItem(pk()));CH=(saved>=0&&W.chapters&&saved<W.chapters.length)?saved:0;reader();}
function setFont(d){var n=Math.max(15,Math.min(30,getFont()+d));localStorage.setItem('lib_font',n);document.documentElement.style.setProperty('--rfs',n+'px');var e=document.getElementById('fsz');if(e)e.textContent=n;}
function setTheme(t){localStorage.setItem('lib_theme',t);applyTheme();reader();}
function reader(){
 hideGloss();
 document.documentElement.style.setProperty('--rfs',getFont()+'px');
 var b=LIB[BKID];var works=b.works;var W=works?works[WK]:b;
 var chs=W.chapters,total=chs.length,ch=chs[CH],th=getTheme();
 var isColl=!!b.coll,isWork=!!works,seq=isWork||!isColl;var hasVT=!!ch.vt;if((RMODE==='verbs'||RMODE==='quiz')&&!hasVT)RMODE='read';if(RMODE==='quiz')quizInit(ch);
 localStorage.setItem(pk(),CH);
 var imgs=ch.imgs||[];var body=ch.paras.map(function(p,k){return (imgs[k]?'<img class="rdimg" src="'+imgs[k]+'" alt="" loading="lazy">':'')+'<p>'+wrapWords(p)+'</p>';}).join('');
 var themes=[['light','☀️'],['sepia','📜'],['dark','🌙']].map(function(t){return '<button class="cbtn'+(th===t[0]?' on':'')+'" title="'+t[0]+'" onclick="setTheme(\''+t[0]+'\')">'+t[1]+'</button>';}).join('');
 var back=isColl?('<button class="btn ghost" onclick="storyGrid(\''+BKID+'\')">← '+b.title+'</button>'):('<button class="btn ghost" onclick="catalog()">← Biblioteca</button>');
 var chsel=(seq&&total>1)?'<select onchange="CH=+this.value;reader();window.scrollTo(0,0)" class="btn" style="padding:6px 8px">'+chs.map(function(c,i){return '<option value="'+i+'"'+(i===CH?' selected':'')+'>'+(i+1)+'. '+c.title+'</option>';}).join('')+'</select>':'';
 var chbar=(seq&&total>1)?('<div class="chbar"><span>Capítulo '+(CH+1)+' / '+total+'</span>'+chsel+'</div>'):''; var qbar=(RMODE==='quiz')?('<div class="qbar">🎯 Toca los verbos y di su <b>tiempo</b> y <b>persona</b> · <b id="qprog">'+(QZ?Object.keys(QZ.done).length:0)+'/'+(QZ?QZ.target:0)+'</b> · aciertos <b id="qsc">'+(QZ?QZ.correct:0)+'</b> <button class="mbtn" onclick="quizRestart()">↻</button></div>'):'';
 var nrow;
 if(seq){var backTo=isWork?('storyGrid(\''+BKID+'\')'):'catalog()';
  nrow='<div class="nrow">'+(CH>0?'<button class="btn" onclick="CH--;reader();window.scrollTo(0,0)">◀ Anterior</button>':'<span></span>')+(CH<total-1?'<button class="btn primary" onclick="CH++;reader();window.scrollTo(0,0)">Siguiente ▶</button>':'<button class="btn primary" onclick="'+backTo+'">✓ Terminado</button>')+'</div>';}
 else{nrow='<div class="nrow"><button class="btn" onclick="storyGrid(\''+BKID+'\')">← Todos los cuentos</button>'+(CH<total-1?'<button class="btn primary" onclick="openChapter(\''+BKID+'\','+(CH+1)+');window.scrollTo(0,0)">Siguiente cuento ▶</button>':'<button class="btn primary" onclick="storyGrid(\''+BKID+'\')">✓ Terminado</button>')+'</div>';}
 var titleTxt=isWork?W.title:b.title;
 var h='<div class="rdtop">'+back+'<div class="rdctrl"><button class="cbtn" title="Texto más pequeño" onclick="setFont(-1)">A−</button><span id="fsz" style="font-size:12px;color:var(--muted);width:22px;text-align:center">'+getFont()+'</span><button class="cbtn" title="Texto más grande" onclick="setFont(1)">A+</button>'+themes+'<button class="cbtn" title="Escuchar" onclick="readChapter()">🔊</button>'+(hasVT?'<span class="mtog"><button class="mbtn'+(RMODE==='read'?' on':'')+'" onclick="setMode(\'read\')">Leer</button><button class="mbtn'+(RMODE==='verbs'?' on':'')+'" onclick="setMode(\'verbs\')">Verbos</button><button class="mbtn'+(RMODE==='quiz'?' on':'')+'" onclick="setMode(\'quiz\')">Quiz</button></span>':'')+'</div></div>'
   +'<div class="rdtitle">'+(b.cov||'')+' '+titleTxt+' <span style="color:var(--muted);font-weight:400;font-size:13px">· '+b.author+'</span></div>'
   +chbar+qbar
   +'<div class="page"><h2>'+ch.title+'</h2><div class="rtext">'+body+'</div>'+nrow+'</div>'
   +'<div class="tip">'+(RMODE==='quiz'?'🎯 Modo quiz: toca cada verbo y clasifícalo por su tiempo y persona. Las palabras que no son verbos no cuentan.':(RMODE==='verbs'?'🔤 Modo verbos: los verbos están resaltados. Tócalos para ver su <b>tiempo</b> y <b>persona</b>.':'💡 Toca cualquier palabra para ver su significado · usa 🔊 para escuchar'))+'</div>';
 app.innerHTML=h;window.scrollTo(0,0);
}
function readChapter(){spk(curWork().chapters[CH].paras.join(' '));}

/* ---- tap-to-translate ---- */
function wrapWords(text){
 var out='',vt=(RMODE==='verbs')?curVT():null;
 var re=/([A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+)/g,m,last=0;
 while((m=re.exec(text))!==null){
  out+=esc(text.slice(last,m.index));
  var _w=m[1],_lw=_w.toLowerCase(),_c=(vt&&vt[_lw])?'w vb':((RMODE==='quiz'&&QZ&&QZ.done[_lw])?('w '+(QZ.done[_lw].ok?'qok':'qbad')):'w');out+='<span class="'+_c+'" onclick="tapWord(this)">'+esc(_w)+'</span>';
  last=m.index+m[1].length;
 }
 out+=esc(text.slice(last));
 return out;
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function lookup(word){
 var g=curGloss(),w=word.toLowerCase();
 if(g[w])return g[w];
 // try simple plural / feminine fallbacks
 if(w.length>3){
  if(w.slice(-2)==='es'&&g[w.slice(0,-2)])return g[w.slice(0,-2)];
  if(w.slice(-1)==='s'&&g[w.slice(0,-1)])return g[w.slice(0,-1)];
  if(w.slice(-1)==='a'&&g[w.slice(0,-1)+'o'])return g[w.slice(0,-1)+'o'];
 }
 return null;
}
function tapWord(el){
 var els=document.querySelectorAll('.w.sel');for(var i=0;i<els.length;i++)els[i].classList.remove('sel');
 var word=el.textContent;if(RMODE==='quiz'){var _vt=curVT()||{},_lw=word.toLowerCase(),_qv=_vt[_lw];if(!_qv){el.classList.add('miss');setTimeout(function(){el.classList.remove('miss');},450);return;}if(QZ&&QZ.done[_lw]){quizReview(word,QZ.done[_lw].v);return;}quizStart(word,_lw,_qv,el);return;}if(RMODE==='verbs'){var _vt=curVT(),_v=_vt&&_vt[word.toLowerCase()];if(_v){el.classList.add('sel');var _t=TKEYS[_v[1]]||['',''],_p=PKEYS[_v[2]]||['',''];document.getElementById('gw').textContent=word;document.getElementById('gt').innerHTML='<b>'+_v[0]+' · '+_t[0]+((_p[0]&&_p[0]!=='—')?' · '+_p[0]:'')+'</b>'+(_t[1]?' <span class="gen">('+_t[1]+(_p[1]?' · '+_p[1]:'')+')</span>':'');document.getElementById('ghb').onclick=function(){spk(_v[0]);};document.getElementById('gbar').classList.add('show');return;}}var tr=lookup(word);
 if(!tr){var gb=document.getElementById('gbar');if(gb)gb.classList.remove('show');return;}
 el.classList.add('sel');
 document.getElementById('gw').textContent=word;
 document.getElementById('gt').textContent='— '+tr;
 document.getElementById('ghb').onclick=function(){spk(word);};
 document.getElementById('gbar').classList.add('show');
}
function hideGloss(){var b=document.getElementById('gbar');if(b)b.classList.remove('show');var els=document.querySelectorAll('.w.sel');for(var i=0;i<els.length;i++)els[i].classList.remove('sel');}

/* ---- verb quiz ---- */
var QZ=null,QZcur=null;
function quizKey(){return BKID+'|'+WK+'|'+CH;}
function quizInit(ch){var k=quizKey();if(!QZ||QZ.key!==k){var n=Object.keys(ch.vt||{}).length;QZ={key:k,target:Math.min(10,n),done:{},total:0,correct:0};}}
function qshuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;}return a;}
function qOpts(correct,max,n){var o=[correct];while(o.length<n){var r=Math.floor(Math.random()*max);if(o.indexOf(r)<0)o.push(r);}return qshuf(o);}
function quizStart(word,lw,v,el){QZcur={word:word,lw:lw,v:v,el:el};quizAskTense();}
function quizAskTense(){var opts=qOpts(QZcur.v[1],11,4);QZcur.opts=opts;QZcur.step='tense';
 document.getElementById('qq').innerHTML='«'+esc(QZcur.word)+'» — ¿qué <b>tiempo</b> es?';
 document.getElementById('qopts').innerHTML=opts.map(function(o,i){return '<button class="qopt" onclick="quizPick('+i+')">'+TKEYS[o][0]+'</button>';}).join('');
 document.getElementById('qfb').innerHTML='';document.getElementById('qcard').classList.add('show');}
function quizAskPerson(){var opts=qOpts(QZcur.v[2],5,4);QZcur.opts=opts;QZcur.step='person';
 document.getElementById('qq').innerHTML='«'+esc(QZcur.word)+'» — ¿qué <b>persona</b>?';
 document.getElementById('qopts').innerHTML=opts.map(function(o,i){return '<button class="qopt" onclick="quizPick('+i+')">'+PKEYS[o][0]+'</button>';}).join('');
 document.getElementById('qfb').innerHTML='';}
function quizPick(i){var opts=QZcur.opts,chosen=opts[i],correct=(QZcur.step==='tense')?QZcur.v[1]:QZcur.v[2],ok=(chosen===correct);
 var btns=document.querySelectorAll('#qopts .qopt');for(var k=0;k<btns.length;k++){btns[k].disabled=true;if(opts[k]===correct)btns[k].classList.add('right');else if(k===i)btns[k].classList.add('wrong');}
 if(QZcur.step==='tense'){QZcur.tenseOK=ok;var nf=(QZcur.v[2]===5);
  document.getElementById('qfb').innerHTML='<button class="qnext" onclick="'+(nf?'quizFinish()':'quizAskPerson()')+'">'+(nf?'Listo ✓':'Persona →')+'</button>';}
 else{QZcur.personOK=ok;document.getElementById('qfb').innerHTML='<button class="qnext" onclick="quizFinish()">Continuar →</button>';}}
function quizFinish(){var allok=QZcur.tenseOK&&(QZcur.v[2]===5||QZcur.personOK);
 QZ.done[QZcur.lw]={v:QZcur.v,ok:allok};QZ.total++;if(allok)QZ.correct++;
 if(QZcur.el)QZcur.el.classList.add(allok?'qok':'qbad');
 document.getElementById('qcard').classList.remove('show');quizBarUpd();
 if(Object.keys(QZ.done).length>=QZ.target)quizDone();}
function quizBarUpd(){var p=document.getElementById('qprog');if(p)p.textContent=Object.keys(QZ.done).length+'/'+QZ.target;var s=document.getElementById('qsc');if(s)s.textContent=QZ.correct;}
function quizReview(word,v){var t=TKEYS[v[1]],p=PKEYS[v[2]];
 document.getElementById('qq').innerHTML='Ya clasificaste «'+esc(word)+'»';
 document.getElementById('qopts').innerHTML='<div class="qres">'+v[0]+' · '+t[0]+((p[0]&&p[0]!=='—')?' · '+p[0]:'')+'</div>';
 document.getElementById('qfb').innerHTML='<button class="qnext alt" onclick="quizClose()">Cerrar</button>';document.getElementById('qcard').classList.add('show');}
function quizClose(){document.getElementById('qcard').classList.remove('show');}
function quizDone(){document.getElementById('qq').innerHTML='🎉 ¡Completado!';
 document.getElementById('qopts').innerHTML='<div class="qres">Aciertos: <b>'+QZ.correct+' / '+QZ.total+'</b></div>';
 document.getElementById('qfb').innerHTML='<button class="qnext" onclick="quizRestart()">Otra vez ↻</button><button class="qnext alt" onclick="setMode(\'read\')">Leer</button>';
 document.getElementById('qcard').classList.add('show');}
function quizRestart(){QZ=null;document.getElementById('qcard').classList.remove('show');reader();}

if(window.speechSynthesis){speechSynthesis.onvoiceschanged=function(){};}
applyTheme();
catalog();
</script>
