<title>El Gimnasio del Viajero · El Camino Grande</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#33202e;--ink2:#5c4759;--mut:#8a7386;--plaster:#faf3ea;--plaster2:#f3e6d7;--card:#fffdf9;--cobalt:#2456a6;--cobalt2:#1a4488;--saffron:#e8a33d;--saffron2:#d98c1f;--sunhi:#ffd88a;--green:#2f8a5b;--greenbg:#e5f5ec;--red:#c8503f;--redbg:#fcebe7;--sky:#eaf1fb;--shadow:0 1px 2px rgba(51,32,46,.05),0 10px 30px -12px rgba(51,32,46,.18);--shadow-sm:0 1px 2px rgba(51,32,46,.05),0 4px 14px -6px rgba(51,32,46,.12)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--plaster);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:20px 16px 90px}
header{text-align:center;padding:14px 0 6px}
h1{font-size:1.5rem;font-weight:900;margin:0;letter-spacing:-.02em}
.sub{color:var(--mut);font-size:.9rem;margin-top:2px}
.streak{display:inline-flex;gap:6px;align-items:center;background:var(--card);border:1px solid var(--plaster2);border-radius:999px;padding:6px 14px;box-shadow:var(--shadow-sm);font-weight:800;font-size:.9rem;margin-top:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.card{background:var(--card);border:1px solid var(--plaster2);border-radius:18px;padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s ease;text-align:left}
.card:active{transform:scale(.97)}
.card .emoji{font-size:1.8rem}
.card .nm{font-weight:800;margin-top:8px;font-size:1.02rem}
.card .ds{color:var(--mut);font-size:.82rem;margin-top:3px}
.card .ct{color:var(--cobalt);font-weight:700;font-size:.75rem;margin-top:8px}
.btn{display:block;width:100%;border:none;border-radius:14px;padding:15px;font-family:inherit;font-weight:800;font-size:1rem;cursor:pointer;transition:transform .1s ease}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--cobalt);color:#fff;box-shadow:0 6px 16px -6px rgba(36,86,166,.5)}
.btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--plaster2)}
.back{background:none;border:none;color:var(--cobalt);font-weight:800;font-family:inherit;font-size:.95rem;cursor:pointer;padding:8px 0;margin-bottom:4px}
.q-place{color:var(--saffron2);font-weight:800;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em}
.q-card{background:var(--card);border:1px solid var(--plaster2);border-radius:20px;padding:22px;box-shadow:var(--shadow);margin-top:14px}
.q-prompt{font-size:1.35rem;font-weight:800;margin:10px 0 4px;letter-spacing:-.01em}
.q-en{color:var(--mut);font-size:.95rem}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.opt{background:var(--card);border:1.5px solid var(--plaster2);border-radius:14px;padding:14px;font-size:1rem;font-weight:600;cursor:pointer;text-align:left;transition:all .12s ease;font-family:inherit;color:var(--ink)}
.opt:active{transform:scale(.98)}
.opt.right{background:var(--greenbg);border-color:var(--green);color:var(--green);font-weight:800}
.opt.wrong{background:var(--redbg);border-color:var(--red);color:var(--red)}
.why{background:var(--sky);border-radius:12px;padding:12px 14px;margin-top:14px;font-size:.9rem;color:var(--ink2)}
.why b{color:var(--cobalt)}
.prog{height:6px;background:var(--plaster2);border-radius:999px;overflow:hidden;margin:14px 0}
.prog>div{height:100%;background:var(--saffron);transition:width .3s ease}
.speak{display:inline-flex;align-items:center;gap:5px;background:var(--plaster2);border:none;border-radius:999px;padding:5px 12px;font-family:inherit;font-weight:700;font-size:.82rem;color:var(--ink2);cursor:pointer;margin-top:10px}
.done-hero{text-align:center;padding:30px 0}
.done-hero .big{font-size:3rem}
.done-hero h2{font-size:1.5rem;font-weight:900;margin:8px 0}
.turn{border-radius:14px;padding:12px 14px;margin:8px 0;max-width:85%;cursor:pointer}
.turn.you{background:var(--cobalt);color:#fff;margin-left:auto}
.turn.them{background:var(--plaster2);color:var(--ink)}
.turn .en{opacity:.7;font-size:.82rem;margin-top:3px}
.fade{animation:fade .35s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}


/* --- Unified El Camino Grande tool header (self-contained) --- */
.cg-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;margin:0 0 18px;background:#faf3ea;border-bottom:1px solid #e8dccb;box-sizing:border-box;}
.cg-brand{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none;}
.cg-compass{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:#2456a6;color:#fff;font-size:15px;flex:none;}
.cg-word{font-family:'Fraunces',serif;font-weight:800;font-size:19px;color:#33202e;letter-spacing:.2px;}
.cg-word b{color:#d18f2a;font-weight:800;}
.cg-back{font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:14px;color:#5c4a55;cursor:pointer;text-decoration:none;padding:8px 16px;border:1px solid #e8dccb;border-radius:999px;background:#fffdf7;}
.cg-back:hover{color:#33202e;border-color:#9b8a93;}
</style></head>

var SITS=TG.situations;
var stats=load();
function load(){try{return JSON.parse(localStorage.getItem("tg_stats"))||{streak:0,done:0}}catch(e){return{streak:0,done:0}}}
function save(){try{localStorage.setItem("tg_stats",JSON.stringify(stats))}catch(e){}}
var el=document.getElementById("app");
function speak(t){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang="es-ES";u.rate=.9;speechSynthesis.speak(u)}catch(e){}}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function home(){
  var h="<div class=\'cg-header\'><a class=\'cg-brand\' onclick=\'history.back()\'><span class=\'cg-compass\'>🧭</span><span class=\'cg-word\'>El Camino <b>Grande</b></span></a><a class=\'cg-back\' onclick=\'history.back()\'>← Volver</a></div><header><h1>El Gimnasio del Viajero</h1><div class='sub'>Survive a week abroad \u2014 drill any situation, anytime.</div>";
  h+="<div class='streak'>\ud83d\udd25 <span>"+stats.streak+" streak</span> \u00b7 <span>"+stats.done+" drilled</span></div></header>";
  h+="<div class='grid'>";
  SITS.forEach(function(S,i){
    h+="<div class='card fade' onclick='openSit("+i+")'><div class='emoji'>"+S.emoji+"</div><div class='nm'>"+esc(S.name)+"</div><div class='ds'>"+esc(S.desc)+"</div><div class='ct'>"+S.pairs.length+" phrases \u00b7 drill \u2192</div></div>";
  });
  h+="</div>";el.innerHTML=h;
}
var mode=null;
function openSit(i){
  var S=SITS[i];
  var h="<button class='back' onclick='home()'>\u2039 All situations</button>";
  h+="<div class='q-card fade'><div style='font-size:2.2rem'>"+S.emoji+"</div><div class='q-prompt'>"+esc(S.name)+"</div><div class='q-en'>"+esc(S.desc)+"</div>";
  h+="<div style='color:var(--mut);font-size:.85rem;margin-top:10px'>"+S.pairs.length+" phrases \u00b7 "+S.roleplays.length+" role-plays</div></div>";
  h+="<div style='margin-top:16px;display:flex;flex-direction:column;gap:10px'>";
  h+="<button class='btn btn-primary' onclick='startDrill("+i+",\"recognize\")'>\ud83d\udc42 Understand it (hear \u2192 meaning)</button>";
  h+="<button class='btn btn-primary' onclick='startDrill("+i+",\"produce\")'>\ud83d\udde3\ufe0f Say it (situation \u2192 phrase)</button>";
  if(S.roleplays.length)h+="<button class='btn btn-ghost' onclick='startRoleplay("+i+")'>\ud83c\udfad Role-play a conversation</button>";
  h+="</div>";el.innerHTML=h;
}
var drill=null;
function startDrill(i,m){
  var S=SITS[i];mode=m;
  var pairs=S.pairs.filter(function(p){return m==="recognize"?(p.hear&&p.hearEn):(p.say&&p.sayEn)});
  if(pairs.length<3){alert("Not enough phrases here yet \u2014 try another mode.");return}
  var items=shuffle(pairs.slice()).slice(0,Math.min(10,pairs.length));
  drill={S:S,si:i,items:items,idx:0,correct:0,mode:m,pool:pairs};renderDrill();
}
function renderDrill(){
  var d=drill,it=d.items[d.idx];
  var prompt=d.mode==="recognize"?it.hear:it.sayEn;
  var correct=d.mode==="recognize"?it.hearEn:it.say;
  var others=d.pool.filter(function(p){return (d.mode==="recognize"?p.hearEn:p.say)!==correct});
  var opts=shuffle(others).slice(0,3).map(function(p){return d.mode==="recognize"?p.hearEn:p.say});
  opts.push(correct);opts=shuffle(opts);
  var h="<button class='back' onclick='openSit("+d.si+")'>\u2039 "+esc(d.S.name)+"</button>";
  h+="<div class='prog'><div style='width:"+(d.idx/d.items.length*100)+"%'></div></div>";
  h+="<div class='q-card fade'><div class='q-place'>"+(d.mode==="recognize"?"You hear\u2026":"You want to say\u2026")+"</div>";
  h+="<div class='q-prompt'>"+esc(prompt)+"</div>";
  if(d.mode==="recognize")h+="<button class='speak' onclick='speak(decodeURIComponent(\""+encodeURIComponent(prompt)+"\"))'>\ud83d\udd0a Hear it</button>";
  h+="<div class='opts'>";
  opts.forEach(function(o){h+="<button class='opt' onclick='answer(this,\""+encodeURIComponent(o)+"\",\""+encodeURIComponent(correct)+"\")'>"+esc(o)+"</button>";});
  h+="</div></div>";el.innerHTML=h;
}
function answer(btn,got,cor){
  got=decodeURIComponent(got);cor=decodeURIComponent(cor);
  var ok=got===cor;
  var opts=btn.parentNode.querySelectorAll(".opt");
  opts.forEach(function(o){o.onclick=null;if(o.textContent===cor)o.classList.add("right")});
  if(!ok)btn.classList.add("wrong");
  if(ok){drill.correct++;stats.done++}
  var it=drill.items[drill.idx];
  var tip=drill.mode==="recognize"?("<b>"+esc(it.say)+"</b> \u2014 "+esc(it.sayEn)):("Say: <b>"+esc(it.say)+"</b>");
  var why=document.createElement("div");why.className="why";why.innerHTML=(ok?"\u2713 ":"")+tip;
  btn.parentNode.parentNode.appendChild(why);
  var nx=document.createElement("button");nx.className="btn btn-primary";nx.style.marginTop="14px";
  nx.textContent=drill.idx<drill.items.length-1?"Next \u2192":"Finish";nx.onclick=next;
  btn.parentNode.parentNode.appendChild(nx);
}
function next(){
  drill.idx++;
  if(drill.idx>=drill.items.length){
    if(drill.correct>=Math.ceil(drill.items.length*.7))stats.streak++;else stats.streak=0;save();
    var pct=Math.round(drill.correct/drill.items.length*100);
    el.innerHTML="<div class='done-hero fade'><div class='big'>"+(pct>=70?"\ud83c\udf89":"\ud83d\udcaa")+"</div><h2>"+drill.correct+"/"+drill.items.length+" right</h2><div class='sub'>"+(pct>=70?"\u00a1Buen viaje! Streak +1":"Keep drilling \u2014 you will get there.")+"</div><div style='margin-top:20px;display:flex;flex-direction:column;gap:10px'><button class='btn btn-primary' onclick='startDrill("+drill.si+",\""+drill.mode+"\")'>Drill again</button><button class='btn btn-ghost' onclick='openSit("+drill.si+")'>Back</button></div></div>";
    return;
  }
  renderDrill();
}
function startRoleplay(i){
  var S=SITS[i];var rp=S.roleplays[Math.floor(Math.random()*S.roleplays.length)];
  var h="<button class='back' onclick='openSit("+i+")'>\u2039 "+esc(S.name)+"</button>";
  h+="<div class='q-place' style='margin-top:8px'>\ud83c\udfad "+esc(rp.place||"Role-play")+"</div><div style='margin-top:12px'>";
  rp.turns.forEach(function(t){
    var isYou=t.who==="you";var es=isYou?t.say:t.es;var en=isYou?t.sayEn:t.en;
    h+="<div class='turn "+(isYou?"you":"them")+" fade' onclick='speak(decodeURIComponent(\""+encodeURIComponent(es||"")+"\"))'>"+esc(es)+"<div class='en'>"+esc(en)+"</div></div>";
  });
  h+="</div><button class='btn btn-primary' style='margin-top:16px' onclick='startRoleplay("+i+")'>Another conversation</button><button class='btn btn-ghost' style='margin-top:10px' onclick='openSit("+i+")'>Done</button>";
  el.innerHTML=h;
}
home();
</script></body></html>
