<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>El Oído · El Camino Grande</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--cobalt:#2456a6;--cobalt2:#1c4488;--saffron:#e8a33d;--saffron2:#d18f2a;--plaster:#faf3ea;--card:#fffdf7;--ink:#33202e;--ink2:#5c4a55;--mut:#9b8a93;--line:#e8dccb;--green:#2f8a5b;--red:#c0392b;--plum:#54306b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito Sans',sans-serif;background:var(--plaster);color:var(--ink);min-height:100vh}
#app{max-width:560px;margin:0 auto;padding:14px 14px 90px}
.nav{display:flex;gap:14px;padding:6px 2px 14px;font-size:13px;font-weight:800;color:var(--mut)}
.nav a{cursor:pointer;color:var(--cobalt);text-decoration:none}
h1,h2{font-family:'Fraunces',serif}
.hero{background:linear-gradient(140deg,var(--cobalt),var(--cobalt2));border-radius:22px;padding:22px 20px;color:#fff8ef;margin-bottom:16px}
.hero .htop{font-size:11px;letter-spacing:.18em;font-weight:800;opacity:.75;text-transform:uppercase}
.hero h1{font-size:26px;margin:4px 0 6px}
.hero p{font-size:14px;opacity:.92;line-height:1.5}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px -5px rgba(51,32,46,.15)}
.card:active{transform:scale(.98)}
.card .em{font-size:26px}
.card b{font-family:'Fraunces',serif;font-size:15.5px}
.cmeta{font-size:12px;color:var(--mut);font-weight:700;margin-top:2px}
.badge{display:inline-block;background:#e4ecf9;color:var(--cobalt);border-radius:99px;padding:2px 9px;font-size:11px;font-weight:800;margin-right:5px}
.gcard{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 3px 14px -6px rgba(51,32,46,.18)}
.famhead{display:flex;align-items:center;gap:10px;margin:2px 0 14px}
.famhead h1{font-size:20px;flex:1}
.quit{background:none;border:1.5px solid var(--line);border-radius:99px;padding:6px 13px;font-weight:800;font-size:12.5px;cursor:pointer;color:var(--ink2);font-family:'Nunito Sans',sans-serif}
.bigear{font-size:52px;text-align:center;margin:6px 0}
.playrow{display:flex;gap:10px;justify-content:center;margin:10px 0 16px}
.playbtn{background:linear-gradient(140deg,var(--cobalt),var(--cobalt2));color:#fff;border:none;border-radius:99px;padding:12px 22px;font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:15px;cursor:pointer}
.playbtn.slow{background:linear-gradient(140deg,var(--green),#25714a)}
.opt{display:block;width:100%;background:#f6f1e7;border:1.5px solid var(--line);border-radius:14px;padding:13px;margin-top:9px;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:16px;cursor:pointer;text-align:center;color:var(--ink)}
.opt.ok{background:#e2f2e9;border-color:var(--green);color:var(--green)}
.opt.no{background:#fbe9e7;border-color:var(--red);color:var(--red)}
.fb{margin-top:10px;font-size:13.5px;line-height:1.6;padding:10px 13px;border-radius:12px}
.fbok{background:#e2f2e9;color:#25573e}
.fbno{background:#fbe9e7;color:#8c3126}
.gbtn{display:block;width:100%;background:linear-gradient(140deg,var(--cobalt),var(--cobalt2));color:#fff;border:none;border-radius:14px;padding:12px;font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:14.5px;cursor:pointer;margin-top:12px}
.gbtn.ghost{background:none;border:1.5px solid var(--line);color:var(--ink2)}
.rephead{display:flex;justify-content:space-between;font-size:12.5px;font-weight:800;color:var(--mut);margin-bottom:8px}
.spot{background:#fdf6e3;border:1.5px solid #ecd9a8;border-radius:14px;padding:11px 14px;font-size:13.5px;line-height:1.6;color:#5c4a22;margin-bottom:12px}
.tnote{margin-top:10px;background:#f3eef8;border:1.5px solid #ddcfe9;border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.6;color:#4a3a56}

/* La Sobremesa tokens */
:root{
  --ink:#33202e;--ink2:#5c4759;--mut:#8a7386;
  --plaster:#faf3ea;--plaster2:#f3e6d7;--card:#fffdf9;
  --cobalt:#2456a6;--cobalt2:#1a4488;
  --saffron:#e8a33d;--saffron2:#d98c1f;--sunhi:#ffd88a;
  --green:#2f8a5b;--greenbg:#e5f5ec;--red:#c8503f;--redbg:#fcebe7;--sky:#eaf1fb;
  --shadow:0 1px 2px rgba(51,32,46,.05),0 10px 30px -12px rgba(51,32,46,.18);
  --shadow-sm:0 1px 2px rgba(51,32,46,.05),0 4px 14px -6px rgba(51,32,46,.12);
}


/* --- Unified El Camino Grande tool header (self-contained) --- */
.cg-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;margin:0 0 18px;background:#faf3ea;border-bottom:1px solid #e8dccb;box-sizing:border-box;}
.cg-brand{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none;}
.cg-compass{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:#2456a6;color:#fff;font-size:15px;flex:none;}
.cg-word{font-family:'Fraunces',serif;font-weight:800;font-size:19px;color:#33202e;letter-spacing:.2px;}
.cg-word b{color:#d18f2a;font-weight:800;}
.cg-back{font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:14px;color:#5c4a55;cursor:pointer;text-decoration:none;padding:8px 16px;border:1px solid #e8dccb;border-radius:999px;background:#fffdf7;}
.cg-back:hover{color:#33202e;border-color:#9b8a93;}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* EL OÍDO · the listening gym — a desvío of El Camino Grande
   Halls: Dictado (sentences), Pares mínimos (near-twin words), Números al oído.
   Misses feed the shared Mochila (cg_moch) when co-deployed with the Camino. */

var DICTADO=[
{lv:'A1',a:'Hola, ¿cómo estás?',d:['Hola, ¿dónde estás?','Hola, ¿cómo está?'],why:'estás (you) vs está (he/she) — the -s is the whole difference.'},
{lv:'A1',a:'Un café, por favor.',d:['Un té, por favor.','Dos cafés, por favor.'],why:'One word carries the order: café, and just one (un).'},
{lv:'A1',a:'¿Dónde está el baño?',d:['¿Dónde está el banco?','¿Dónde está el barco?'],why:'baño / banco / barco — one syllable apart, very different destinations.'},
{lv:'A1',a:'La cuenta, por favor.',d:['La puerta, por favor.','La carta, por favor.'],why:'cuenta (bill) vs carta (menu) — restaurant survival hangs on this pair.'},
{lv:'A1',a:'No entiendo.',d:['No lo tengo.','No lo vendo.'],why:'entiendo — your most honest sentence, worth knowing by ear.'},
{lv:'A1',a:'Mucho gusto.',d:['Mucho gasto.','Muy justo.'],why:'gusto (pleasure) vs gasto (expense) — one vowel, big difference at a handshake.'},
{lv:'A2',a:'La casa es blanca y grande.',d:['La casa es blanca y elegante.','La taza es blanca y grande.'],why:'casa vs taza, grande vs elegante — adjective ears in training.'},
{lv:'A2',a:'Hoy es sábado, el tres de julio.',d:['Hoy es sábado, el trece de julio.','Hoy es jueves, el tres de julio.'],why:'tres vs trece and sábado vs jueves — calendar listening is date-critical.'},
{lv:'A2',a:'Este templo es mi favorito.',d:['Ese templo es mi favorito.','Este tiempo es mi favorito.'],why:'este vs ese (here vs there) and templo vs tiempo — Tikal-grade precision.'},
{lv:'A2',a:'Hay dos pirámides en la ciudad.',d:['Hay tres pirámides en la ciudad.','Hay dos pirámides en la plaza.'],why:'The number and the place — the two details every sentence lives on.'},
{lv:'A2',a:'Tengo hambre y tengo frío.',d:['Tengo hambre y tengo prisa.','Tiene hambre y tiene frío.'],why:'tengo vs tiene — whose hunger is it? The verb ending tells you.'},
{lv:'A2',a:'Son las dos de la tarde.',d:['Son las doce de la tarde.','Son las dos de la mañana.'],why:'dos vs doce, tarde vs mañana — time-telling is ear work first.'},
{lv:'A2',a:'Hace mucho sol hoy.',d:['Hace mucho frío hoy.','Hace mucho sol ahí.'],why:'The weather word rides in the middle — catch it on the fly.'},
{lv:'A2',a:'Me gusta el café de Colombia.',d:['Me gustan los cafés de Colombia.','Me gusta el café de Bolivia.'],why:'gusta vs gustan — singular or plural pleasure, the ear decides.'},
{lv:'A2',a:'¿Cuánto cuesta esta arepa?',d:['¿Cuánto cuestan estas arepas?','¿Cuánto cuesta esta empanada?'],why:'cuesta/cuestan + the food itself — market ears.'},
{lv:'A2',a:'Quiero pollo con arroz, por favor.',d:['Quiero pollo con maíz, por favor.','Quiere pollo con arroz, por favor.'],why:'arroz vs maíz, quiero vs quiere — the waiter hears the difference; so should you.'},
{lv:'A2',a:'Por la mañana tomo un café.',d:['Por la mañana tomo un té.','Por la noche tomo un café.'],why:'when + what — routine sentences hide their facts at both ends.'},
{lv:'A2',a:'Siempre hablo español los lunes.',d:['Siempre hablo español los jueves.','Nunca hablo español los lunes.'],why:'siempre vs nunca flips the whole sentence; the day seals it.'},
{lv:'A2',a:'Mi hermana tiene veinte años.',d:['Mi hermana tiene treinta años.','Mi hermano tiene veinte años.'],why:'hermana/hermano + the age — family talk is detail talk.'},
{lv:'A2',a:'¿Qué hora es? Es la una.',d:['¿Qué hora es? Son las dos.','¿Qué hora es? Es la luna.'],why:'Es la una — the only singular hour — vs la luna, the moon. The ear giggles, then learns.'}
];
var PARES=[
{a:'pero',b:'perro',hint:'but · dog',why:'The single r taps once; the rr rolls like a motor. The most famous pair in Spanish.'},
{a:'caro',b:'carro',hint:'expensive · car',why:'Un carro caro is a tongue-and-ear workout: tap, then roll.'},
{a:'coro',b:'corro',hint:'choir · I run',why:'r vs rr again — the roll changes the meaning entirely.'},
{a:'hablo',b:'habló',hint:'I speak · he/she spoke',why:'STRESS: HA-blo (now, me) vs ha-BLÓ (past, someone else). The stress law, live.'},
{a:'canto',b:'cantó',hint:'I sing · he/she sang',why:'Same trick: the loud syllable moves, the timeline moves with it.'},
{a:'llego',b:'llegó',hint:'I arrive · he/she arrived',why:'One accent mark = a different person in a different tense. Ears before eyes.'},
{a:'papa',b:'papá',hint:'potato · dad',why:'PA-pa is a potato; pa-PÁ is your father. Dinner conversations depend on this.'},
{a:'esta',b:'está',hint:'this (fem.) · is (estar)',why:'ES-ta niña vs la niña es-TÁ aquí — the stress tells you which word arrived.'},
{a:'peña',b:'pena',hint:'rock/crag · sorrow',why:'The ñ adds a little "ny" glide — peña bends where pena walks straight.'},
{a:'campana',b:'campaña',hint:'bell · campaign',why:'n vs ñ in the middle of a word — subtle until you hear them side by side.'},
{a:'una',b:'uña',hint:'one (fem.) · fingernail',why:'The smallest ñ pair there is — and a manicure depends on it.'},
{a:'casa',b:'gasa',hint:'house · gauze',why:'The hard c vs the soft g at the gate of the word.'},
{a:'vino',b:'fino',hint:'wine · fine/thin',why:'v/b vs f — Spanish v sounds like a soft b, which makes f the real contrast.'},
{a:'pollo',b:'poyo',hint:'chicken · stone bench',why:'In most of Latin America these twins sound identical (yeísmo) — so context is the referee. Hear them, then relax: locals rely on context too.'},
{a:'tomo',b:'tomó',hint:'I take/drink · he/she took',why:'Your morning coffee (tomo) vs someone\'s finished one (tomó).'},
{a:'jugo',b:'jugó',hint:'juice · he/she played',why:'Breakfast or the sports report — the stress decides the topic.'}
];
function numEs(n){
 n=Math.round(n);
 var U=['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
 var T=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
 var H=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
 if(n<30)return U[n];
 if(n<100){var t=Math.floor(n/10),u=n%10;return T[t]+(u?' y '+U[u]:'');}
 if(n===100)return 'cien';
 if(n<1000){var h=Math.floor(n/100),r=n%100;return H[h]+(r?' '+numEs(r):'');}
 if(n<1000000){var m=Math.floor(n/1000),r2=n%1000;return (m===1?'mil':numEs(m)+' mil')+(r2?' '+numEs(r2):'');}
 return String(n);
}
var NUMLV=[{n:'Camino 0–30',min:0,max:30},{n:'Trail 0–100',min:0,max:100},{n:'Summit 100–10.000',min:100,max:10000}];

/* ---------- voice ---------- */
var VOICE=null;
function esVoices(){try{return speechSynthesis.getVoices().filter(function(v){return /^es/i.test(v.lang);});}catch(e){return [];}}
function vScore(v){var s=0;if(/enhanced|premium|natural/i.test(v.name))s+=40;if(/mónica|monica|paulina|marisol|jorge|juan|diego|luciana/i.test(v.name))s+=18;if(/es[-_](MX|US|419)/i.test(v.lang))s+=8;return s;}
function pickVoice(){var vs=esVoices();if(!vs.length)return null;vs.sort(function(a,b){return vScore(b)-vScore(a);});return vs[0];}
function spk(t,rate){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);if(!VOICE)VOICE=pickVoice();if(VOICE)u.voice=VOICE;u.lang=(VOICE&&VOICE.lang)||'es-MX';u.rate=rate||0.9;speechSynthesis.speak(u);}catch(e){}}
try{speechSynthesis.onvoiceschanged=function(){VOICE=pickVoice();};}catch(e){}

/* ---------- shared mochila feed ---------- */
function mochFeed(q,a,why){
 try{
  var o=JSON.parse(localStorage.getItem('cg_moch'))||{};
  var k=(q||'').slice(0,60);if(!k)return;
  var today=Math.floor(Date.now()/864e5);
  o[k]={q:q,a:a,why:why||'',src:'oido',due:today,iv:0};
  localStorage.setItem('cg_moch',JSON.stringify(o));
 }catch(e){}
}
function bestLoad(){try{return JSON.parse(localStorage.getItem('od_best'))||{};}catch(e){return {};}}
function bestSave(o){try{localStorage.setItem('od_best',JSON.stringify(o));}catch(e){}}
function cls(){try{return localStorage.getItem('cg_mode')==='class';}catch(e){return false;}}

/* ---------- state ---------- */
var app=document.getElementById('app'),G=null;
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var x=a[i];a[i]=a[j];a[j]=x;}return a;}
function nav(){return '<div class="cg-header"><a class="cg-brand" onclick="history.back()"><span class="cg-compass">🧭</span><span class="cg-word">El Camino <b>Grande</b></span></a><a class="cg-back" onclick="history.back()">← Volver</a></div>';}
function home(){
 var B=bestLoad();
 var h=nav();
 h+='<div class="hero"><div class="htop">EL CAMINO GRANDE · UN DESVÍO</div><h1>El Oído</h1><p>The listening gym. Reading Spanish is walking; hearing it at speed is the summit. Three halls, ten rounds each — train the ear that real conversations demand.</p></div>';
 h+='<div class="card" onclick="dictStart(\'A1\')"><span class="em">📝</span><div style="flex:1"><b>Dictado · survival</b><div class="cmeta"><span class="badge">A1</span>Hear the sentence, catch every word'+(B.dA1?' · best '+B.dA1+'/10':'')+'</div></div><span style="color:var(--mut)">›</span></div>';
 h+='<div class="card" onclick="dictStart(\'A2\')"><span class="em">📝</span><div style="flex:1"><b>Dictado · the trail</b><div class="cmeta"><span class="badge">A2</span>Stages 2–4 grammar, at conversation speed'+(B.dA2?' · best '+B.dA2+'/10':'')+'</div></div><span style="color:var(--mut)">›</span></div>';
 h+='<div class="card" onclick="parStart()"><span class="em">👯</span><div style="flex:1"><b>Pares mínimos</b><div class="cmeta"><span class="badge">All levels</span>pero/perro · hablo/habló — the near-twins'+(B.par?' · best '+B.par+'/10':'')+'</div></div><span style="color:var(--mut)">›</span></div>';
 NUMLV.forEach(function(L,i){
  h+='<div class="card" onclick="numStart('+i+')"><span class="em">🔢</span><div style="flex:1"><b>Números · '+esc(L.n)+'</b><div class="cmeta">Hear the number, pick the digits'+(B['n'+i]?' · best '+B['n'+i]+'/10':'')+'</div></div><span style="color:var(--mut)">›</span></div>';
 });
 h+='<div class="spot" style="margin-top:14px"><b>Why this desvío matters:</b> your eyes get grammar for free; your ears have to earn it. Ten minutes here and the same sentences you can read start arriving by sound. Misses go straight into your 🎒 Mochila.</div>';
 if(cls())h+='<div class="tnote">🧭 <b>Guide note:</b> El Oído is perfect homework between classes — assign one hall via Misiones. In class, use Pares mínimos as a warm-up: you say the pair live, student points. Your real voice beats the robot every time.</div>';
 app.innerHTML=h;window.scrollTo(0,0);
}
/* ---------- dictado ---------- */
function dictStart(lv){
 var bank=DICTADO.filter(function(x){return x.lv===lv;});
 G={mode:'dict',key:'d'+lv,items:shuffle(bank).slice(0,10),i:0,score:0};
 round();
}
function parStart(){
 G={mode:'par',key:'par',items:shuffle(PARES).slice(0,10),i:0,score:0};
 round();
}
function numStart(li){
 var L=NUMLV[li],items=[];
 for(var i=0;i<10;i++){
  var n=L.min+Math.floor(Math.random()*(L.max-L.min+1));
  if(L.max>1000)n=Math.round(n/50)*50;
  items.push(n);
 }
 G={mode:'num',key:'n'+li,items:items,i:0,score:0};
 round();
}
function say(rate){
 var it=G.items[G.i];
 if(G.mode==='dict')spk(it.a,rate);
 else if(G.mode==='par')spk(G.word,rate||0.8);
 else spk(numEs(it),rate);
}
function round(){
 if(G.i>=G.items.length)return finish();
 var it=G.items[G.i],h=nav();
 h+='<div class="famhead"><button class="quit" onclick="home()">✕ Exit</button><h1>👂 '+(G.i+1)+' / '+G.items.length+'</h1></div>';
 h+='<div class="gcard"><div class="rephead"><span>Listen, then choose</span><span>✓ '+G.score+'</span></div><div class="bigear">👂</div>';
 h+='<div class="playrow"><button class="playbtn slow" onclick="say(0.55)">🐢 Slow</button><button class="playbtn" onclick="say()">🔊 Natural</button></div>';
 if(G.mode==='dict'){
  var opts=shuffle([{t:it.a,ok:true},{t:it.d[0],ok:false},{t:it.d[1],ok:false}]);
  G.opts=opts;
  opts.forEach(function(o,j){h+='<button class="opt" id="op'+j+'" onclick="pick('+j+')">'+esc(o.t)+'</button>';});
 } else if(G.mode==='par'){
  G.word=Math.random()<0.5?it.a:it.b;
  var order=shuffle([{t:it.a,ok:G.word===it.a},{t:it.b,ok:G.word===it.b}]);
  G.opts=order;
  order.forEach(function(o,j){h+='<button class="opt" id="op'+j+'" onclick="pick('+j+')">'+esc(o.t)+'</button>';});
  h+='<div class="cmeta" style="text-align:center;margin-top:8px">'+esc(it.hint)+'</div>';
 } else {
  var n=it,ds=[];
  var c1=n+(n>=100?Math.max(50,Math.round(n*0.1/50)*50):(n>=16?10:1));
  var c2=n>=100?(n>=1000?n+1000:n+100):(n>=13?n-10:n+2);
  [c1,c2].forEach(function(x){if(x!==n&&x>=0&&ds.indexOf(x)<0)ds.push(x);});
  while(ds.length<2)ds.push(n+ds.length+3);
  var opts2=shuffle([{t:String(n).replace(/\B(?=(\d{3})+(?!\d))/g,'.'),ok:true},{t:String(ds[0]).replace(/\B(?=(\d{3})+(?!\d))/g,'.'),ok:false},{t:String(ds[1]).replace(/\B(?=(\d{3})+(?!\d))/g,'.'),ok:false}]);
  G.opts=opts2;
  opts2.forEach(function(o,j){h+='<button class="opt" id="op'+j+'" onclick="pick('+j+')">'+esc(o.t)+'</button>';});
 }
 h+='<div id="fbz"></div></div>';
 app.innerHTML=h;window.scrollTo(0,0);
 setTimeout(function(){say();},350);
}
function pick(j){
 var it=G.items[G.i],ok=G.opts[j].ok;
 G.opts.forEach(function(o,k){var el=document.getElementById('op'+k);if(el){el.disabled=true;if(o.ok)el.classList.add('ok');}});
 var el=document.getElementById('op'+j);
 if(el&&!ok)el.classList.add('no');
 if(ok)G.score++;
 var why=G.mode==='dict'?it.why:(G.mode==='par'?it.why:'You heard: '+numEs(G.mode==='num'?it:0));
 if(!ok){
  if(G.mode==='dict')mochFeed('Listen: which is it? (say it aloud)',it.a,it.why);
  else if(G.mode==='par')mochFeed('Twin words: '+it.a+' / '+it.b+' — which means "'+it.hint.split(' · ')[G.word===it.a?0:1]+'"?',G.word,it.why);
  else mochFeed('Number by ear: '+numEs(it),String(it),'Say it back out loud.');
 }
 var fb=document.getElementById('fbz');
 if(fb)fb.innerHTML='<div class="fb '+(ok?'fbok':'fbno')+'">'+(ok?'✓ ':'✗ ')+esc(why)+'</div><button class="gbtn" onclick="G.i++;round()">'+(G.i+1>=G.items.length?'See results →':'Next →')+'</button>';
}
function finish(){
 var B=bestLoad(),prev=B[G.key]||0,nb=G.score>prev;
 if(nb){B[G.key]=G.score;bestSave(B);}
 var h=nav()+'<div class="gcard" style="text-align:center"><h2>'+(G.score>=8?'🏆':(G.score>=6?'💪':'👂'))+' '+G.score+' / '+G.items.length+'</h2>';
 h+='<p style="font-size:14px;color:var(--ink2);line-height:1.6;margin:8px 0">'+(nb?'New personal best! ':'')+(G.score>=8?'Your ears are pulling their weight.':(G.score>=6?'Solid — the twins are separating.':'Every miss just joined your Mochila — the pack will bring them back at the perfect moment.'))+'</p>';
 h+='<button class="gbtn" onclick="'+(G.mode==='dict'?'dictStart(\''+G.items[0].lv+'\')':(G.mode==='par'?'parStart()':'numStart('+G.key.slice(1)+')'))+'">Again →</button><button class="gbtn ghost" onclick="home()">Back to the gym</button></div>';
 app.innerHTML=h;window.scrollTo(0,0);
}
home();
</script>
