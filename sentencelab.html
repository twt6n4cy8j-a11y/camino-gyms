function quitSession(){S=null;home();}
function nextItem(){if(S.i>=S.queue.length)return finish();render();}
function head(){var pct=Math.round(S.i/S.queue.length*100);return '<div class="ghead"><button class="quit" onclick="quitSession()">✕ Salir</button><div class="gmeta"><span class="gname">'+esc(S.name)+'</span><span class="gstat">'+(S.i+1)+' / '+S.queue.length+' · ✓ '+S.correct+' · 🔥 '+S.streak+'</span></div><div class="gbar"><div class="gbarfill" style="width:'+pct+'%"></div></div></div>';}

function render(){var it=S.queue[S.i],m=S.mode;var h=head()+'<div class="gcard">';
 if(m==='fill'){
  var blanked=it.es.replace(it.vform,'_____');
  h+='<div class="big">'+esc(blanked)+'</div><div class="sub">'+esc(it.en)+'</div>'
   +'<div class="vask2">'+esc(it.inf)+' · <b>'+esc(it.subj.es)+'</b> · '+TLAB(it.tense)+'</div>'
   +'<input id="vin" class="vin" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="el verbo…" onkeydown="if(event.key===\'Enter\')checkFill()">'
   +'<div><button class="gbtn" onclick="checkFill()">Revisar</button> <button class="gbtn ghost hintbtn" onclick="hintFill()">💡 Pista</button></div><div class="hintline" id="hintline"></div>';
 } else if(m==='tr'){
  h+='<div class="big">'+esc(it.es)+'</div> '+sayBtn(it.es)
   +'<div class="sub">¿Qué significa en inglés?</div><div id="trrev"></div>'
   +'<div><button class="gbtn" onclick="revealTr()">Ver traducción</button></div>';
 } else { /* build */
  var words=shuffle(it.es.replace(/[.]/g,'').split(' ').slice());
  h+='<div class="sub">Ordena para decir:</div><div class="big" style="font-size:18px">“'+esc(it.en)+'”</div>'
   +'<div class="answ" id="answ"></div><div class="bank" id="bank">'+words.map(function(w,i){return '<button class="wb" data-i="'+i+'" onclick="bAdd(this)">'+esc(w)+'</button>';}).join('')+'</div>'
   +'<div><button class="gbtn" onclick="checkBuild()">Revisar</button> <button class="gbtn ghost" onclick="bClear()">↺</button></div>';
  BB=[];
 }
 h+='<div class="gfb" id="gfb"></div></div>';app.innerHTML=nav()+h;
 var inp=document.getElementById('vin');if(inp)inp.focus();
}
function fb(ok,msg){var el=document.getElementById('gfb');el.innerHTML='<div class="'+(ok?'fbok':'fbno')+'">'+msg+'</div><button class="gbtn next" onclick="nextItem2()">'+(S.i+1>=S.queue.length?'Ver resultado →':'Siguiente →')+'</button>';if(ok){S.correct++;S.streak++;}else S.streak=0;}
function nextItem2(){S.i++;nextItem();}
function checkFill(){var it=S.queue[S.i],inp=document.getElementById('vin');if(!inp||inp.disabled)return;inp.disabled=true;var ok=strip(inp.value)===strip(it.vform);
 fb(ok,(ok?'✓ ':'✗ ')+'<b>'+esc(it.es)+'</b> '+sayBtn(it.es)+'<br><span class="muted">'+esc(it.en)+'</span>'+(ok?'':'<br><span class="muted">forma: '+esc(it.vform)+'</span>'));}
function hintFill(){var it=S.queue[S.i];var a=it.vform;var masked=a.split('').map(function(c,i){return i===0?c:'_';}).join('');var el=document.getElementById('hintline');if(el)el.innerHTML='💡 <span class="masked">'+masked+'</span> <span class="muted">('+a.length+' letras)</span>';}
function revealTr(){var it=S.queue[S.i];document.getElementById('trrev').innerHTML='<div class="trans">'+esc(it.en)+'</div>';var el=document.getElementById('gfb');el.innerHTML='<button class="gbtn next" onclick="nextItem2()">'+(S.i+1>=S.queue.length?'Ver resultado →':'Siguiente →')+'</button> <button class="gbtn ghost" onclick="markTr(1)">✓ La sabía</button> <button class="gbtn ghost" onclick="markTr(0)">✗ No</button>';}
function markTr(ok){if(ok){S.correct++;S.streak++;}else S.streak=0;nextItem2();}
/* build */
var BB=[];
function bAdd(btn){var i=+btn.getAttribute('data-i');if(BB.indexOf(i)>=0)return;BB.push(i);btn.disabled=true;bRender();}
function bClear(){BB=[];document.querySelectorAll('#bank .wb').forEach(function(b){b.disabled=false;});document.getElementById('answ').innerHTML='';}
function bRender(){var bank=document.getElementById('bank');var answ=document.getElementById('answ');var words=Array.prototype.map.call(bank.querySelectorAll('.wb'),function(b){return b.textContent;});answ.innerHTML=BB.map(function(i){return '<span class="wb wa">'+esc(words[i])+'</span>';}).join('');}
function checkBuild(){var it=S.queue[S.i];var bank=document.getElementById('bank');var words=Array.prototype.map.call(bank.querySelectorAll('.wb'),function(b){return b.textContent;});var built=BB.map(function(i){return words[i];}).join(' ');var ok=strip(built)===strip(it.es);
 fb(ok,(ok?'✓ ':'✗ ')+'<b>'+esc(it.es)+'</b> '+sayBtn(it.es)+'<br><span class="muted">'+esc(it.en)+'</span>');}
function finish(){var acc=Math.round(S.correct/S.queue.length*100);var msg=acc>=90?'🏆 ¡Excelente!':acc>=70?'💪 ¡Bien hecho!':acc>=50?'👍 Vas mejorando.':'🌱 Sigue practicando.';
 app.innerHTML=nav()+'<div class="gcard done"><div class="bigemoji">'+msg.split(' ')[0]+'</div><h2>'+esc(S.name)+'</h2><div class="score">'+S.correct+' / '+S.queue.length+'<span class="scsub">'+acc+'%</span></div><div class="brow"><button class="gbtn" onclick="startMode(\''+S.mode+'\')">↻ Otra vez</button><button class="gbtn ghost" onclick="home()">🏠 Inicio</button></div></div>';}
function home(){S=null;
 var h='<div class="hero"><h1>📝 Sentence Lab</h1><p>Put it together — conjugate verbs inside real sentences, translate, and build word order. Correct grammar, every time.</p></div>';
 h+=levelBar();
 h+='<div class="wgrid">';
 [['fill','✍️','Completa el verbo','Fill the missing verb in a full sentence.'],['tr','🔄','Traduce la frase','Read a Spanish sentence; reveal the English.'],['build','🧩','Ordena las palabras','Arrange the words into the right order.']].forEach(function(m){h+='<div class="wcard" onclick="startMode(\''+m[0]+'\')"><div class="wemoji">'+m[1]+'</div><div class="wbody"><div class="wname">'+m[2]+'</div><div class="wdesc">'+m[3]+'</div></div></div>';});
 h+='</div>';
 app.innerHTML=nav()+h;
}
var app=document.getElementById('app');
home();

</script></body></html>
