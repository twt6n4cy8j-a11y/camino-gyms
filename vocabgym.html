*{box-sizing:border-box}
body{margin:0;font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#faf3ea;color:#33202e;-webkit-font-smoothing:antialiased}
#app{max-width:760px;margin:0 auto;padding:0 16px 60px}

{"es":"aplauso","art":"el","g":"m","en":"applause","gid":"o","pos":"noun","lvl":"B2"},{"es":"gira","art":"la","g":"f","en":"tour","gid":"a","pos":"noun","lvl":"B2"},{"es":"difusión","art":"la","g":"f","en":"broadcasting","gid":"cion","pos":"noun","lvl":"B2"},{"es":"retransmisión","art":"la","g":"f","en":"live broadcast","gid":"cion","pos":"noun","lvl":"B2"},{"es":"grabación","art":"la","g":"f","en":"recording","gid":"cion","pos":"noun","lvl":"B2"},{"es":"montaje","art":"el","g":"m","en":"editing","gid":"other","pos":"noun","lvl":"B2"},{"es":"plano","art":"el","g":"m","en":"shot (film)","gid":"o","pos":"noun","lvl":"B2"},{"es":"rodaje","art":"el","g":"m","en":"filming","gid":"other","pos":"noun","lvl":"B2"},{"es":"cartelera","art":"la","g":"f","en":"listings","gid":"a","pos":"noun","lvl":"B2"},{"es":"doblaje","art":"el","g":"m","en":"dubbing","gid":"other","pos":"noun","lvl":"B2"},{"es":"subtítulo","art":"el","g":"m","en":"subtitle","gid":"o","pos":"noun","lvl":"B2"},{"es":"reseña","art":"la","g":"f","en":"review","gid":"a","pos":"noun","lvl":"B2"},{"es":"boletín","art":"el","g":"m","en":"bulletin","gid":"other","pos":"noun","lvl":"B2"},{"es":"historieta","art":"la","g":"f","en":"comic strip","gid":"a","pos":"noun","lvl":"B2"},{"es":"cómic","art":"el","g":"m","en":"comic","gid":"other","pos":"noun","lvl":"B2"},{"es":"retrato","art":"el","g":"m","en":"portrait","gid":"o","pos":"noun","lvl":"B2"},{"es":"autorretrato","art":"el","g":"m","en":"self-portrait","gid":"o","pos":"noun","lvl":"B2"},{"es":"bodegón","art":"el","g":"m","en":"still life","gid":"other","pos":"noun","lvl":"B2"}]}},"genderFamilies":[{"id":"o","label":"-o → masculine","rule":"Nouns ending in -o are almost always masculine: el libro, el carro, el dinero.","g":"m","exc":["la mano","la foto","la moto","la radio"],"examples":[{"es":"hermano","art":"el","en":"brother"},{"es":"hijo","art":"el","en":"son"},{"es":"abuelo","art":"el","en":"grandfather"},{"es":"tío","art":"el","en":"uncle"},{"es":"primo","art":"el","en":"cousin (m)"},{"es":"sobrino","art":"el","en":"nephew"},{"es":"esposo","art":"el","en":"husband"},{"es":"amigo","art":"el","en":"friend (m)"},{"es":"novio","art":"el","en":"boyfriend"},{"es":"vecino","art":"el","en":"neighbor"}]},{"id":"a","label":"-a → feminine","rule":"Nouns ending in -a are usually feminine: la casa, la mesa, la silla.","g":"f","exc":["el día","el mapa","el sofá","el clima"],"examples":[{"es":"hermana","art":"la","en":"sister"},{"es":"hija","art":"la","en":"daughter"},{"es":"abuela","art":"la","en":"grandmother"},{"es":"tía","art":"la","en":"aunt"},{"es":"esposa","art":"la","en":"wife"},{"es":"amiga","art":"la","en":"friend (f)"},{"es":"novia","art":"la","en":"girlfriend"},{"es":"niña","art":"la","en":"girl"},{"es":"cabeza","art":"la","en":"head"},{"es":"boca","art":"la","en":"mouth"}]},{"id":"cion","label":"-ción · -dad · -tad → feminine","rule":"These endings are reliably feminine: la nación, la ciudad, la libertad. (Plus -sión, -tud, -umbre.)","g":"f","exc":[],"examples":[{"es":"bondad","art":"la","en":"kindness"},{"es":"habitación","art":"la","en":"room / bedroom"},{"es":"natación","art":"la","en":"swimming"},{"es":"estación","art":"la","en":"station"},{"es":"ciudad","art":"la","en":"city"},{"es":"aplicación","art":"la","en":"app"},{"es":"contaminación","art":"la","en":"pollution"},{"es":"sostenibilidad","art":"la","en":"sustainability"},{"es":"sociedad","art":"la","en":"society"},{"es":"libertad","art":"la","en":"freedom"}]},{"id":"ma","label":"-ma (Greek roots) → masculine","rule":"A set of -ma words from Greek are masculine even though they end in -a: el problema, el tema, el programa, el sistema, el idioma.","g":"m","exc":[],"examples":[{"es":"clima","art":"el","en":"climate"},{"es":"programa","art":"el","en":"program"},{"es":"problema","art":"el","en":"problem"},{"es":"poema","art":"el","en":"poem"}]},{"id":"or","label":"-or → masculine","rule":"Nouns ending in -or are typically masculine: el color, el amor, el calor.","g":"m","exc":["la flor","la labor"],"examples":[{"es":"amor","art":"el","en":"love"},{"es":"humor","art":"el","en":"mood / humor"},{"es":"comedor","art":"el","en":"dining room"},{"es":"tenedor","art":"el","en":"fork"},{"es":"probador","art":"el","en":"fitting room"},{"es":"calor","art":"el","en":"heat"},{"es":"agricultor","art":"el","en":"farmer"},{"es":"cargador","art":"el","en":"charger"},{"es":"actor","art":"el","en":"actor"},{"es":"escritor","art":"el","en":"writer"}]},{"id":"agua","label":"The 'el agua' trap → still feminine","rule":"A feminine noun starting with a stressed a- takes el/un for sound, but stays feminine: el agua fría, las aguas, el área.","g":"f","exc":[],"examples":[{"es":"agua","art":"el","en":"water"}]},{"id":"other","label":"-e & consonants → learn each","rule":"Nouns ending in -e or a consonant can be either gender — there's no shortcut, so learn the article with the word: el coche but la noche; el pan but la sal.","g":null,"exc":[],"examples":[{"es":"padre","art":"el","en":"father"},{"es":"madre","art":"la","en":"mother"},{"es":"bebé","art":"el","en":"baby"},{"es":"gente","art":"la","en":"people"},{"es":"nariz","art":"la","en":"nose"},{"es":"diente","art":"el","en":"tooth"},{"es":"pie","art":"el","en":"foot"},{"es":"corazón","art":"el","en":"heart"},{"es":"sangre","art":"la","en":"blood"},{"es":"piel","art":"la","en":"skin"}]}],"cognates":[{"id":"cion","es":"-ción","en":"-tion","rule":"Spanish -ción maps to English -tion.","ex":[["nación","nation"],["información","information"],["educación","education"],["estación","station"]]},{"id":"dad","es":"-dad / -tad","en":"-ty","rule":"-dad and -tad map to -ty.","ex":[["ciudad","city"],["libertad","liberty"],["universidad","university"],["realidad","reality"]]},{"id":"mente","es":"-mente","en":"-ly","rule":"-mente forms adverbs, like English -ly.","ex":[["rápidamente","rapidly"],["claramente","clearly"],["finalmente","finally"]]},{"id":"oso","es":"-oso / -osa","en":"-ous","rule":"-oso/-osa maps to -ous.","ex":[["famoso","famous"],["curioso","curious"],["peligroso","dangerous"],["nervioso","nervous"]]},{"id":"ario","es":"-ario","en":"-ary","rule":"-ario maps to -ary.","ex":[["necesario","necessary"],["ordinario","ordinary"],["vocabulario","vocabulary"]]},{"id":"ancia","es":"-ancia / -encia","en":"-ance / -ence","rule":"-ancia/-encia map to -ance/-ence.","ex":[["importancia","importance"],["distancia","distance"],["paciencia","patience"],["diferencia","difference"]]},{"id":"ico","es":"-ico","en":"-ic / -ical","rule":"-ico maps to -ic or -ical.","ex":[["público","public"],["música","music"],["político","political"],["eléctrico","electric"]]},{"id":"ista","es":"-ista","en":"-ist","rule":"-ista maps to -ist (person).","ex":[["artista","artist"],["turista","tourist"],["dentista","dentist"]]},{"id":"ismo","es":"-ismo","en":"-ism","rule":"-ismo maps to -ism.","ex":[["turismo","tourism"],["optimismo","optimism"],["capitalismo","capitalism"]]},{"id":"aje","es":"-aje","en":"-age","rule":"-aje maps to -age (and is masculine).","ex":[["mensaje","message"],["viaje","voyage / trip"],["garaje","garage"]]}],"falseFriends":[{"es":"embarazada","looks":"embarrassed","means":"pregnant","note":"For embarrassed, say avergonzado/a."},{"es":"éxito","looks":"exit","means":"success","note":"Exit is la salida."},{"es":"ropa","looks":"rope","means":"clothes","note":"Rope is la cuerda."},{"es":"sopa","looks":"soap","means":"soup","note":"Soap is el jabón."},{"es":"actual","looks":"actual","means":"current / present","note":"Actual (real) is real/verdadero."},{"es":"librería","looks":"library","means":"bookshop","note":"Library is la biblioteca."},{"es":"carpeta","looks":"carpet","means":"folder","note":"Carpet is la alfombra."},{"es":"constipado","looks":"constipated","means":"having a cold","note":"Constipated is estreñido."},{"es":"sensible","looks":"sensible","means":"sensitive","note":"Sensible (reasonable) is sensato."},{"es":"fábrica","looks":"fabric","means":"factory","note":"Fabric is la tela."},{"es":"pariente","looks":"parent","means":"relative","note":"Parent is el padre / la madre."},{"es":"red","looks":"red","means":"net / network","note":"Red (color) is rojo."},{"es":"once","looks":"once","means":"eleven","note":"Once (one time) is una vez."},{"es":"largo","looks":"large","means":"long","note":"Large is grande."},{"es":"suceso","looks":"success","means":"event","note":"Success is el éxito."},{"es":"campo","looks":"camp","means":"field / countryside","note":"Camp is el campamento."},{"es":"lectura","looks":"lecture","means":"reading","note":"Lecture is la conferencia."},{"es":"molestar","looks":"molest","means":"to bother","note":"A classic verb trap."},{"es":"asistir","looks":"assist","means":"to attend","note":"To assist is ayudar."},{"es":"realizar","looks":"realize","means":"to carry out","note":"To realize is darse cuenta."},{"es":"recordar","looks":"record","means":"to remember","note":"To record is grabar."}]};</script><script>function nav(){return '<div class="topnav"><span class="brand" onclick="home()">📚 Vocab Gym</span><span class="nlinks"><a href="/">🏠 All tools</a><a href="/">← Explore</a><a onclick="home()">Inicio</a><a onclick="genderHub()">Género</a></span></div>';}</script><script>
/* ===================== VOCAB GYM ENGINE ===================== */
var V=window.VOCAB, THEMES=V.themes, GFAM=V.genderFamilies, COG=V.cognates, FF=V.falseFriends;
var GFBYID={};GFAM.forEach(function(f){GFBYID[f.id]=f;});
var WORDS=[];Object.keys(THEMES).forEach(function(tid){THEMES[tid].words.forEach(function(w){WORDS.push({es:w.es,art:w.art||'',g:w.g,en:w.en,gid:w.gid,pos:w.pos||'noun',theme:tid});});});
var ALLEN=WORDS.map(function(w){return w.en;});
function artes(w){return (w.art?w.art+' ':'')+w.es;}
var TORDER=(function(){var o=['NUM','TIME','COLOR','BODY','71','PHR','81','74','82','72','73','83','84','91','92','LOVE','ADJ','ADV','93','94','95','96','97','98'];var r=o.filter(function(k){return THEMES[k];});Object.keys(THEMES).forEach(function(k){if(r.indexOf(k)<0)r.push(k);});return r;})();

/* audio */
var _voices=[];function _lv(){try{_voices=window.speechSynthesis.getVoices()||[];}catch(e){_voices=[];}}
if('speechSynthesis' in window){_lv();window.speechSynthesis.onvoiceschanged=_lv;}
function pickES(){var pref=['Paulina','Mónica','Monica','Juan','Jorge','Diego','Google español','es-MX','es-US','es-419','es-'];for(var p=0;p<pref.length;p++)for(var i=0;i<_voices.length;i++){var v=_voices[i];if((v.name&&v.name.indexOf(pref[p])>=0)||(v.lang&&v.lang.indexOf(pref[p])>=0))return v;}for(var j=0;j<_voices.length;j++)if(_voices[j].lang&&_voices[j].lang.toLowerCase().indexOf('es')===0)return _voices[j];return null;}
function spk(t){if(!('speechSynthesis'in window))return;t=(t||'').replace(/\([^)]*\)/g,'').replace(/\[[^\]]*\]/g,'').replace(/[“”"]/g,'').replace(/\s+/g,' ').trim();if(!t)return;try{window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='es-MX';var v=pickES();if(v)u.voice=v;u.rate=.95;window.speechSynthesis.speak(u);}catch(e){}}

/* helpers */
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function esc(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function strip(s){return (''+s).toLowerCase().trim().replace(/[áàâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[íìîï]/g,'i').replace(/[óòôö]/g,'o').replace(/[úùûü]/g,'u').replace(/ñ/g,'n').replace(/^(el |la |los |las )/,'').replace(/\s+/g,' ');}
function sayBtn(t){return '<button class="say" onclick="spk(\''+t.replace(/'/g,"")+'\')">🔊</button>';}

/* SRS (Leitner) */
var IVL=[0,1,3,7,16,30];
function srsLoad(){try{return JSON.parse(localStorage.getItem('vocab_srs'))||{};}catch(e){return {};}}
function srsSave(o){try{localStorage.setItem('vocab_srs',JSON.stringify(o));}catch(e){}}
function srsHit(es,ok){var o=srsLoad();var r=o[es]||{box:0,due:0,seen:0,correct:0};r.seen++;if(ok){r.correct++;r.box=Math.min((r.box||0)+1,5);r.due=Date.now()+(IVL[r.box]||0)*86400000;}else{r.box=1;r.due=Date.now();}o[es]=r;srsSave(o);}
function dueList(){var o=srsLoad(),now=Date.now();return WORDS.filter(function(w){var r=o[w.es];return r&&r.due<=now;});}
function srsStats(){var o=srsLoad(),seen=0,learned=0;for(var k in o){seen++;if(o[k].box>=4)learned++;}return {seen:seen,learned:learned,due:dueList().length};}

/* gender-family mastery */
function gfLoad(){try{return JSON.parse(localStorage.getItem('vocab_gfam'))||{};}catch(e){return {};}}
function gfSave(o){try{localStorage.setItem('vocab_gfam',JSON.stringify(o));}catch(e){}}
function gfStats(id){var o=gfLoad();return o[id]||{correct:0,total:0};}
function gfHit(id,ok){var o=gfLoad();var s=o[id]||{correct:0,total:0};s.total++;if(ok)s.correct++;o[id]=s;gfSave(o);}
function gfGrasped(id){var s=gfStats(id);return s.correct>=8&&s.total>0&&s.correct/s.total>=0.8;}

/* ---------- session ---------- */
var S=null;
function pickFmt(w){var sing=(w.pos==='noun'&&(w.art==='el'||w.art==='la'));var base=sing?['mc_es_en','type_en_es','gender','listen']:['mc_es_en','type_en_es','mc_en_es','listen'];return rnd(base);}
var LEVELS=['A1','A2','B1','B2'];
function lvLoad(){try{return localStorage.getItem('vocab_lvl')||'A1';}catch(e){return 'A1';}}
var LV=lvLoad();
function lvIdx(l){var i=LEVELS.indexOf(l);return i<0?0:i;}
function lvlOk(w){return lvIdx(w.lvl||'A1')<=lvIdx(LV);}
function setLevel(l){LV=l;try{localStorage.setItem('vocab_lvl',l);}catch(e){}home();}
function levelBar(){var h='<div class="lvbar"><span class="lvlab">Your level:</span>';LEVELS.forEach(function(l){h+='<button class="lvbtn'+(LV===l?' on':'')+'" onclick="setLevel(\''+l+'\')">'+l+'</button>';});h+='<span class="lvhint">drilling '+(LV==='A1'?'A1 only':'A1\u2013'+LV)+'</span></div>';return h;}
function themeAvail(tid){var n=0;THEMES[tid].words.forEach(function(w){if(lvlOk(w))n++;});return n;}
function startTheme(tid){var src=THEMES[tid].words.filter(lvlOk);if(!src.length){themeView(tid);return;}var ws=shuffle(src.map(function(w){return {es:w.es,art:w.art||'',g:w.g,en:w.en,gid:w.gid,pos:w.pos||'noun',theme:tid};})).slice(0,20);
 S={name:THEMES[tid].name,queue:ws.map(function(w){return {w:w,fmt:pickFmt(w)};}),i:0,correct:0,streak:0,kind:'theme'};nextItem();}
function startReview(){var due=shuffle(dueList());if(!due.length){home();return;}
 S={name:'Repaso · Review',queue:due.map(function(w){return {w:w,fmt:pickFmt(w)};}),i:0,correct:0,streak:0,kind:'review'};nextItem();}
function startGfDrill(id){var pool=shuffle(WORDS.filter(function(w){return w.gid===id&&(w.art==='el'||w.art==='la');})).slice(0,14);if(!pool.length){gfamLearn(id);return;}
 S={name:'Género · '+GFBYID[id].label.split(' →')[0],queue:pool.map(function(w){return {w:w,fmt:'gender'};}),i:0,correct:0,streak:0,kind:'gfam',gid:id};nextItem();}
function startCog(){var items=[];COG.forEach(function(c){c.ex.forEach(function(p){items.push({es:p[0],en:p[1],pat:c});});});shuffle(items);items=items.slice(0,12);
 S={name:'Cognados · Cognates',queue:items.map(function(it){return {cog:it,fmt:'cog'};}),i:0,correct:0,streak:0,kind:'cog'};nextItem();}
function startFF(){var items=shuffle(FF.slice()).slice(0,Math.min(12,FF.length));
 S={name:'Falsos amigos · False friends',queue:items.map(function(it){return {ff:it,fmt:'ff'};}),i:0,correct:0,streak:0,kind:'ff'};nextItem();}
function quitSession(){S=null;home();}
function nextItem(){if(S.i>=S.queue.length)return finish();render();}

function head(){var pct=Math.round(S.i/S.queue.length*100);
 return '<div class="ghead"><button class="quit" onclick="quitSession()">✕ Salir</button><div class="gmeta"><span class="gname">'+esc(S.name)+'</span><span class="gstat">'+(S.i+1)+' / '+S.queue.length+' · ✓ '+S.correct+' · 🔥 '+S.streak+'</span></div><div class="gbar"><div class="gbarfill" style="width:'+pct+'%"></div></div></div>';}

function showHint(){var it=S.queue[S.i];if(!it||!it.w)return;var w=it.w;var es=w.es;var masked=es.split('').map(function(ch,i){return i===0?ch:(ch===' '?'\u00b7':'_');}).join('');var len=es.replace(/[^0-9A-Za-z\u00c0-\u017f]/g,'').length;var g=(w.pos==='noun'&&(w.art==='el'||w.art==='la'))?('<b>'+w.art+'</b> '):'';var fam=(w.gid&&GFBYID[w.gid])?(' <span class="muted">\u00b7 '+esc(GFBYID[w.gid].label.split(' \u2192')[0])+'</span>'):'';var el=document.getElementById('hintline');if(el)el.innerHTML='\ud83d\udca1 '+g+'<span class="masked">'+masked+'</span> <span class="muted">('+len+' letras)</span>'+fam;}
function render(){var it=S.queue[S.i],f=it.fmt;var h=head()+'<div class="gcard">';
 if(f==='mc_es_en'){var w=it.w;var opts=mcEN(w);h+='<div class="vask"><span class="big">'+esc(artes(w))+'</span> '+sayBtn(artes(w))+'</div><div class="sub">¿Qué significa?</div><div class="mcwrap">'+opts.map(function(o){return '<button class="mcopt" onclick="ans(this,'+(o===w.en?1:0)+')">'+esc(o)+'</button>';}).join('')+'</div>';}
 else if(f==='mc_en_es'){var w2=it.w;var opts2=mcES(w2);h+='<div class="vask"><span class="big">'+esc(w2.en)+'</span></div><div class="sub">Elige en español</div><div class="mcwrap">'+opts2.map(function(o){return '<button class="mcopt" onclick="ans(this,'+(o.es===w2.es?1:0)+')">'+esc(artes(o))+'</button>';}).join('')+'</div>';}
 else if(f==='type_en_es'){var w3=it.w;h+='<div class="vask"><span class="big">'+esc(w3.en)+'</span>'+(w3.g==='m'||w3.g==='f'?' <span class="gtag">('+w3.g+')</span>':'')+'</div><div class="sub">Escríbelo en español</div><input id="vin" class="vin" autocomplete="off" autocapitalize="off" spellcheck="false" onkeydown="if(event.key===\'Enter\')checkType()"><div><button class="gbtn" onclick="checkType()">Revisar</button> <button class="gbtn ghost hintbtn" onclick="showHint()">💡 Pista</button></div><div class="hintline" id="hintline"></div>';}
 else if(f==='gender'){var w4=it.w;h+='<div class="vask"><span class="big">___ '+esc(w4.es)+'</span> '+sayBtn(w4.art+' '+w4.es)+'</div><div class="sub">¿el o la?</div><div class="genbtns"><button class="genbtn" onclick="ansGender(this,\'el\')">el</button><button class="genbtn" onclick="ansGender(this,\'la\')">la</button></div>';}
 else if(f==='listen'){var w5=it.w;h+='<div class="vask"><span class="big">🎧</span> <button class="gbtn audio" onclick="spk(\''+artes(w5).replace(/'/g,'')+'\')">🔊 Repetir</button></div><div class="sub">Escribe la palabra que oyes ('+esc(w5.en)+')</div><input id="vin" class="vin" autocomplete="off" autocapitalize="off" spellcheck="false" onkeydown="if(event.key===\'Enter\')checkType()"><div><button class="gbtn" onclick="checkType()">Revisar</button> <button class="gbtn ghost hintbtn" onclick="showHint()">💡 Pista</button></div><div class="hintline" id="hintline"></div>';}
 else if(f==='cog'){var c=it.cog;var opts3=mcCog(c);h+='<div class="vask"><span class="big">'+esc(c.es)+'</span> '+sayBtn(c.es)+'</div><div class="sub">Cognado '+esc(c.pat.es)+' → '+esc(c.pat.en)+'. ¿En inglés?</div><div class="mcwrap">'+opts3.map(function(o){return '<button class="mcopt" onclick="ans(this,'+(o===c.en?1:0)+')">'+esc(o)+'</button>';}).join('')+'</div>';}
 else if(f==='ff'){var x=it.ff;var opts4=mcFF(x);h+='<div class="vask"><span class="big">'+esc(x.es)+'</span> '+sayBtn(x.es)+'</div><div class="sub">Parece <i>“'+esc(x.looks)+'”</i> — pero significa…</div><div class="mcwrap">'+opts4.map(function(o){return '<button class="mcopt" onclick="ans(this,'+(o===x.means?1:0)+')">'+esc(o)+'</button>';}).join('')+'</div>';}
 h+='<div class="gfb" id="gfb"></div></div>';
 app.innerHTML=nav()+h;
 if(f==='listen')setTimeout(function(){spk(it.w.art+' '+it.w.es);},300);
 var inp=document.getElementById('vin');if(inp)inp.focus();
}
function mcEN(w){var o=[w.en];var pool=shuffle(ALLEN.slice());for(var i=0;i<pool.length&&o.length<4;i++)if(o.indexOf(pool[i])<0)o.push(pool[i]);return shuffle(o);}
function mcES(w){var o=[w];var pool=shuffle(WORDS.slice());for(var i=0;i<pool.length&&o.length<4;i++)if(o.indexOf(pool[i])<0&&pool[i].es!==w.es)o.push(pool[i]);return shuffle(o);}
function mcCog(c){var o=[c.en];var all=[];COG.forEach(function(x){x.ex.forEach(function(p){all.push(p[1]);});});shuffle(all);for(var i=0;i<all.length&&o.length<4;i++)if(o.indexOf(all[i])<0)o.push(all[i]);return shuffle(o);}
function mcFF(x){var o=[x.means,x.looks];var all=FF.map(function(f){return f.means;});shuffle(all);for(var i=0;i<all.length&&o.length<4;i++)if(o.indexOf(all[i])<0)o.push(all[i]);return shuffle(o);}

function fb(ok,msg){var el=document.getElementById('gfb');el.innerHTML='<div class="'+(ok?'fbok':'fbno')+'">'+msg+'</div><button class="gbtn next" onclick="nextItem2()">'+(S.i+1>=S.queue.length?'Ver resultado →':'Siguiente →')+'</button>';if(ok){S.correct++;S.streak++;}else S.streak=0;}
function nextItem2(){S.i++;nextItem();}
function credit(ok){var it=S.queue[S.i];if(it.w)srsHit(it.w.es,ok);if(S.kind==='gfam')gfHit(S.gid,ok);if(it.w&&it.w.gid&&it.fmt==='gender')gfHit(it.w.gid,ok);}
function ans(btn,ok){var it=S.queue[S.i];document.querySelectorAll('#gfb,.mcopt');var btns=document.querySelectorAll('.mcopt');var correctTxt;
 if(it.fmt==='mc_es_en')correctTxt=it.w.en;else if(it.fmt==='mc_en_es')correctTxt=it.w.art+' '+it.w.es;else if(it.fmt==='cog')correctTxt=it.cog.en;else if(it.fmt==='ff')correctTxt=it.ff.means;
 btns.forEach(function(b){b.disabled=true;if(b.textContent===correctTxt)b.classList.add('ok');});if(!ok)btn.classList.add('no');
 credit(!!ok);
 var extra=it.ff?'<br><span class="muted">'+esc(it.ff.note||'')+'</span>':(it.w?'<br><span class="muted">'+esc(artes(it.w))+'</span> '+sayBtn(artes(it.w)):'');
 fb(!!ok,(ok?'✓ ¡Correcto!':'✗ '+esc(correctTxt))+extra);}
function checkType(){var it=S.queue[S.i],inp=document.getElementById('vin');if(!inp)return;var u=inp.value;inp.disabled=true;var ok=strip(u)===strip(it.w.es);credit(ok);
 fb(ok,(ok?'✓ ¡Bien! ':'✗ ')+'<b>'+esc(artes(it.w))+'</b> '+sayBtn(artes(it.w))+(ok?'':'<br><span class="muted">Tú: '+esc(u||'(nada)')+'</span>'));}
function ansGender(btn,choice){var it=S.queue[S.i];var ok=(choice===it.w.art);var btns=document.querySelectorAll('.genbtn');btns.forEach(function(b){b.disabled=true;if(b.textContent===it.w.art)b.classList.add('ok');});if(!ok)btn.classList.add('no');credit(ok);
 var why=GFBYID[it.w.gid];fb(ok,(ok?'✓ ':'✗ ')+'<b>'+esc(artes(it.w))+'</b> '+sayBtn(artes(it.w))+(why?'<br><span class="muted">'+esc(why.label)+'</span>':''));}

function finish(){var acc=Math.round(S.correct/S.queue.length*100);var msg=acc>=90?'🏆 ¡Excelente!':acc>=70?'💪 ¡Bien hecho!':acc>=50?'👍 Vas mejorando.':'🌱 Sigue practicando.';
 var grasped=(S.kind==='gfam'&&gfGrasped(S.gid))?'<div class="famgrasped">🎉 ¡Dominaste el género de esta familia!</div>':'';
 var again=S.kind==='theme'?'startTheme(\''+keyOfTheme(S.name)+'\')':S.kind==='gfam'?'startGfDrill(\''+S.gid+'\')':S.kind==='cog'?'startCog()':S.kind==='ff'?'startFF()':'startReview()';
 app.innerHTML=nav()+'<div class="gcard done"><div class="bigemoji">'+msg.split(' ')[0]+'</div><h2>'+esc(S.name)+'</h2><div class="score">'+S.correct+' / '+S.queue.length+'<span class="scsub">'+acc+'%</span></div>'+grasped+'<div class="brow"><button class="gbtn" onclick="'+again+'">↻ Otra vez</button><button class="gbtn ghost" onclick="home()">🏠 Inicio</button></div></div>';}
function keyOfTheme(name){for(var k in THEMES)if(THEMES[k].name===name)return k;return TORDER[0];}

/* ---------- browse / learn screens ---------- */
function themeView(tid){var t=THEMES[tid];var st=srsLoad();
 var h='<div class="famhead"><button class="quit" onclick="home()">← Inicio</button><h1>'+esc(t.name)+'</h1><p>'+themeAvail(tid)+' of '+t.words.length+' words at your level ('+LV+') · tap any to hear it.</p></div>';
 h+='<div class="gcard"><div class="wordlist">';
 t.words.forEach(function(w){var r=st[w.es];var dot=r?(r.box>=4?'<span class="dot ok"></span>':'<span class="dot mid"></span>'):'<span class="dot new"></span>';
  h+='<div class="wrow'+(lvlOk(w)?'':' above')+'" onclick="spk(\''+artes(w).replace(/'/g,'')+'\')">'+dot+'<span class="wes">'+esc(artes(w))+'</span><span class="wen">'+esc(w.en)+'</span><span class="lvchip lv'+(w.lvl||'A1')+'">'+(w.lvl||'A1')+'</span></div>';});
 h+='</div></div>';if(themeAvail(tid)>0){h+='<button class="gbtn big" onclick="startTheme(\''+tid+'\')">Drill this theme (A1\u2013'+LV+') \u2192</button>';}else{h+='<div class="locknote">\ud83d\udd12 No words at your level here yet. Raise your level above to unlock this theme.</div>';}
 app.innerHTML=nav()+h;window.scrollTo&&window.scrollTo(0,0);}

function genderHub(){var h='<div class="famhead"><button class="quit" onclick="home()">← Inicio</button><h1>⚥ Gender families</h1><p>El or la? It’s not random — learn these patterns and the traps.</p></div><div class="famgrid">';
 GFAM.forEach(function(f){var g=gfGrasped(f.id);var st=gfStats(f.id);var chip=g?'<span class="mchip ok">✓ Grasped</span>':(st.correct?'<span class="mchip learn">◐ '+st.correct+'/8</span>':'<span class="mchip new">· New</span>');
  h+='<div class="famcard'+(g?' done':'')+'" onclick="gfamLearn(\''+f.id+'\')"><div class="fmodel">'+esc(f.label.split(' →')[0])+'</div><div class="flabel">'+esc(f.label.indexOf('→')>=0?f.label.split('→')[1]:'')+'</div>'+chip+'</div>';});
 h+='</div>';app.innerHTML=nav()+h;window.scrollTo&&window.scrollTo(0,0);}
function gfamLearn(id){var f=GFBYID[id];var h='<div class="famhead"><button class="quit" onclick="genderHub()">← Gender</button><h1>'+esc(f.label)+'</h1></div>';
 h+='<div class="gcard"><div class="rulebox">💡 '+esc(f.rule)+'</div>';
 if(f.examples&&f.examples.length){h+='<div class="childhdr">Examples</div><div class="childwrap">'+f.examples.map(function(e){return '<span class="childchip" onclick="spk(\''+((e.art?e.art+' ':'')+e.es).replace(/'/g,'')+'\')">'+esc((e.art?e.art+' ':'')+e.es)+' <span class="muted">'+esc(e.en)+'</span></span>';}).join('')+'</div>';}
 if(f.exc&&f.exc.length){h+='<div class="childhdr">Watch out — exceptions</div><div class="childwrap">'+f.exc.map(function(x){return '<span class="childchip exc">'+esc(x)+'</span>';}).join('')+'</div>';}
 h+='<button class="gbtn big" onclick="startGfDrill(\''+id+'\')">Drill el/la →</button></div>';
 app.innerHTML=nav()+h;window.scrollTo&&window.scrollTo(0,0);}

function cognatesHub(){var h='<div class="famhead"><button class="quit" onclick="home()">← Inicio</button><h1>🔗 Cognates</h1><p>Thousands of words you already know — learn the suffix swaps.</p></div><div class="gcard">';
 COG.forEach(function(c){h+='<div class="cogrow"><div class="cogmap"><b>'+esc(c.es)+'</b> → <b>'+esc(c.en)+'</b></div><div class="muted">'+esc(c.rule)+'</div><div class="cogex">'+c.ex.map(function(p){return '<span class="childchip" onclick="spk(\''+p[0].replace(/'/g,'')+'\')">'+esc(p[0])+' · '+esc(p[1])+'</span>';}).join('')+'</div></div>';});
 h+='</div><button class="gbtn big" onclick="startCog()">Drill cognates →</button>';app.innerHTML=nav()+h;window.scrollTo&&window.scrollTo(0,0);}

function falseHub(){var h='<div class="famhead"><button class="quit" onclick="home()">← Inicio</button><h1>🚫 False friends</h1><p>Look-alikes that mean something else. Don’t get caught.</p></div><div class="gcard"><div class="wordlist">';
 FF.forEach(function(x){h+='<div class="wrow"><span class="wes">'+esc(x.es)+'</span><span class="wen">≠ <i>'+esc(x.looks)+'</i> · = <b>'+esc(x.means)+'</b></span></div>';});
 h+='</div></div><button class="gbtn big" onclick="startFF()">Drill false friends →</button>';app.innerHTML=nav()+h;window.scrollTo&&window.scrollTo(0,0);}

/* ---------- home ---------- */
function home(){S=null;var s=srsStats();
 var h='<div class="hero"><h1>📚 Vocab Gym</h1><p>Build real vocabulary — by theme, by gender pattern, and with spaced-repetition review that brings words back right before you forget them.</p><div class="statbar">Words seen: <b>'+s.seen+'</b> · Learned: <b>'+s.learned+'</b> · Due today: <b>'+s.due+'</b></div></div>';
 h+=levelBar();
 h+='<div class="reviewban"><div><div class="rbt">🔁 Daily review</div><div class="rbs">'+(s.due?s.due+' word'+(s.due>1?'s':'')+' ready to review':'Nothing due — drill a theme to add words')+'</div></div>'+(s.due?'<button class="gbtn" onclick="startReview()">Start review →</button>':'')+'</div>';
 h+='<h2 class="sec">🗂️ Themes</h2><div class="wgrid">';
 TORDER.forEach(function(tid){h+='<div class="wcard" onclick="themeView(\''+tid+'\')"><div class="wname">'+esc(THEMES[tid].name)+'</div><div class="wdesc">'+themeAvail(tid)+' / '+THEMES[tid].words.length+' words</div></div>';});
 h+='</div>';
 h+='<h2 class="sec">🧠 Skills</h2><div class="wgrid">';
 h+='<div class="wcard alt" onclick="genderHub()"><div class="wname">⚥ Gender families</div><div class="wdesc">el / la patterns &amp; traps</div></div>';
 h+='<div class="wcard alt" onclick="cognatesHub()"><div class="wname">🔗 Cognates</div><div class="wdesc">words you already know</div></div>';
 h+='<div class="wcard alt" onclick="falseHub()"><div class="wname">🚫 False friends</div><div class="wdesc">don’t get caught</div></div>';
 h+='</div>';
 app.innerHTML=nav()+h;window.scrollTo&&window.scrollTo(0,0);}
var app=document.getElementById('app');

home();
</script></body></html>
