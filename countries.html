<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Explora · El Camino Grande</title><style>:root{--ink:#33202e;--inktx:#33202e;--teal:#2456a6;--gold:#d18f2a;--green:#2f8a5b;--red:#c0392b;--muted:#9b8a93;--paper:#fffdf7;--soft:#f2ead9;--line:#e8dccb;--bg:#faf3ea;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--inktx);font-family:'Nunito Sans',-apple-system,Segoe UI,Helvetica,Arial,sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:18px 16px 60px}
h1{font-family:Fraunces,Georgia,serif;color:var(--ink);margin:0 0 4px;font-size:28px}h2{font-family:Fraunces,Georgia,serif;color:var(--ink);margin:0}
.sub{color:var(--muted);margin:4px 0 0}.tdesc{color:var(--muted);font-size:14px;margin:6px 0 0}.muted{color:var(--muted)}
.nav{display:flex;justify-content:space-between;align-items:center;padding:6px 0 14px;border-bottom:1px solid var(--line);margin-bottom:16px}
.nav .brand{font-family:Fraunces,Georgia,serif;font-weight:700;color:var(--ink);cursor:pointer}
.nav a{cursor:pointer;color:var(--muted);font-weight:700;font-size:14px;padding:6px 10px;border-radius:8px}.nav a:hover{background:var(--soft);color:var(--ink)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.hero{background:linear-gradient(135deg,#fff,var(--soft))}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{cursor:pointer;transition:transform .08s,border-color .15s}.tile:hover{transform:translateY(-2px);border-color:var(--teal)}
.tile.lock{opacity:.55;cursor:default}.tile.lock:hover{transform:none;border-color:var(--line)}
.row{display:flex;align-items:center;gap:10px}
.dnum,.ic{display:inline-flex;width:30px;height:30px;border-radius:999px;background:var(--teal);color:#fff;font-weight:700;align-items:center;justify-content:center;font-family:Fraunces,Georgia,serif;flex:none}
.dnum.lk{background:var(--muted)}.dnum.dok{background:var(--green)}.ic{background:var(--gold);font-size:16px}
.dttl{font-weight:700;color:var(--ink)}.dsub{color:var(--muted);font-size:13.5px;margin-top:6px}
.kick{text-transform:uppercase;letter-spacing:.5px;font-size:11.5px;color:var(--muted);font-weight:700}
.status{margin-top:8px;font-size:12.5px;font-weight:700}.status.done{color:var(--green)}.status.go{color:var(--teal)}.status.lk{color:var(--muted)}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.count{color:var(--muted);font-weight:700;font-size:13px}
.btn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-weight:700;font-size:14px;color:var(--inktx);cursor:pointer}
.btn:hover{border-color:var(--teal)}.btn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}.btn.ghost{border:none;background:none;color:var(--muted)}
.navrow{display:flex;justify-content:space-between;margin-top:6px}
.hb{background:none;border:none;cursor:pointer;font-size:15px;padding:0 4px;vertical-align:middle}
.phon{color:var(--muted);font-style:italic;font-size:15px;margin-top:2px}
.hs{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.hs .lbl{text-transform:uppercase;letter-spacing:.5px;font-size:11px;color:var(--muted);font-weight:700}
.hs .es{font-family:Fraunces,Georgia,serif;font-size:20px;color:var(--ink);margin-top:3px}.hs .en{color:var(--muted);font-size:13.5px;margin-top:2px}
.hs .arrow{text-align:center;color:var(--teal);font-size:18px;margin:6px 0}.hs .say .es{color:var(--teal)}
.bigq{font-family:Fraunces,Georgia,serif;font-size:24px;color:var(--ink);margin:6px 0 2px}.en{color:var(--muted);font-size:14px}
.prompt2{margin:14px 0 8px;font-weight:700;color:var(--ink)}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;font-weight:600;background:#fff}.opt:hover{border-color:var(--teal)}
.opt.ok{border-color:var(--green);background:#E6F2E9}.opt.bad{border-color:var(--red);background:#F9E7E6}
.why{margin-top:12px;border-radius:10px;padding:0;max-height:0;overflow:hidden;transition:.2s}.why.show{padding:12px;max-height:240px}
.chat{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.bub{padding:10px 12px;border-radius:12px;max-width:88%}
.bub.them{background:var(--soft);align-self:flex-start}.bub.you{background:#E6F2E9;align-self:flex-end}.bub.youq{background:#F6ECD9;align-self:flex-end;font-style:italic}
.bub .en{font-size:12.5px;margin-top:3px}
.done{text-align:center}.done .big{font-size:44px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}.cog{display:inline-block;background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:6px 13px;margin:5px 5px 0 0;font-weight:600;cursor:pointer;font-size:14px}
.cog:hover{border-color:var(--teal)}

.cmWrap{display:flex;flex-direction:column;align-items:center;gap:13px;margin-top:10px}
.cmSvg{display:block}
.cmSvg .cmShape{fill:none;stroke:#1d2c45;stroke-width:1;stroke-linejoin:round;stroke-linecap:round}
.cmSvg .cpt{cursor:pointer}
.cmSvg .cpt .dot{transition:stroke-width .1s}
.cmSvg .cpt.on .dot,.cmSvg .cpt:hover .dot{stroke:#15233B;stroke-width:2.4}
.cmInfo{display:flex;gap:13px;align-items:center;min-height:66px;background:var(--soft);border:1px solid var(--line);border-radius:13px;padding:13px 15px;width:100%;box-sizing:border-box}
.cmIic{font-size:30px;line-height:1}
.cmIn{font-weight:700;color:var(--ink);font-size:16px}
.cmIb{color:var(--muted);font-size:13.5px;line-height:1.45;margin-top:3px}
.cmHint{color:var(--muted);font-style:italic;width:100%;text-align:center}
.cmChips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.cmChip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;color:var(--ink);cursor:pointer;font-family:inherit;line-height:1.2}
.cmChip.on,.cmChip:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.cmDot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
.cmLeg{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-size:11.5px;color:var(--muted);margin-top:2px}
.cmLeg span{display:inline-flex;align-items:center;gap:5px}
.cmLeg i{width:9px;height:9px;border-radius:50%;display:inline-block}

.cghead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.vtog{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
.vtog button{border:none;background:#fff;padding:7px 15px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink)}
.vtog button.on{background:var(--ink);color:#fff}
.rmapwrap{display:flex;justify-content:center;margin-top:4px}
.rmap .rco{fill:none;stroke:#33455f;stroke-width:0.8;stroke-linejoin:round}
.rmap .rc{cursor:pointer}
.rmap .rc:hover .rco,.rmap .rc.on .rco{stroke:#15233B;stroke-width:2}
.rmap .rc:hover,.rmap .rc.on{filter:brightness(1.09)}
.rmaplabel{text-align:center;font-size:15px;color:var(--ink);min-height:22px;margin-bottom:6px;font-weight:500}
.atl{margin-top:14px}
.atlh{text-transform:uppercase;letter-spacing:.5px;font-size:11.5px;color:var(--muted);text-align:center;margin-bottom:9px}
.atltiles{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.atltile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 10px;cursor:pointer;font-family:inherit;color:var(--ink);font-size:14px;width:140px;min-height:100px;box-sizing:border-box;text-align:center;line-height:1.2}
.atltile:hover{background:var(--soft);border-color:var(--ink)}
.cmPhoto{flex:none;width:106px;height:80px;border-radius:10px;overflow:hidden;background:var(--line)}
.cmPhoto img{width:100%;height:100%;object-fit:cover;display:block}
.cmPhPlace{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:30px;background:var(--soft)}
.rmap .rcxo{fill:#dde4ee;stroke:#b6c2d4;stroke-width:0.7;stroke-linejoin:round}
.rmap .rcx{cursor:default}
.rmap .rcx:hover .rcxo,.rmap .rcx.on .rcxo{fill:#c6d1e1}
.rmapcap{text-align:center;font-size:11.5px;color:var(--muted);margin-top:9px}

.mgrid{display:flex;gap:12px;margin-top:8px}
.mcol{flex:1;display:flex;flex-direction:column;gap:8px}
.mb{padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink);text-align:left;line-height:1.3}
.mb.msel{border-color:var(--ink);background:var(--soft)}
.mb.mok{background:#E6F2E9;border-color:#2f8a5b;color:#22745f;cursor:default}
.mb.mbad{background:#F9E7E6;border-color:#c44}
.finput{padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:16px;font-family:inherit;width:55%;margin-right:8px;box-sizing:border-box}
.hearmini{color:var(--muted);font-size:12.5px;margin-top:6px;font-style:italic}
.buildans{min-height:46px;border:1px dashed var(--line);border-radius:10px;padding:10px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:12px 0}
.buildbank{display:flex;flex-wrap:wrap;gap:7px}
.wb{padding:9px 13px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;color:var(--ink)}
.wb.used{opacity:.32;cursor:default}
.wb.wa{background:var(--soft);border-color:var(--ink)}

.waiterb{display:flex;gap:12px;align-items:center;background:linear-gradient(135deg,#fff,var(--soft));border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
.waiterb .av{font-size:32px;flex:none}.waiterb .rwl{font-size:16px;font-family:Fraunces,Georgia,serif;color:var(--ink)}
.rmealbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.rmealb{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:7px 13px;font-size:13px;font-family:inherit;cursor:pointer}
.rmealb.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.rcat{font-family:Fraunces,Georgia,serif;font-size:17px;color:var(--gold);border-bottom:2px solid var(--soft);padding-bottom:6px;margin:16px 0 9px}
.ritem{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:11px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px;background:#fff}
.rnm{font-size:16px;font-weight:600}.resD{color:var(--ink);font-size:13.5px;margin-top:4px}
.ren{color:var(--muted);font-size:13px;margin-top:4px;display:none;font-style:italic}
.rrev{color:var(--teal);font-size:12px;cursor:pointer;margin-top:4px;display:inline-block}
.rright{text-align:right;flex:none}.rprice{font-weight:700;margin-bottom:6px}
.rpr{padding:8px 0;border-bottom:1px solid var(--soft)}.res{font-weight:600}.ren2{color:var(--muted);font-size:13px}
.billrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line)}
.billtot{display:flex;justify-content:space-between;font-size:20px;font-weight:700;margin-top:12px;padding-top:10px;border-top:2px solid var(--ink)}
.curline{display:flex;align-items:center;gap:10px;margin:9px 0}.curline label{width:46px;font-weight:700;font-size:15px}
.curin{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:16px;font-family:inherit}
.currate{margin-top:10px;color:var(--ink);font-size:14px}
.rlive{background:#E6F2E9;color:#22745f;border-radius:6px;padding:1px 6px;font-size:11px;margin-left:4px}
.rapx{background:#F5EFD9;color:#8a6d1a;border-radius:6px;padding:1px 6px;font-size:11px;margin-left:4px}
.currow{display:flex;gap:14px;align-items:center}
.curpic{width:118px;height:76px;border-radius:10px;overflow:hidden;background:var(--soft);flex:none;border:1px solid var(--line)}
.curph{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:30px}
.curfact{background:var(--soft);border-radius:10px;padding:11px 13px;font-size:13.5px;color:var(--ink);margin-top:12px;line-height:1.45}
.billgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px}
.billimg{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--soft)}
.billimg img{width:100%;display:block}
select.curin{background:#fff}
.denrow{margin:11px 0}
.denlbl{font-weight:600;margin-bottom:6px}
.denchips{display:flex;flex-wrap:wrap;gap:7px}
.denchip{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:14px;font-weight:600;color:var(--ink)}

.cxbtn{background:#2456a6;color:#fff;border:0;border-radius:10px;padding:10px 18px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px}
.cxbtn:hover{background:#1a4488}
.cxprog{font-size:12px;color:#5c4759;margin-bottom:6px;font-weight:600}
.cxq{font-size:17px;margin-bottom:12px;line-height:1.45}
.cxopts{display:flex;flex-direction:column;gap:8px}
.cxopt{text-align:left;background:#faf3ea;border:2px solid transparent;border-radius:10px;padding:11px 14px;font-size:16px;cursor:pointer;font-family:inherit}
.cxopt:hover:enabled{background:#f3e6d7}
.cxopt.ok{background:#dcfce7;border-color:#2f8a5b}
.cxopt.no{background:#fcebe7;border-color:#c8503f}
.cxopt:disabled{cursor:default}
.cxfb{margin-top:12px;font-size:14px;line-height:1.5}
.cxok{color:#2f8a5b;font-weight:700}.cxno{color:#c8503f;font-weight:700}
.cxsay{background:#eef2ff;border:0;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:13px}
.cxdone{font-size:20px;font-weight:700;margin-bottom:4px}
.rprog{display:flex;align-items:center;gap:4px;margin:0 0 12px;flex-wrap:wrap}
.rdot{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:18px;color:var(--muted);opacity:.45}
.rdot span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.rdot.on{opacity:1;color:var(--teal)} .rdot.done{opacity:1;color:var(--green)}
.rdline{flex:1;height:2px;background:var(--line);min-width:12px}
.rnav,.rnav2{display:flex;justify-content:space-between;gap:10px;margin-top:14px;flex-wrap:wrap}
.rnav2{justify-content:flex-end}
.rordc .billrow{margin-top:6px}
.rdel{border:none;background:none;color:var(--red);cursor:pointer;font-weight:700;font-size:13px;margin-left:6px}
.dlab{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:10px 0 6px}
.denomgrid{display:flex;flex-wrap:wrap;gap:8px}
.denomb{position:relative;border:2px solid var(--line);background:var(--soft);border-radius:10px;padding:10px 14px;font-weight:800;font-size:15px;color:var(--inktx);cursor:pointer;min-width:60px}
.denomb:hover{border-color:var(--teal)}
.denomb.has{border-color:var(--teal);background:#e9f4f2}
.denomb .dq{position:absolute;top:-8px;right:-8px;background:var(--teal);color:#fff;border-radius:99px;font-size:11px;padding:2px 6px}
.paytray{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.paychip{display:inline-flex;align-items:center;gap:6px;background:var(--soft);border:1px solid var(--line);border-radius:99px;padding:5px 6px 5px 12px;font-weight:700;font-size:14px}
.paychip button{border:none;background:var(--red);color:#fff;border-radius:99px;width:22px;height:22px;cursor:pointer;font-weight:800;line-height:1}
.paydue{display:flex;justify-content:space-between;align-items:center;gap:14px}
.paybig{font-family:Fraunces,Georgia,serif;font-size:26px;font-weight:700;color:var(--inktx)}
.paybig.ok{color:var(--green)}
.changeprev{margin-top:10px;background:var(--soft);border-radius:10px;padding:10px 12px;font-size:15px}
.changeprev.ok{color:var(--green);font-weight:700}
.changebox{background:var(--soft);border-radius:12px;padding:12px 14px;text-align:left}


.legbadge{display:inline-block;margin-top:10px;background:linear-gradient(140deg,#e8a33d,#d18f2a);color:#4a2e05;border-radius:99px;padding:7px 14px;font-weight:800;font-size:13px;text-decoration:none;box-shadow:0 3px 10px -4px rgba(232,163,61,.6)}
.muswrap{margin-top:10px;font-size:13px;line-height:2}
.muschip{display:inline-block;background:#eee6f4;color:#54306b;border-radius:99px;padding:3px 11px;font-weight:800;font-size:12px;text-decoration:none;margin-right:2px}
.factcd{background:#fdf6e3;border:1.5px solid #ecd9a8;border-radius:14px;padding:11px 14px;margin-top:9px;font-size:14px;line-height:1.6;color:#5c4a22;display:flex;gap:8px}
.cgn{background:#f3eef8;border:1.5px solid #ddcfe9;border-radius:14px;overflow:hidden;margin-bottom:12px}
.cgnh{padding:9px 14px;font-weight:800;font-size:12.5px;color:#54306b;cursor:pointer}
.cgnb{padding:2px 14px 12px;font-size:13.5px;line-height:1.65;color:#4a3a56;display:none}

/* La Sobremesa tokens */
:root{
  --ink:#33202e;--ink2:#5c4759;--mut:#8a7386;
  --plaster:#faf3ea;--plaster2:#f3e6d7;--card:#fffdf9;
  --cobalt:#2456a6;--cobalt2:#1a4488;
  --saffron:#e8a33d;--saffron2:#d98c1f;--sunhi:#ffd88a;
  --green:#2f8a5b;--greenbg:#e5f5ec;--red:#c8503f;--redbg:#fcebe7;--sky:#eaf1fb;
  --shadow:0 1px 2px rgba(51,32,46,.05),0 10px 30px -12px rgba(51,32,46,.18);

encia."}, {"es": "Tapas", "en": "Small plates meant for sharing over drinks."}, {"es": "Jamón ibérico", "en": "Prized cured ham from acorn-fed pigs."}, {"es": "Tortilla española", "en": "A thick potato-and-egg omelette."}, {"es": "Gazpacho", "en": "A chilled tomato-and-vegetable soup for summer."}, {"es": "Sangría", "en": "Wine punch with fruit — plus Spain's celebrated wines."}]}, {"key": "gq", "flag": "🇬🇶", "name": "Equatorial Guinea", "tagline": "Africa's Spanish-speaking corner — rainforest, islands, and Atlantic coast.", "facts": ["The <b>only African country</b> where Spanish is an official language.", "Made of a <b>mainland</b> (Río Muni) plus islands — including <b>Bioko</b>, where the capital sits.", "The capital, <b>Malabo</b>, perches on a volcanic island in the Gulf of Guinea.", "Dense <b>rainforest</b> shelters gorillas, chimpanzees, and forest elephants.", "<b>Pico Basile</b>, a volcano on Bioko, is the country's highest point.", "Spanish shares official status with <b>French and Portuguese</b>, alongside local languages like Fang and Bubi.", "It became one of Africa's notable <b>oil</b> producers, reshaping its economy.", "The remote island of <b>Annobón</b> lies far to the south, near the equator."], "culture": ["Equatoguineans are warm and community-minded, blending African heritage with a Hispanic colonial legacy.", "The <b>Fang</b> and <b>Bubi</b> are the largest ethnic groups, each with rich music and dance.", "Spanish is the language of school, government, and media — a distinctive African-Spanish blend.", "History runs from Portuguese contact to nearly two centuries as a <b>Spanish colony</b>, to independence in <b>1968</b>.", "Everyday food leans on fresh fish, plantain, cassava, and tropical fruit."], "slang": [{"es": "Jefe / Jefa", "en": "Boss — a common friendly way to address someone"}, {"es": "Chico / Chica", "en": "Guy / girl; also used like 'pal'"}, {"es": "¿Cómo va?", "en": "How's it going?"}, {"es": "Vale", "en": "Okay / alright"}, {" pa:{t:'Un día en Casco Viejo',p:'Por la mañana camino por el Casco Viejo — las casas son viejas y elegantes. Hay barcos enormes en el Canal. ¡Qué xopá! me dice un amigo. Al mediodía como pescado con patacones. Un raspao cuesta un dólar y está perfecto para el calor.',v:[['el barco','the ship'],['qué xopá','what\'s up (PA slang)'],['los patacones','fried plantains'],['el raspao','shaved ice']]},
cu:{t:'Un día en La Habana',p:'La Habana está llena de música. Por la mañana tomo un cafecito — es pequeño pero fuerte. Los carros son viejos y de muchos colores. ¿Qué bolá? me dicen en el Malecón. Por la tarde hay son cubano en la plaza. El mar está tranquilo y yo estoy contento.',v:[['el cafecito','little strong coffee'],['qué bolá','what\'s up (CU slang)'],['el Malecón','Havana\'s seawall'],['el son','son (Cuban music)']]},
do:{t:'Un día en Santo Domingo',p:'Estoy en la Zona Colonial. Las calles son viejas y bonitas. Por la mañana tomo un café y como una empanada. Hay merengue en todas partes — ¡me gusta bailar! ¿Cuánto cuesta el jugo? Setenta y cinco pesos. La gente es alegre y habla rápido. ¡Qué chulo!',v:[['en todas partes','everywhere'],['bailar','to dance'],['alegre','cheerful'],['qué chulo','how cool (DO slang)']]},
pr:{t:'Un día en el Viejo San Juan',p:'Las casas del Viejo San Juan son de todos los colores. Por la mañana tomo un café puertorriqueño — es excelente. Hay coquíes que cantan por la noche: coquí, coquí. Como una alcapurria en la calle. La guagua cuesta un dólar. ¡Esto está brutal!',v:[['la guagua','the bus (PR)'],['el coquí','singing tree frog'],['la alcapurria','fried fritter'],['está brutal','it\'s awesome (PR slang)']]},
ve:{t:'Un día en Mérida',p:'Mérida está en las montañas y hace fresco. Por la mañana como una arepa con queso — ¡me gustan mucho las arepas! Los Andes son enormes y el cielo está azul. Un jugo cuesta dos dólares. La gente dice chévere todo el día. Y sí: todo está chévere.',v:[['hace fresco','it\'s cool out'],['la arepa','corn cake'],['los Andes','the Andes'],['chévere','cool (VE slang)']]},
co:{t:'Un día en Cartagena',p:'Por la mañana tomo un tinto — así se llama el café aquí. Las calles de Getsemaní son de todos los colores y hay música siempre. ¿Cuánto cuesta esta arepa? Cuatro mil pesos. Por la tarde el mar está caliente. La gente es bacana y la ciudad es una belleza.',v:[['el tinto','black coffee (CO)'],['siempre','always'],['bacana','cool, great (CO slang)'],['una belleza','a beauty']]},
ec:{t:'Un día en Quito',p:'Quito está a 2.850 metros — ¡el cielo está muy cerca! Por la mañana tomo un jugo de naranjilla. El centro histórico es enorme y las iglesias son doradas. Un almuerzo completo cuesta tres dólares. Por la tarde veo el volcán Pichincha. ¡Qué bacán es Ecuador!',v:[['cerca','close, near'],['dorado','golden'],['el almuerzo','set lunch'],['qué bacán','how cool (EC slang)']]},
pe:{t:'Un día en Cusco',p:'Estoy en Cusco, la ciudad de los incas. Las paredes de piedra son perfectas. Por la mañana tomo un café y una chicha morada. En el mercado de San Pedro hay frutas de mil colores. Un menú del día cuesta doce soles. Por la noche tengo frío — ¡estamos a 3.400 metros! Pero estoy feliz.',v:[['la piedra','stone'],['la chicha morada','purple corn drink'],['el menú del día','set lunch'],['feliz','happy']]},
bo:{t:'Un día en La Paz',p:'La Paz es una ciudad en el cielo. El teleférico cuesta tres bolivianos y las vistas son increíbles. Por la mañana como una salteña — ¡cuidado, está caliente! Hay mercados con colores de todo el mundo. Las cholitas tienen sombreros elegantes. Bolivia es única.',v:[['el teleférico','cable car'],['la salteña','juicy baked empanada'],['la cholita','Aymara woman (respectful)'],['única','unique']]},
cl:{t:'Un día en Valparaíso',p:'Valparaíso es una ciudad de cerros y de arte. Hay murales en todas las paredes — son gigantes y de mil colores. Por la mañana tomo un café; una empanada cuesta dos mil pesos. Los ascensores viejos suben los cerros. ¿Cachái? ¡Esta ciudad es bacán, po!',v:[['el cerro','the hill'],['el mural','mural, street art'],['el ascensor','funicular lift'],['¿cachái?','you get it? (CL slang)']]},
ar:{t:'Un día en Buenos Aires',p:'Por la mañana tomo un café con dos medialunas — es la ley porteña. Las calles de San Telmo son viejas y elegantes. Hay tango en la plaza: dos bailarines, un bandoneón. ¡Qué copado! El subte cuesta ochocientos pesos. Por la noche la ciudad está más viva que nunca.',v:[['la medialuna','croissant (AR)'],['porteño','from Buenos Aires'],['el bandoneón','tango accordion'],['qué copado','how cool (AR slang)']]},
uy:{t:'Un día en Montevideo',p:'Es domingo y hay tambores en la calle: es el candombe. Por la mañana camino por la Rambla — el río es tan grande que parece mar. Al mediodía como un chivito: cuesta cuatrocientos cincuenta pesos y es gigante. La gente toma mate en todas partes. Uruguay es tranquilo y es bárbaro.',v:[['la Rambla','riverside promenade'],['el chivito','loaded steak sandwich'],['el mate','yerba mate drink'],['bárbaro','great (UY slang)']]},
py:{t:'Un día en Asunción',p:'Hace calor en Asunción, pero hay una solución: el tereré. Todo el mundo toma tereré frío con hielo. Por la mañana como una chipa — cuesta cinco mil guaraníes. En la radio hay arpa paraguaya. La gente habla español y guaraní: ¡dos idiomas en una conversación!',v:[['el tereré','iced yerba mate'],['la chipa','cheese bread ring'],['el arpa','the harp'],['el idioma','the language']]},
es:{t:'Un día en Sevilla',p:'Por la mañana tomo un café en una plaza con naranjos. La catedral es gigante — hay una torre que se llama la Giralda. Al mediodía como tapas: una tapa cuesta tres euros. Por la tarde hace mucho calor y todo el mundo descansa. Por la noche hay flamenco: una guitarra, una voz, y silencio total.',v:[['el naranjo','orange tree'],['la tapa','small plate'],['descansar','to rest'],['la voz','the voice']]},
gq:{t:'Un día en Malabo',p:'Malabo está en una isla verde con un volcán. Por la mañana hay mercado: pescado fresco, frutas enormes, muchas voces. Un plato de pescado cuesta dos mil francos. La gente habla español, fang y bubi. Por la tarde llueve fuerte — y después el cielo está limpio y nuevo.',v:[['la isla','the island'],['el pescado','fish (to eat)'],['la voz / las voces','voice(s)'],['llueve fuerte','it rains hard']]}
};

function numEs(n){
 n=Math.round(n);
 var U=['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
 var T=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
 var H=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
 if(n<30)return U[n];
 if(n<100){var t=Math.floor(n/10),u=n%10;return T[t]+(u?' y '+U[u]:'');}
 if(n===100)return 'cien';
 if(n<1000){var h=Math.floor(n/100),r=n%100;return H[h]+(r?' '+numEs(r):'');}
 if(n<1000000){var m=Math.floor(n/1000),r2=n%1000;return (m===1?'mil':numEs(m)+' mil')+(r2?' '+numEs(r2):'');}
 return String(n);
}

/* --- money helpers --- */
function rParseDenom(x){var cents=(x.indexOf('¢')>=0)||/\dc$/.test(x);var num=parseInt((x.replace(/[^0-9]/g,'')||'0'),10);return cents?num/100:num;}
function rSetupMoney(){var m=window.BOOT.CURR[RCUR]||{sym:'$',rate:1,usd:true,denom:{notes:[],coins:[]}};
 RSYM=m.sym||'$'; RRATE=m.usd?1:(m.rate||1);
 var d=m.denom||{}, seen={}, list=[];
 function add(kind){return function(str){var v=rParseDenom(str); if(v>0&&!seen[v]){seen[v]=1; list.push({label:str,v:v,kind:kind});}};}
 (d.notes||[]).forEach(add('note')); (d.coins||[]).forEach(add('coin'));
 if(!list.length) list=[{label:RSYM+'1',v:1,kind:'note'}];
 list.sort(function(a,b){return b.v-a.v;});
 RUNIT=list[list.length-1].v;
 list.forEach(function(o){o.vu=Math.round(o.v/RUNIT);});
 RDENOMS=list;
}
function rStep(raw){return raw<30?0.5:raw<300?5:raw<3000?50:raw<30000?500:1000;}
function rPriceUnits(p){var raw=p*RRATE,step=Math.max(rStep(raw),RUNIT),stepU=Math.max(1,Math.round(step/RUNIT));var pu=Math.round((raw/RUNIT)/stepU)*stepU;if(pu<stepU)pu=stepU;return pu;}
function rFmtU(units){var val=units*RUNIT;return RSYM+(RUNIT<1?val.toFixed(2):Math.round(val).toLocaleString('en-US'));}
function rFmtV(v){return RSYM+(RUNIT<1?v.toFixed(2):Math.round(v).toLocaleString('en-US'));}
function rOrderUnits(){return RORDER.reduce(function(a,o){return a+rPriceUnits(o.p);},0);}
function rGreedy(units){var out=[],rem=units;for(var i=0;i<RDENOMS.length;i++){var k=Math.floor(rem/RDENOMS[i].vu);if(k>0){out.push({d:RDENOMS[i],n:k});rem-=k*RDENOMS[i].vu;}}return {pieces:out,left:rem};}

 fetch('https://'+lang+'.wikipedia.org/w/api.php?action=query&prop=pageimages&piprop=thumbnail&pithumbsize=640&redirects=1&format=json&origin=*&titles='+encodeURIComponent(title)).then(function(r){return r.json();}).then(function(d){var pg=d&&d.query&&d.query.pages,u=null;if(pg){var k=Object.keys(pg)[0];if(pg[k]&&pg[k].thumbnail)u=pg[k].thumbnail.source;}var e=document.getElementById(elId);if(u&&e){e.innerHTML='<img src="'+u+'" alt="" style="width:100%;height:100%;object-fit:cover;display:block">';}else{go();}}).catch(go);})();}
function bhide(el){var p=el.parentNode;if(p)p.style.display='none';}
function billGallery(q,elId){fetch('https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch='+encodeURIComponent(q)+'&srnamespace=6&srlimit=24&format=json&origin=*').then(function(r){return r.json();}).then(function(d){var e=document.getElementById(elId);if(!e)return;var hits=(d&&d.query&&d.query.search)||[];var imgs=[];for(var i=0;i<hits.length;i++){var t=hits[i].title||'';if(!/\.(jpe?g|png)$/i.test(t))continue;var fn=t.replace(/^File:/,'');imgs.push('https://commons.wikimedia.org/wiki/Special:FilePath/'+encodeURIComponent(fn)+'?width=320');}imgs=imgs.slice(0,15);if(!imgs.length){e.style.display='none';return;}e.innerHTML='<h2 style="font-size:18px;margin:0 0 4px">\ud83d\udcb5 Los billetes \u00b7 Banknotes</h2><p class="sub" style="margin-bottom:10px">Get familiar with the money (images via Wikimedia Commons).</p><div class="billgrid">'+imgs.map(function(u){return '<div class="billimg"><img src="'+u+'" loading="lazy" referrerpolicy="no-referrer" alt="" onerror="bhide(this)"></div>';}).join('')+'</div>';}).catch(function(){var e=document.getElementById(elId);if(e)e.style.display='none';});}
function curRender(key){var c=window.BOOT.COUNTRIES.find(function(x){return x.key===key;}),m=window.BOOT.CURR[key],live=(CURLIVE&&CURRATE)?true:false;
 var head='<div class="head"><button class="btn ghost" onclick="country(\''+key+'\')">← '+c.name+'</button><span class="count">💱 Money</span></div>';
 var info='<div class="card"><h2 style="margin:0 0 6px">'+c.flag+' '+c.name+'</h2><p class="sub">La moneda es el <b>'+m.name+'</b> '+hb('el '+m.name)+' <span class="muted">('+m.sym+' · '+m.code+')</span></p>'+(m.fact?'<div class="curfact">💡 '+m.fact+'</div>':'')+(m.usd?'<p class="sub" style="margin-top:10px">🇺🇸 '+c.name+' uses the <b>US dollar</b>.</p>':'')+'</div>';
 var opts=FROMLIST.map(function(x){return '<option value="'+x[0]+'"'+(CFROM===x[0]?' selected':'')+'>'+x[1]+'</option>';}).join('');
 var lr=curLocalRate(key),fr=curFromRate(CFROM),per=lr/fr;
 var conv='<div class="card"><h2 style="font-size:18px;margin:0 0 4px">Convertidor · Converter</h2><p class="sub" style="margin-bottom:10px">Pick your currency, then type in either box.</p>'
  +'<div class="curline"><label>From</label><select id="cfrom" class="curin" onchange="CFROM=this.value;curCalc(\''+key+'\',\'from\')">'+opts+'</select></div>'
  +'<div class="curline"><label>Amount</label><input id="camt" class="curin" inputmode="decimal" value="1" oninput="curCalc(\''+key+'\',\'from\')"></div>'
  +'<div class="curline"><label>'+m.sym+'</label><input id="cloc" class="curin" inputmode="decimal" oninput="curCalc(\''+key+'\',\'loc\')"></div>'
  +'<div class="currate" id="crate">1 '+CFROM+' &asymp; '+fmtc(per)+' '+m.code+' '+(live?'<span class="rlive">live</span>':'<span class="rapx">approx</span>')+'</div>'
  +(["ARS","VES","CUP"].indexOf(m.code)>=0?'<div class="muted" style="font-size:12px;margin-top:8px">Heads up: the official rate here can differ a lot from the street/parallel rate.</div>':'')+'</div>';
 var crypto=m.crypto?('<div class="card"><div class="currow"><div class="curpic" style="background:#F7931A;border-color:#F7931A"><div class="curph" style="color:#fff">₿</div></div><div><h2 style="margin:0 0 6px">'+m.crypto.name+' '+hb('Bitcoin')+'</h2><p class="sub">'+m.crypto.note+'</p></div></div><div class="currate" id="btcprice">1 ₿ ≈ … <span class="rapx">loading</span></div></div>'):'';
 var dn=m.denom||{};
function denchips(arr){return (arr&&arr.length)?arr.map(function(x){return '<span class="denchip">'+x+'</span>';}).join(''):'<span class="muted">rarely used</span>';}
var denom='<div class="card"><h2 style="font-size:18px;margin:0 0 4px">💵 Billetes y monedas · Bills & coins</h2><p class="sub" style="margin-bottom:10px">What you’ll actually handle in '+c.name+' today.</p><div class="denrow"><div class="denlbl">Billetes <span class="muted">(banknotes)</span></div><div class="denchips">'+denchips(dn.notes)+'</div></div><div class="denrow"><div class="denlbl">Monedas <span class="muted">(coins)</span></div><div class="denchips">'+denchips(dn.coins)+'</div></div>'+(dn.note?'<div class="curfact" style="margin-top:10px">💡 '+dn.note+'</div>':'')+'</div>';
var prac='<div class="card"><h2 style="font-size:18px;margin:0 0 4px">🎯 Práctica · Money practice</h2><p class="sub" style="margin-bottom:10px">Convierte, escucha precios y calcula tu cambio con la moneda de '+c.name+'.</p><div id="cxbox"><button class="cxbtn" onclick="cxStart(\''+key+'\')">Empezar práctica</button></div></div>';
app.innerHTML=nav()+head+info+conv+crypto+denom+prac;
 if(m.crypto)curBTC();
 setTimeout(function(){curCalc(key,'from');},30);
}
function curCalc(key,src){var lr=curLocalRate(key),fr=curFromRate(CFROM),a=$('camt'),l=$('cloc'),rt=$('crate'),m=window.BOOT.CURR[key];if(!a||!l)return;
 if(src==='from'){var v=curNum(a.value);l.value=v?fmtc(v*(lr/fr)):'';}else{var v=curNum(l.value);a.value=v?fmtc(v*(fr/lr)):'';}
 if(rt)rt.innerHTML='1 '+CFROM+' &asymp; '+fmtc(lr/fr)+' '+m.code+' '+((CURLIVE&&CURRATE)?'<span class="rlive">live</span>':'<span class="rapx">approx</span>');
}
function curBTC(){fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot').then(function(r){return r.json();}).then(function(d){var p=d&&d.data&&d.data.amount,e=$('btcprice');if(p&&e)e.innerHTML='1 ₿ Bitcoin ≈ $'+Math.round(parseFloat(p)).toLocaleString()+' USD <span class="rlive">live</span>';}).catch(function(){var e=$('btcprice');if(e)e.innerHTML='1 ₿ Bitcoin — live price needs internet';});}
home=function(){countriesHome();};countriesHome();
try{var hk=(location.hash||'').replace('#','');if(hk&&window.BOOT.COUNTRIES.some(function(x){return x.key===hk;}))country(hk);}catch(e){}

/* ===== Currency practice engine ===== */
var CQ=[],CQI=0,CQS=0,CQK=null;
function cxParse(s){return Number(String(s).replace(/[^0-9.]/g,''))||0;}
function cxStep(x){return Math.pow(10,Math.floor(Math.log10(Math.abs(x)||1)));}
function cxNice(x){if(x<=0)return 0;if(x<10)return Math.round(x*2)/2;var s=cxStep(x);return Math.round(x/(s/10))*(s/10);}
function cxUniq(opts){var seen={},out=[];opts.forEach(function(o){var k=o.t;if(!seen[k]){seen[k]=1;out.push(o);}});return shuffle(out);}
function cxConv(key,rate,sym,c,toLocal){
 var amts=[5,10,20,50],a=amts[Math.floor(Math.random()*amts.length)],loc=cxNice(a*rate);
 var fc=function(n){return sym+fmtc(n);};
 if(toLocal){
  var cor=fc(loc);
  var o=[{t:cor,ok:true},{t:fc(cxNice(loc*10)),ok:false},{t:fc(cxNice(loc/10)),ok:false},{t:fc(cxNice(loc*(a<=10?3:0.4))),ok:false}];
  return {q:'Tienes <b>$'+a+' USD</b>. ¿Aproximadamente cuánto es en '+c.flag+' '+c.name+'?',opts:cxUniq(o),exp:'$'+a+' ≈ '+cor+'  (tasa ≈ '+sym+fmtc(Math.round(rate))+' por dólar).'};
 }else{
  var cor2='$'+a+' USD';
  var o2=[{t:cor2,ok:true},{t:'$'+(a*10)+' USD',ok:false},{t:'$'+(a/10)+' USD',ok:false},{t:'$'+(a<=10?a*3:Math.round(a*0.4))+' USD',ok:false}];
  return {q:'Algo cuesta ≈ <b>'+fc(loc)+'</b> en '+c.flag+' '+c.name+'. ¿Cuántos dólares, más o menos?',opts:cxUniq(o2),exp:fc(loc)+' ≈ $'+a+' USD.'};
 }
}
function cxListen(key,rate,sym,c){
 var usd=2+Math.floor(Math.random()*8),loc=cxNice(usd*rate),fc=function(n){return sym+fmtc(n);};
 var st=cxStep(loc);
 var o=[{t:fc(loc),ok:true},{t:fc(loc*10),ok:false},{t:fc(cxNice(loc/10)||st),ok:false},{t:fc(loc+st),ok:false}];
 return {q:'🎧 Escucha el precio y elige el número correcto ('+c.flag+' '+c.name+').',say:String(loc),opts:cxUniq(o),exp:'El precio era '+fc(loc)+'.'};
}
function cxChange(key,sym,notes,c){
 var idx=1+Math.floor(Math.random()*(notes.length-1)),pay=notes[idx];
 var fr=[0.1,0.2,0.25,0.3,0.4][Math.floor(Math.random()*5)],chg=cxNice(pay*fr);
 if(chg<=0||chg>=pay)chg=cxNice(pay*0.25);
 var price=pay-chg,fc=function(n){return sym+fmtc(n);};
 var cor=fc(chg);
 var o=[{t:cor,ok:true},{t:fc(pay+price),ok:false},{t:fc(price),ok:false},{t:fc(cxNice(chg*2)),ok:false}];
 return {q:'Algo cuesta <b>'+fc(price)+'</b>. Pagas con un billete de <b>'+fc(pay)+'</b>. ¿Cuánto es tu cambio?',opts:cxUniq(o),exp:fc(pay)+' − '+fc(price)+' = '+cor+'.'};
}
function cxBuild(key){
 var c=window.BOOT.COUNTRIES.find(function(x){return x.key===key;}),m=window.BOOT.CURR[key],rate=curLocalRate(key),sym=m.sym||'$';
 var notes=((m.denom&&m.denom.notes)||[]).map(cxParse).filter(function(x){return x>0;}).sort(function(a,b){return a-b;});
 var qs=[];
 if(!m.usd){qs.push(cxConv(key,rate,sym,c,true));qs.push(cxConv(key,rate,sym,c,false));}
 qs.push(cxListen(key,rate,sym,c));qs.push(cxListen(key,rate,sym,c));
 if(notes.length>=2){qs.push(cxChange(key,sym,notes,c));qs.push(cxChange(key,sym,notes,c));}
 return shuffle(qs);
}
function cxStart(key){CQK=key;CQ=cxBuild(key);CQI=0;CQS=0;cxShow();}
function cxShow(){
 var b=document.getElementById('cxbox');if(!b)return;
 if(CQI>=CQ.length){b.innerHTML='<div class="cxdone">🎉 '+CQS+' / '+CQ.length+' correctas</div><button class="cxbtn" onclick="cxStart(\''+CQK+'\')">Practicar otra vez</button>';return;}
 var q=CQ[CQI];
 var h='<div class="cxprog">Pregunta '+(CQI+1)+' de '+CQ.length+'</div><div class="cxq">'+q.q+(q.say?' <button class="cxsay" onclick="cxReplay()">🔊 Repetir</button>':'')+'</div><div class="cxopts">';
 q.opts.forEach(function(o,i){h+='<button class="cxopt" onclick="cxAns('+i+')">'+esc(o.t)+'</button>';});
 h+='</div><div class="cxfb" id="cxfb"></div>';
 b.innerHTML=h;
 if(q.say)setTimeout(cxReplay,250);
}
function cxReplay(){var q=CQ[CQI];if(q&&q.say)spk(q.say);}
function cxAns(i){
 var q=CQ[CQI],o=q.opts[i],btns=document.querySelectorAll('#cxbox .cxopt');
 btns.forEach(function(bt,j){bt.disabled=true;if(q.opts[j].ok)bt.classList.add('ok');else if(j===i)bt.classList.add('no');});
 if(o.ok)CQS++;
 document.getElementById('cxfb').innerHTML=(o.ok?'<span class="cxok">✓ ¡Correcto!</span> ':'<span class="cxno">✗ </span>')+(q.exp||'')+'<br><button class="cxbtn" onclick="cxNext()">'+(CQI+1>=CQ.length?'Ver resultado':'Siguiente →')+'</button>';
}
function cxNext(){CQI++;cxShow();}

</script></body></html>
