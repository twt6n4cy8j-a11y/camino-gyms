<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>El Mercado · El Camino Grande</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--cobalt:#2456a6;--cobalt2:#1c4488;--saffron:#e8a33d;--saffron2:#d18f2a;--plaster:#faf3ea;--card:#fffdf7;--ink:#33202e;--ink2:#5c4a55;--mut:#9b8a93;--line:#e8dccb;--green:#2f8a5b;--red:#c0392b;--plum:#54306b;--terra:#c96f4a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito Sans',sans-serif;background:var(--plaster);color:var(--ink);min-height:100vh}
#app{max-width:560px;margin:0 auto;padding:14px 14px 90px}
.nav{display:flex;gap:14px;padding:6px 2px 14px;font-size:13px;font-weight:800;color:var(--mut)}
.nav a{cursor:pointer;color:var(--cobalt);text-decoration:none}
h1,h2{font-family:'Fraunces',serif}
.hero{background:linear-gradient(140deg,var(--green),#1f5c3d);border-radius:22px;padding:22px 20px;color:#fff8ef;margin-bottom:16px}
.hero .htop{font-size:11px;letter-spacing:.18em;font-weight:800;opacity:.78;text-transform:uppercase}
.hero h1{font-size:26px;margin:4px 0 6px}
.hero p{font-size:14px;opacity:.94;line-height:1.5}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px -5px rgba(51,32,46,.15)}
.card:active{transform:scale(.98)}
.card .em{font-size:26px}
.card b{font-family:'Fraunces',serif;font-size:15.5px}
.cmeta{font-size:12px;color:var(--mut);font-weight:700;margin-top:2px}
.badge{display:inline-block;background:#e4ecf9;color:var(--cobalt);border-radius:99px;padding:2px 9px;font-size:11px;font-weight:800;margin-right:5px}
.gcard{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 3px 14px -6px rgba(51,32,46,.18)}
.famhead{display:flex;align-items:center;gap:10px;margin:2px 0 14px}
.famhead h1{font-size:20px;flex:1}
.quit{background:none;border:1.5px solid var(--line);border-radius:99px;padding:6px 13px;font-weight:800;font-size:12.5px;cursor:pointer;color:var(--ink2);font-family:'Nunito Sans',sans-serif}
.spot{background:#fdf6e3;border:1.5px solid #ecd9a8;border-radius:14px;padding:11px 14px;font-size:13.5px;line-height:1.65;color:#5c4a22;margin-bottom:12px}
.spot b{color:#8a6d1f}
.vend{background:linear-gradient(140deg,#f6f1e7,#efe6d2);border:1.5px solid var(--line);border-radius:16px;padding:13px 15px;margin-bottom:10px}
.vend .who{font-size:11px;letter-spacing:.12em;font-weight:800;color:var(--terra);text-transform:uppercase}
.vend .vsay{font-family:'Fraunces',serif;font-size:17px;margin-top:3px;line-height:1.4}
.vend .ven{font-size:12.5px;color:var(--mut);margin-top:4px;font-style:italic;display:none}
.vend .ven.on{display:block}
.opt{display:block;width:100%;background:#f6f1e7;border:1.5px solid var(--line);border-radius:14px;padding:12px;margin-top:8px;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:14.5px;cursor:pointer;text-align:left;color:var(--ink)}
.opt .oen{display:block;font-size:11.5px;color:var(--mut);font-weight:700;margin-top:2px}
.opt.ok{background:#e2f2e9;border-color:var(--green)}
.opt.no{background:#fbe9e7;border-color:var(--red)}
.pricebar{display:flex;justify-content:space-between;align-items:center;background:#fffaf0;border:1.5px solid var(--saffron);border-radius:14px;padding:9px 14px;margin-bottom:10px;font-weight:800;font-size:13px}
.say{background:none;border:1.5px solid var(--line);border-radius:99px;padding:3px 9px;cursor:pointer;font-size:13px}
.chip{display:inline-block;background:#f2ead9;border-radius:99px;padding:4px 11px;margin:0 5px 7px 0;font-size:12.5px;font-weight:700}
.chip b{color:var(--cobalt)}
.gbtn{display:block;width:100%;background:linear-gradient(140deg,var(--cobalt),var(--cobalt2));color:#fff;border:none;border-radius:14px;padding:12px;font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:14.5px;cursor:pointer;margin-top:10px}
.gbtn.ghost{background:none;border:1.5px solid var(--line);color:var(--ink2)}
.tnote{margin-top:10px;background:#f3eef8;border:1.5px solid #ddcfe9;border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.6;color:#4a3a56}
.big{font-size:52px;text-align:center;margin:6px 0}
.stars{font-size:26px;text-align:center;letter-spacing:4px}
.legal{font-size:11.5px;color:var(--mut);line-height:1.6;margin:22px 4px;text-align:center}

/* La Sobremesa tokens */
:root{
  --ink:#33202e;--ink2:#5c4759;--mut:#8a7386;
  --plaster:#faf3ea;--plaster2:#f3e6d7;--card:#fffdf9;
  --cobalt:#2456a6;--cobalt2:#1a4488;
  --saffron:#e8a33d;--saffron2:#d98c1f;--sunhi:#ffd88a;
  --green:#2f8a5b;--greenbg:#e5f5ec;--red:#c8503f;--redbg:#fcebe7;--sky:#eaf1fb;
  --shadow:0 1px 2px rgba(51,32,46,.05),0 10px 30px -12px rgba(51,32,46,.18);
  --shadow-sm:0 1px 2px rgba(51,32,46,.05),0 4px 14px -6px rgba(51,32,46,.12);
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* EL MERCADO · the haggling simulator — a pueblo of El Camino Grande
   Numbers under friendly social pressure. Vendor speaks prices in
   Spanish WORDS (listening check), then the dance: muy caro, un
   descuento, counter-offers, the walk-away callback. Culture law:
   regateo as a warm ritual, never a grind. */

var KIT=[
['¿Cuánto cuesta?','How much is it?'],
['Es precioso.','It\'s beautiful. (compliment first — always)'],
['¡Muy caro!','Very expensive!'],
['¿Me hace un descuento?','Can you give me a discount?'],
['¿Cuál es su mejor precio?','What\'s your best price?'],
['¿Qué tal…?','How about…? (your counter-offer)'],
['Está bien, lo llevo.','Okay, I\'ll take it.'],
['Gracias, solo estoy mirando.','Thanks, I\'m just looking.']];

var MERCADOS=[
{id:'oax',n:'Mercado de artesanías · Oaxaca',flag:'🇲🇽',key:'mx',cur:'pesos',sym:'$',leg:'Leg 4 of the Camino',
 items:[{n:'un alebrije',e:'🐉',en:'a carved spirit creature',fair:250},{n:'un rebozo',e:'🧣',en:'a woven shawl',fair:400},{n:'una taza de barro negro',e:'🏺',en:'a black-clay cup',fair:120}],
 fact:'Oaxaca\'s alebrijes are hand-carved and painted dream creatures; barro negro pottery gets its shine from burnishing, not glaze. When a vendor says "es hecho a mano" — it truly is.'},
{id:'chichi',n:'Mercado de Chichicastenango',flag:'🇬🇹',key:'gt',cur:'quetzales',sym:'Q',leg:'Leg 2 country · near Tikal',
 items:[{n:'un huipil',e:'👘',en:'a handwoven blouse',fair:300},{n:'una máscara de madera',e:'🎭',en:'a wooden dance mask',fair:200},{n:'un textil pequeño',e:'🧵',en:'a small textile',fair:80}],
 fact:'Chichicastenango hosts one of the great markets of the Americas, running since long before the Spanish arrived. A huipil can take months to weave; its patterns tell you the weaver\'s town.'},
{id:'otav',n:'Mercado de Otavalo',flag:'🇪🇨',key:'ec',cur:'dólares',sym:'$',leg:'Leg 7 of the Camino',
 items:[{n:'un poncho de lana',e:'🦙',en:'a wool poncho',fair:25},{n:'un sombrero de paja toquilla',e:'👒',en:'a toquilla straw hat',fair:35},{n:'un collar de tagua',e:'📿',en:'a tagua-nut necklace',fair:8}],
 fact:'Otavalo, in the Avenue of the Volcanoes, is home to the famous Kichwa Otavalo weavers — among the most successful indigenous merchant communities in the world. Saturday market day fills the whole town.'}];

function numEs(n){
 n=Math.round(n);
 var U=['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
 var T=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
 var H=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
 if(n<30)return U[n];
 if(n<100){var t=Math.floor(n/10),u=n%10;return T[t]+(u?' y '+U[u]:'');}
 if(n===100)return 'cien';
 if(n<1000){var h=Math.floor(n/100),r=n%100;return H[h]+(r?' '+numEs(r):'');}
 return String(n);
}
/* ---------- voice ---------- */
var VOICE=null;
function esVoices(){try{return speechSynthesis.getVoices().filter(function(v){return /^es/i.test(v.lang);});}catch(e){return [];}}
function vScore(v){var s=0;if(/enhanced|premium|natural/i.test(v.name))s+=40;if(/es[-_](MX|US|419)/i.test(v.lang))s+=8;return s;}
function spk(t,rate){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);if(!VOICE){var vs=esVoices();vs.sort(function(a,b){return vScore(b)-vScore(a);});VOICE=vs[0]||null;}if(VOICE)u.voice=VOICE;u.lang=(VOICE&&VOICE.lang)||'es-MX';u.rate=rate||0.85;speechSynthesis.speak(u);}catch(e){}}
try{speechSynthesis.onvoiceschanged=function(){VOICE=null;}}catch(e){}
function cls(){try{return localStorage.getItem('cg_mode')==='class';}catch(e){return false;}}
function mochFeed(q,a,why){
 try{
  var o=JSON.parse(localStorage.getItem('cg_moch'))||{};
  var k=(q||'').slice(0,60);if(!k)return;
  o[k]={q:q,a:a,why:why||'',src:'mercado',due:Math.floor(Date.now()/864e5),iv:0};
  localStorage.setItem('cg_moch',JSON.stringify(o));
 }catch(e){}
}

var app=document.getElementById('app'),MK=null;
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var x=a[i];a[i]=a[j];a[j]=x;}return a;}
function nav(){return '<div class="nav"><a onclick="home()">🛒 El Mercado</a><a href="/">🗺️ El Camino</a></div>';}
function home(){
 var h=nav();
 h+='<div class="hero"><div class="htop">EL CAMINO GRANDE · UN PUEBLO</div><h1>El Mercado</h1><p>The haggling simulator. A vendor, three treasures, your budget — and every price spoken in Spanish before you see a single digit. Numbers under the friendliest pressure there is.</p></div>';
 h+='<div class="spot"><b>Las reglas del regateo:</b> haggling is expected in artisan markets and tianguis — never in shops, restaurants, or supermarkets. It\'s a warm ritual, not a battle: compliment first (es precioso), smile always, and remember the difference between a good deal and grinding someone over their livelihood. Walking away is part of the dance — and so is getting called back.</div>';
 h+='<div style="font-weight:800;font-size:12px;letter-spacing:1.2px;color:var(--mut);text-transform:uppercase;margin:14px 4px 8px">🎒 El kit del regateo</div><div style="margin-bottom:6px">';
 KIT.forEach(function(k,i){h+='<span class="chip" style="cursor:pointer" onclick="spk(KIT['+i+'][0],0.7)"><b>'+esc(k[0])+'</b> 🔊</span>';});
 h+='</div><div class="cmeta" style="margin:0 4px 14px">Tap any phrase to hear it. These eight lines are the whole game.</div>';
 MERCADOS.forEach(function(m,i){
  h+='<div class="card" onclick="mkStart('+i+')"><span class="em">'+m.flag+'</span><div style="flex:1"><b>'+esc(m.n)+'</b><div class="cmeta"><span class="badge">'+esc(m.leg)+'</span>'+m.items.map(function(it){return it.e;}).join(' ')+'</div></div><span style="color:var(--mut)">›</span></div>';
 });
 if(cls())h+='<div class="tnote">🧭 <b>Guide note:</b> after the app version, play it LIVE — you\'re the vendor, real voice, real theatrics (¡es hecho a mano, señor!). The app teaches the script; you teach the music. Best paired right after the numbers or food lessons.</div>';
 h+='<div class="legal">Prices are playful ballparks for practicing numbers — real artisans\' work is worth every centavo. El Mercado is free, outside any paywall, always.</div>';
 app.innerHTML=h;window.scrollTo(0,0);
}
/* ---------- the negotiation ---------- */
function mkStart(mi){
 var m=MERCADOS[mi];
 MK={m:m,idx:0,results:[],phase:'meet',price:0,patience:2,listen:null};
 mkItem();
}
function fuzz(n){var f=n*(1.5+Math.random()*0.4);return f>=100?Math.round(f/10)*10:Math.round(f/5)*5;}
function mkItem(){
 var m=MK.m,it=m.items[MK.idx];
 MK.ask=fuzz(it.fair);MK.price=MK.ask;MK.patience=2;MK.phase='ask';
 MK.floor=Math.round(it.fair*0.95);
 mkListen('¡Buenas! ¿Le gusta '+it.n+'? Cuesta '+numEs(MK.ask)+' '+m.cur+'.','The vendor greets you and names the price — in words. What number did you hear?');
}
function mkListen(vline,prompt){
 var m=MK.m;
 var n=MK.price;
 var d1=n>=100?n+50:(n>=30?n+10:n+5);
 var d2=n>=100?Math.max(MK.floor-10,n-40):(n>10?n-5:n+2);
 if(d2===n||d2===d1)d2=n+15;
 MK.listen={correct:n,opts:shuffle([n,d1,d2]),vline:vline,prompt:prompt};
 spk(vline,0.8);
 mkRender();
}
function mkRender(){
 var m=MK.m,it=m.items[MK.idx];
 var h=nav()+'<div class="famhead"><button class="quit" onclick="home()">✕ Leave market</button><h1>'+m.flag+' Puesto '+(MK.idx+1)+'/3</h1></div>';
 h+='<div class="pricebar"><span>'+it.e+' '+esc(it.n)+'</span><span>'+(MK.phase==='ask'?'👂 …':m.sym+MK.price+' '+m.cur)+'</span></div>';
 if(MK.listen){
  h+='<div class="vend"><div class="who">El vendedor · la vendedora</div><div class="vsay">'+esc(MK.listen.vline)+' <button class="say" onclick="spk(MK.listen.vline,0.6)">🐢</button></div></div>';
  h+='<div class="spot" style="margin-bottom:8px">'+esc(MK.listen.prompt)+'</div>';
  MK.listen.opts.forEach(function(o,j){
   h+='<button class="opt" style="text-align:center;font-size:17px" id="lo'+j+'" onclick="mkHear('+j+')">'+m.sym+o+'</button>';
  });
 } else {
  h+='<div class="vend"><div class="who">El vendedor · la vendedora</div><div class="vsay">'+esc(MK.vline)+' <button class="say" onclick="spk(MK.vline,0.65)">🐢</button></div><div class="ven'+(MK.showEn?' on':'')+'" >'+esc(MK.ven||'')+'</div></div>';
  h+='<button class="gbtn ghost" style="margin:0 0 6px;padding:7px" onclick="MK.showEn=!MK.showEn;mkRender()">👁 '+(MK.showEn?'Hide':'Show')+' English</button>';
  mkOptions().forEach(function(o){
   h+='<button class="opt" onclick="'+o.fn+'">'+esc(o.es)+'<span class="oen">'+esc(o.en)+'</span></button>';
  });
 }
 app.innerHTML=h;window.scrollTo(0,0);
}
function mkHear(j){
 var ok=MK.listen.opts[j]===MK.listen.correct;
 if(!ok){
  mochFeed('Market ears: '+numEs(MK.listen.correct)+' '+MK.m.cur,String(MK.listen.correct),'Prices arrive by ear first. Say it back out loud.');
  var el=document.getElementById('lo'+j);if(el)el.classList.add('no');
  MK.listen.opts.forEach(function(o,k){if(o===MK.listen.correct){var e2=document.getElementById('lo'+k);if(e2)e2.classList.add('ok');}});
  setTimeout(mkAfterListen,800);
  return;
 }
 mkAfterListen();
}
function mkAfterListen(){
 MK.listen=null;MK.phase='talk';
 mkSay('Es hecho a mano — de los mejores.','It\'s handmade — among the best.');
}
function mkSay(es,en){MK.vline=es;MK.ven=en;MK.showEn=false;spk(es,0.85);mkRender();}
function mkOptions(){
 var m=MK.m,it=m.items[MK.idx],p=MK.price,fair=it.fair;
 var low=Math.round(fair*0.6),mid=Math.round((fair+p)/2*0.92),good=Math.round(fair*1.02);
 if(good>=100)good=Math.round(good/5)*5;
 if(mid<=good)mid=good+ (p>=100?10:2);
 var o=[];
 o.push({es:'¡Muy caro!',en:'Very expensive!',fn:'mkCaro()'});
 o.push({es:'¿Me hace un descuento?',en:'Can you give me a discount?',fn:'mkDesc()'});
 o.push({es:'¿Qué tal '+m.sym+low+'?',en:'How about '+m.sym+low+'? (a lowball…)',fn:'mkCounter('+low+')'});
 o.push({es:'¿Qué tal '+m.sym+good+'?',en:'How about '+m.sym+good+'? (near the fair price)',fn:'mkCounter('+good+')'});
 o.push({es:'Está bien, lo llevo.',en:'Okay, I\'ll take it — at '+m.sym+p+'.',fn:'mkBuy()'});
 o.push({es:'Gracias, solo estoy mirando.',en:'Thanks, I\'m just looking. (walk away)',fn:'mkWalk()'});
 return o;
}
function mkCaro(){
 if(MK.price>MK.floor){
  MK.price=Math.max(MK.floor,Math.round(MK.price*0.85));
  mkSay('Bueno… le doy un precio especial: '+numEs(MK.price)+' '+MK.m.cur+'.','Fine… a special price for you: '+MK.price+'.');
 } else mkSay('¡Imposible, es mi último precio!','Impossible — that\'s my final price!');
}
function mkDesc(){
 if(MK.price>MK.floor){
  MK.price=Math.max(MK.floor,Math.round(MK.price*0.9));
  mkSay('Está bien… '+numEs(MK.price)+' '+MK.m.cur+', porque me cae bien.','Alright… '+MK.price+', because I like you.');
 } else mkSay('Ya está con descuento, ¡de verdad!','It\'s already discounted, truly!');
}
function mkCounter(x){
 var it=MK.m.items[MK.idx];
 if(x<it.fair*0.75){
  MK.patience--;
  if(MK.patience<=0)mkSay('No, no. Es hecho a mano. '+numEs(MK.price)+' — es mi último precio.','No, no. It\'s handmade. '+MK.price+' — my final price.');
  else mkSay('¡Uy, no! ¿Sabe cuánto trabajo es esto? '+numEs(MK.price)+'.','Oh no! Do you know how much work this is? Still '+MK.price+'.');
 } else if(x>=MK.floor){
  MK.price=x;
  mkSay('¡Trato hecho! '+numEs(x)+' '+MK.m.cur+'.','Deal! '+x+'.');
 } else {
  MK.price=Math.round((x+MK.price)/2);
  mkSay('Mmm… ¿qué tal '+numEs(MK.price)+' y los dos contentos?','Hmm… how about '+MK.price+' and we\'re both happy?');
 }
}
function mkBuy(){
 var it=MK.m.items[MK.idx],paid=MK.price;
 var stars=paid<=it.fair*1.1?3:(paid<=it.fair*1.35?2:1);
 MK.results.push({it:it,paid:paid,stars:stars});
 mkNextStall('¡Gracias! Que le vaya bonito.','Thank you! May it go beautifully for you.');
}
function mkWalk(){
 var it=MK.m.items[MK.idx];
 if(MK.price>MK.floor&&Math.random()<0.6){
  MK.price=Math.max(MK.floor,Math.round(it.fair*1.05));
  mkSay('¡Espere, espere! Para usted… '+numEs(MK.price)+' '+MK.m.cur+'. ¡Último precio!','Wait, wait! For you… '+MK.price+'. Final price! (The classic callback — it worked.)');
 } else {
  MK.results.push({it:it,paid:0,stars:0});
  mkNextStall('Que tenga buen día.','Have a good day. (You walked — the treasure stays.)');
 }
}
function mkNextStall(ves,ven){
 MK.idx++;
 if(MK.idx>=MK.m.items.length)return mkEnd(ves,ven);
 spk(ves,0.85);
 mkItem();
}
function mkEnd(){
 var bought=MK.results.filter(function(r){return r.paid>0;});
 var stars=MK.results.reduce(function(n,r){return n+r.stars;},0);
 var h=nav()+'<div class="gcard" style="text-align:center"><div class="big">'+(stars>=8?'🏆':(stars>=5?'🛍️':'🌵'))+'</div><h2>'+(stars>=8?'¡Crack del regateo!':(stars>=5?'Buen ojo, buen oído':'Precio de turista'))+'</h2>';
 h+='<div class="stars">'+'⭐'.repeat(Math.max(1,stars))+'</div>';
 h+='<div style="text-align:left;margin-top:12px">';
 MK.results.forEach(function(r){
  h+='<div class="pricebar" style="margin-bottom:7px"><span>'+r.it.e+' '+esc(r.it.n)+'</span><span>'+(r.paid?MK.m.sym+r.paid+' · '+'⭐'.repeat(r.stars):'— walked away')+'</span></div>';
 });
 h+='</div><p style="font-size:13px;color:var(--ink2);line-height:1.6;margin-top:8px">'+(stars>=8?'You listened, you complimented, you countered near the fair price. The vendors respect you and your numbers survived contact with real haggling.':(stars>=5?'Solid dance. Tip: counter close to the fair price — lowballs cost patience, not pesos.':'You paid what tourists pay — happens to everyone once. Compliment first, protest second, counter near fair. Otra vuelta.'))+'</p>';
 h+='<button class="gbtn" onclick="mkStart(MERCADOS.indexOf(MK.m))">Otra vuelta al mercado →</button>';
 h+='<a class="gbtn ghost" style="text-decoration:none;text-align:center" href="countries.html#'+MK.m.key+'">'+MK.m.flag+' Visit this country in El Atlas</a>';
 h+='<button class="gbtn ghost" onclick="home()">Back to the plaza</button>';
 h+='<div class="spot" style="margin-top:12px;text-align:left">✨ '+esc(MK.m.fact)+'</div>';
 h+='</div>';
 app.innerHTML=h;window.scrollTo(0,0);
}
home();
</script>
</body>
</html>
