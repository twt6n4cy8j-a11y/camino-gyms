<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>El Café · El Camino Grande</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--cobalt:#2456a6;--cobalt2:#1c4488;--saffron:#e8a33d;--plaster:#faf3ea;--card:#fffdf7;--ink:#33202e;--ink2:#5c4a55;--mut:#9b8a93;--line:#e8dccb;--green:#2f8a5b;--plum:#54306b;--brew:#6b4226}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito Sans',sans-serif;background:var(--plaster);color:var(--ink);min-height:100vh}
#app{max-width:560px;margin:0 auto;padding:14px 14px 90px}
.nav{display:flex;gap:14px;padding:6px 2px 14px;font-size:13px;font-weight:800;color:var(--mut)}
.nav a{cursor:pointer;color:var(--cobalt);text-decoration:none}
h1,h2{font-family:'Fraunces',serif}
.hero{background:linear-gradient(140deg,var(--brew),#4a2c17);border-radius:22px;padding:22px 20px;color:#fff8ef;margin-bottom:16px}
.hero .htop{font-size:11px;letter-spacing:.18em;font-weight:800;opacity:.78;text-transform:uppercase}
.hero h1{font-size:26px;margin:4px 0 6px}
.hero p{font-size:14px;opacity:.94;line-height:1.5}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px -5px rgba(51,32,46,.15)}
.card:active{transform:scale(.98)}
.card .em{font-size:26px}
.card b{font-family:'Fraunces',serif;font-size:15.5px}
.cmeta{font-size:12px;color:var(--mut);font-weight:700;margin-top:2px}
.badge{display:inline-block;background:#e4ecf9;color:var(--cobalt);border-radius:99px;padding:2px 9px;font-size:11px;font-weight:800;margin-right:5px}
.gcard{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 3px 14px -6px rgba(51,32,46,.18)}
.famhead{display:flex;align-items:center;gap:10px;margin:2px 0 14px}
.famhead h1{font-size:20px;flex:1}
.quit{background:none;border:1.5px solid var(--line);border-radius:99px;padding:6px 13px;font-weight:800;font-size:12.5px;cursor:pointer;color:var(--ink2);font-family:'Nunito Sans',sans-serif}
.spot{background:#fdf6e3;border:1.5px solid #ecd9a8;border-radius:14px;padding:11px 14px;font-size:13.5px;line-height:1.65;color:#5c4a22;margin-bottom:12px}
.spot b{color:#8a6d1f}
.q{padding:10px 4px;border-bottom:1px dashed var(--line);cursor:pointer}
.q .es{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.q .es span{flex:1}
.qx{display:none;padding:6px 4px 4px;font-size:13px;color:var(--ink2);line-height:1.6}
.qx.on{display:block}
.qx .fu{color:var(--plum);font-weight:700}
.say{background:none;border:1.5px solid var(--line);border-radius:99px;padding:3px 9px;cursor:pointer;font-size:13px}
.gbtn{display:block;width:100%;background:linear-gradient(140deg,var(--cobalt),var(--cobalt2));color:#fff;border:none;border-radius:14px;padding:12px;font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:14.5px;cursor:pointer;margin-top:10px}
.gbtn.ghost{background:none;border:1.5px solid var(--line);color:var(--ink2)}
.bigq{background:linear-gradient(150deg,#fffdf7,#fdf3e0);border:2px solid var(--saffron);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:12px;min-height:170px;display:flex;flex-direction:column;justify-content:center}
.bigq .bes{font-family:'Fraunces',serif;font-size:23px;line-height:1.35}
.bigq .ben{font-size:13px;color:var(--mut);margin-top:10px}
.tnote{margin-top:10px;background:#f3eef8;border:1.5px solid #ddcfe9;border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.6;color:#4a3a56}
.legal{font-size:11.5px;color:var(--mut);line-height:1.6;margin:22px 4px;text-align:center}

/* La Sobremesa tokens */
:root{
  --ink:#33202e;--ink2:#5c4759;--mut:#8a7386;
  --plaster:#faf3ea;--plaster2:#f3e6d7;--card:#fffdf9;
  --cobalt:#2456a6;--cobalt2:#1a4488;
  --saffron:#e8a33d;--saffron2:#d98c1f;--sunhi:#ffd88a;
  --green:#2f8a5b;--greenbg:#e5f5ec;--red:#c8503f;--redbg:#fcebe7;--sky:#eaf1fb;
  --shadow:0 1px 2px rgba(51,32,46,.05),0 10px 30px -12px rgba(51,32,46,.18);
  --shadow-sm:0 1px 2px rgba(51,32,46,.05),0 4px 14px -6px rgba(51,32,46,.12);
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* EL CAFÉ · the conversation deck — a pueblo of El Camino Grande
   Tables (mesas) sorted by stage-legal grammar; every question with
   audio, gloss, and a suggested follow-up. The house specialty: ¿Y tú? */

var MESAS=[
{id:'m1',e:'🌱',n:'Mesa 1 · Primeros pasos',lv:'Stage 1',desc:'Names, origins, and the survival kit — day-one conversation.',
 qs:[
 ['¿Cómo te llamas?','What\'s your name?','Me llamo… ¿Y tú?'],
 ['¿De dónde eres?','Where are you from?','Soy de… ¿Y tú?'],
 ['¿Cómo estás?','How are you?','Muy bien, gracias. ¿Y tú?'],
 ['¿Hablas inglés?','Do you speak English?','Un poco. ¿Hablas español?'],
 ['¿Café o té?','Coffee or tea?','¡Café, por favor! ¿Y tú?'],
 ['¿Cómo se dice “friend” en español?','How do you say "friend" in Spanish?','Se dice “amigo.” ¿Cómo se dice…?'],
 ['¿Qué es esto?','What is this?','Es un/una… (point at anything!)'],
 ['Mucho gusto. ¿Cómo se escribe tu nombre?','Nice to meet you. How is your name spelled?','Se escribe… (spell it slowly)'],
 ['¿Chocolate o vainilla?','Chocolate or vanilla?','¡Chocolate! Es delicioso.'],
 ['¿Perros o gatos?','Dogs or cats?','¡Perros! / ¡Gatos! ¿Y tú?'],
 ['¿Es tu primer día de español?','Is it your first day of Spanish?','No, es mi día número…'],
 ['¿Cuál es tu palabra favorita en español?','What\'s your favorite word in Spanish?','Mi palabra favorita es…'],
 ['¿Eres de una ciudad o de un pueblo?','Are you from a city or a town?','Soy de una ciudad. ¿Y tú?'],
 ['¿Cómo se llama tu mejor amigo?','What\'s your best friend\'s name?','Se llama… ¿Y el tuyo? (¿y tú? works too)'],
 ['¿Pizza o tacos?','Pizza or tacos?','¡Tacos, obviamente!'],
 ['Perdón, ¿dónde está el baño?','Excuse me, where is the bathroom?','(The most useful question in any language — practice it proudly.)'],
 ['¿Tu nombre es común o raro?','Is your name common or rare?','Es común/raro. Es de origen…'],
 ['¿Inglés o español — cuál es más difícil?','English or Spanish — which is harder?','El inglés es… porque… (any answer is right)'],
 ['¿Eres optimista o pesimista?','Are you an optimist or a pessimist?','Soy optimista — ¡estudio español!'],
 ['¿Cuál es tu cognado favorito?','What\'s your favorite cognate?','“Importante,” “fantástico”… (raid the miracle)']
]},
{id:'m2',e:'🎨',n:'Mesa 2 · Tu mundo',lv:'Stage 2',desc:'Ser, adjectives, numbers, days — describing your world.',
 qs:[
 ['¿Cuál es tu color favorito?','What\'s your favorite color?','Mi color favorito es el… ¿Y el tuyo?'],
 ['¿Cómo es tu casa — grande o pequeña?','What\'s your house like — big or small?','Mi casa es… y es muy…'],
 ['¿Cuál es tu día favorito de la semana?','What\'s your favorite day of the week?','Mi día favorito es el… porque…'],
 ['¿Cuál es tu número favorito?','What\'s your favorite number?','Mi número favorito es el… ¿Y el tuyo?'],
 ['¿Es tu ciudad bonita?','Is your city pretty?','Sí, es muy bonita. / No, ¡es fea pero interesante!'],
 ['¿Cuál es tu estación favorita?','What\'s your favorite season?','Mi estación favorita es el/la… ¿Y la tuya?'],
 ['¿Quién es tu artista favorito?','Who\'s your favorite artist?','Mi artista favorito/a es… Es fantástico/a.'],
 ['¿Cómo es tu familia — grande o pequeña?','Is your family big or small?','Mi familia es… Somos… personas.'],
 ['¿Cuál es tu mes favorito?','What\'s your favorite month?','Mi mes favorito es… porque es mi cumpleaños / es verano…'],
 ['¿Tu carro es nuevo o viejo?','Is your car new or old?','Mi carro es… ¡pero es un buen carro!'],
 ['¿Cuántas personas son en tu familia?','How many people are in your family?','Somos cinco: mi…, mi…'],
 ['¿Es este café bueno?','Is this coffee good?','¡Es excelente! / Es… aceptable.'],
 ['¿Tu teléfono es nuevo?','Is your phone new?','Es del año… ¡Es antiguo pero funcional!'],
 ['¿Cuál es tu animal favorito?','What\'s your favorite animal?','Mi animal favorito es el/la… Es…'],
 ['¿Eres una persona de la mañana o de la noche?','Are you a morning person or a night person?','Soy una persona de la… total.'],
 ['¿Cómo es el profesor/guía ideal?','What\'s the ideal teacher/guide like?','Es paciente, es divertido, es… (describe freely)'],
 ['¿Qué día es hoy?','What day is it today?','Hoy es… el… de…'],
 ['¿Tus zapatos son cómodos?','Are your shoes comfortable?','Sí, son muy cómodos. / No, ¡son horribles!'],
 ['¿Cuál es la fecha de tu cumpleaños?','What\'s your birthday?','Es el… de… ¿Y el tuyo?'],
 ['¿Este momento es tu clase favorita del día?','Is this moment your favorite class of the day?','¡Claro que sí! (the only correct answer)']
]},
{id:'m3',e:'🌤️',n:'Mesa 3 · Tu vida',lv:'Stage 3',desc:'Estar, tener, hay, the time, the weather — life as it is right now.',
 qs:[
 ['¿Cómo estás hoy — bien, cansado, contento?','How are you today — good, tired, happy?','Estoy… porque… ¿Y tú?'],
 ['¿Qué hora es ahora?','What time is it now?','Son las… / Es la una…'],
 ['¿Qué tiempo hace hoy?','What\'s the weather like today?','Hace… / Está nublado / Llueve.'],
 ['¿Tienes hambre?','Are you hungry?','¡Sí, tengo mucha hambre! ¿Y tú?'],
 ['¿Tienes mascotas?','Do you have pets?','Tengo un/una… Se llama…'],
 ['¿Cuántos años tienes?','How old are you?','Tengo… años. (¡Pregunta con cuidado!)'],
 ['¿Qué hay en tu mochila o en tu bolsillo?','What\'s in your backpack or pocket?','Hay un…, una…, y…'],
 ['¿Dónde está tu lugar favorito?','Where is your favorite place?','Está en… Es un lugar muy…'],
 ['¿Tienes frío o calor ahora?','Are you cold or hot right now?','Tengo… / Estoy perfecto.'],
 ['¿Hay un parque cerca de tu casa?','Is there a park near your house?','Sí, hay uno. Está a… minutos.'],
 ['¿Tienes hermanos?','Do you have siblings?','Tengo… hermanos. / Soy hijo único / hija única.'],
 ['¿Cómo está tu familia?','How is your family?','Está muy bien, gracias. ¿Y la tuya?'],
 ['¿Tienes sueño por la mañana o por la noche?','Are you sleepy in the morning or at night?','Tengo sueño por la… siempre.'],
 ['¿Qué hay en tu refrigerador ahora?','What\'s in your fridge right now?','Hay…, … y, honestamente, no mucho más.'],
 ['¿Dónde están tus llaves en este momento?','Where are your keys right now?','Están en… / ¡No tengo idea! (universal)'],
 ['¿Tienes prisa hoy?','Are you in a hurry today?','No, tengo tiempo. / Sí, ¡siempre tengo prisa!'],
 ['¿Está limpio tu escritorio?','Is your desk clean?','Está… más o menos… no.'],
 ['¿Cuántas horas hay en tu día ideal?','How many hours are in your ideal day?','Hay… horas: … para dormir y … para…'],
 ['¿Tienes razón siempre?','Are you always right?','¡Claro que tengo razón! (careful…)'],
 ['¿Hace buen tiempo en tu ciudad en general?','Is the weather generally good in your city?','En general hace… pero hoy…']
]},
{id:'m4',e:'💛',n:'Mesa 4 · Tus gustos',lv:'Stage 4',desc:'Gustar, food, routines, the seven questions — what you love and how you live.',
 qs:[
 ['¿Te gusta el café o el té?','Do you like coffee or tea?','Me gusta el… ¿Y a ti?'],
 ['¿Qué te gusta comer?','What do you like to eat?','Me gusta comer… ¿Y a ti?'],
 ['¿Qué música te gusta?','What music do you like?','Me gusta… (then open La Música and prove it)'],
 ['¿Te gusta bailar?','Do you like to dance?','¡Me encanta! / No me gusta… pero bailo.'],
 ['¿Cuál es tu comida favorita?','What\'s your favorite food?','Mi comida favorita es… ¿Y la tuya?'],
 ['¿Qué haces por la mañana?','What do you do in the morning?','Primero…, luego…, después…'],
 ['¿Por qué estudias español?','Why do you study Spanish?','Porque… (the question behind everything)'],
 ['¿Te gustan los lunes?','Do you like Mondays?','No me gustan los lunes. (solidarity)'],
 ['¿Qué comes en un día normal?','What do you eat on a normal day?','Por la mañana como…, al mediodía…'],
 ['¿Siempre tomas café o a veces?','Do you always drink coffee, or sometimes?','Siempre / A veces / Nunca — pero hoy sí.'],
 ['¿Qué te gusta de tu ciudad?','What do you like about your city?','Me gusta… pero no me gusta…'],
 ['¿Te gustan las películas de terror?','Do you like horror movies?','¡Me encantan! / ¡No! ¿Por qué existen?'],
 ['¿Cocinas? ¿Qué cocinas?','Do you cook? What do you cook?','Cocino… (then visit La Cocina and level up)'],
 ['¿Cuándo estudias español — por la mañana o por la noche?','When do you study Spanish?','Estudio por la… todos los días. (ideally)'],
 ['¿Qué no te gusta comer?','What do you NOT like to eat?','No me gusta el/la… para nada.'],
 ['¿Quién cocina en tu casa?','Who cooks in your house?','Cocina mi… / Cocino yo. / Cocina nadie: pedimos pizza.'],
 ['¿Te gusta tu trabajo?','Do you like your job?','Me gusta porque… / Es… complicado.'],
 ['¿Qué haces los domingos?','What do you do on Sundays?','Los domingos… y no hago nada más.'],
 ['¿Te gustan las sorpresas?','Do you like surprises?','¡Me encantan! / No — me gusta el orden.'],
 ['¿Cómo se dice tu plato favorito en español?','How do you say your favorite dish in Spanish?','Se dice… (look it up together — real vocab)']
]},
{id:'m5',e:'🌅',n:'Mesa 5 · Más adelante',lv:'Stage 5+',desc:'Plans, dreams, and stories — questions from the road ahead. Peek, don\'t worry.',
 ahead:true,
 qs:[
 ['¿Qué vas a hacer este fin de semana?','What are you going to do this weekend?','Voy a… (Stage 5 grammar — La Habana teaches it)'],
 ['¿Adónde quieres viajar?','Where do you want to travel?','Quiero viajar a… porque…'],
 ['¿Qué vas a comer hoy?','What are you going to eat today?','Voy a comer…'],
 ['¿Cuál es tu sueño?','What\'s your dream?','Mi sueño es… (infinitives welcome)'],
 ['¿Qué hiciste ayer?','What did you do yesterday?','Ayer… (Stage 7 unlocks the snapshot past)'],
 ['¿Cómo era tu escuela?','What was your school like?','Era… (Stage 6 unlocks the-way-things-were)'],
 ['¿Qué harías con un millón de dólares?','What would you do with a million dollars?','(Stage 10 territory — dream freely)'],
 ['¿Qué consejo le das a un nuevo estudiante de español?','What advice do you give a new Spanish student?','(One day you\'ll answer this as the héroe)']
]}
];

/* ---------- voice ---------- */
var VOICE=null;
function esVoices(){try{return speechSynthesis.getVoices().filter(function(v){return /^es/i.test(v.lang);});}catch(e){return [];}}
function vScore(v){var s=0;if(/enhanced|premium|natural/i.test(v.name))s+=40;if(/es[-_](MX|US|419)/i.test(v.lang))s+=8;return s;}
function spk(t,rate){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);if(!VOICE){var vs=esVoices();vs.sort(function(a,b){return vScore(b)-vScore(a);});VOICE=vs[0]||null;}if(VOICE)u.voice=VOICE;u.lang=(VOICE&&VOICE.lang)||'es-MX';u.rate=rate||0.88;speechSynthesis.speak(u);}catch(e){}}
try{speechSynthesis.onvoiceschanged=function(){VOICE=null;}}catch(e){}
function cls(){try{return localStorage.getItem('cg_mode')==='class';}catch(e){return false;}}
function mochFeed(q,a,why){
 try{
  var o=JSON.parse(localStorage.getItem('cg_moch'))||{};
  var k=(q||'').slice(0,60);if(!k)return;
  o[k]={q:q,a:a,why:why||'',src:'cafe',due:Math.floor(Date.now()/864e5),iv:0};
  localStorage.setItem('cg_moch',JSON.stringify(o));
 }catch(e){}
}
function cfPack(mi,qi,btn){
 var q=MESAS[mi].qs[qi];
 mochFeed('Answer aloud: '+q[0],q[1],'↩ '+q[2]);
 if(btn){btn.textContent='✓ packed';btn.disabled=true;}
}

var app=document.getElementById('app'),RD=null;
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var x=a[i];a[i]=a[j];a[j]=x;}return a;}
function nav(){return '<div class="nav"><a onclick="home()">☕ El Café</a><a href="/">🗺️ El Camino</a></div>';}
function home(){
 var total=MESAS.reduce(function(n,m){return n+m.qs.length;},0);
 var h=nav();
 h+='<div class="hero"><div class="htop">EL CAMINO GRANDE · UN PUEBLO</div><h1>El Café</h1><p>'+total+' conversation starters, sorted by what you can already say. Pull up a chair — this is where the language stops being homework and starts being talk.</p></div>';
 h+='<div class="spot"><b>La sobremesa:</b> Spanish has a word English lacks — the long, unhurried conversation that stays at the table after the meal is done. It\'s the heart of the culture, and it\'s why this whole platform\'s design system carries the name. This café is where you train for it.</div>';
 h+='<div class="spot" style="background:#f3eef8;border-color:#ddcfe9;color:#4a3a56"><b style="color:#54306b">The house specialty — ¿Y tú?:</b> the sacred return question. Every answer you give comes back with ¿Y tú? (and you?) — it\'s how two sentences become a conversation. Every follow-up on every card practices it.</div>';
 h+='<div class="gcard" style="padding:12px 15px;cursor:pointer;border:2px solid var(--saffron);background:#fffaf0" onclick="rondaStart()"><b style="font-family:Fraunces,serif;font-size:15.5px">🎲 La Ronda — draw a card</b><div class="cmeta">Random questions from the tables you choose — for class, exchanges, or talking to the mirror</div></div>';
 MESAS.forEach(function(m,i){
  h+='<div class="card" onclick="mesaView('+i+')"><span class="em">'+m.e+'</span><div style="flex:1"><b>'+esc(m.n)+'</b><div class="cmeta"><span class="badge">'+m.lv+'</span>'+esc(m.desc)+'</div></div><span style="color:var(--mut)">'+(m.ahead?'🔭':'›')+'</span></div>';
 });
 if(cls())h+='<div class="tnote">🧭 <b>Guide note:</b> El Café powers two moments of La Clase — movement 4 (La Práctica: student draws with La Ronda and answers aloud) and movement 5 (La Despedida: close every class with two cards from the current mesa). House rule worth enforcing: no answer ends without ¿Y tú? — make them ask YOU back, then answer honestly. Your answers are the input.</div>';
 h+='<div class="legal">El Café is free, outside any paywall, always. Best served with actual coffee.</div>';
 app.innerHTML=h;window.scrollTo(0,0);
}
function mesaView(i){
 var m=MESAS[i];
 var h=nav()+'<div class="famhead"><button class="quit" onclick="home()">← El Café</button><h1>'+m.e+' '+esc(m.n)+'</h1></div>';
 h+='<div class="gcard"><div class="cmeta" style="margin-bottom:8px"><span class="badge">'+m.lv+'</span>'+esc(m.desc)+'</div>';
 if(m.ahead)h+='<div class="spot">🔭 These use grammar from stages ahead — peek to see where the road leads, and don\'t worry if the verbs look strange yet. They won\'t forever.</div>';
 h+='<div class="cmeta" style="margin-bottom:4px">Tap a question for the gloss and the follow-up.</div>';
 m.qs.forEach(function(q,j){
  h+='<div class="q" onclick="var x=document.getElementById(\'x'+j+'\');x.classList.toggle(\'on\')"><div class="es"><span>'+esc(q[0])+'</span><button class="say" onclick="event.stopPropagation();spk(MESAS['+i+'].qs['+j+'][0],0.6)">🐢</button><button class="say" onclick="event.stopPropagation();spk(MESAS['+i+'].qs['+j+'][0])">🔊</button></div></div>';
  h+='<div class="qx" id="x'+j+'">'+esc(q[1])+'<br><span class="fu">↩ '+esc(q[2])+'</span> <button class="say" onclick="event.stopPropagation();cfPack('+i+','+j+',this)">🎒 pack it</button></div>';
 });
 h+='<button class="gbtn" onclick="rondaStart('+i+')">🎲 La Ronda with this table →</button></div>';
 app.innerHTML=h;window.scrollTo(0,0);
}
function rondaStart(mi){
 var pool=[];
 if(mi===undefined){MESAS.forEach(function(m,i){if(!m.ahead)m.qs.forEach(function(q){pool.push({q:q,m:m});});});}
 else MESAS[mi].qs.forEach(function(q){pool.push({q:q,m:MESAS[mi]});});
 RD={pool:shuffle(pool),i:0};
 rondaCard();
}
function rondaCard(){
 if(RD.i>=RD.pool.length)RD={pool:shuffle(RD.pool),i:0};
 var c=RD.pool[RD.i];
 var h=nav()+'<div class="famhead"><button class="quit" onclick="home()">✕ Exit</button><h1>🎲 La Ronda</h1></div>';
 h+='<div class="bigq"><div class="cmeta" style="margin-bottom:8px">'+c.m.e+' '+esc(c.m.lv)+' · card '+(RD.i+1)+'</div><div class="bes">'+esc(c.q[0])+'</div><div class="ben" id="ben" style="display:none">'+esc(c.q[1])+'<br><span style="color:var(--plum);font-weight:700">↩ '+esc(c.q[2])+'</span></div></div>';
 h+='<div style="display:flex;gap:8px"><button class="gbtn ghost" style="flex:1;margin-top:0" onclick="spk(RD.pool[RD.i].q[0],0.6)">🐢</button><button class="gbtn ghost" style="flex:1;margin-top:0" onclick="spk(RD.pool[RD.i].q[0])">🔊</button><button class="gbtn ghost" style="flex:1;margin-top:0" onclick="document.getElementById(\'ben\').style.display=\'block\'">👁 Gloss</button></div>';
 h+='<button class="gbtn" onclick="RD.i++;rondaCard()">Answer it out loud, then → next card</button>';
 h+='<div class="cmeta" style="text-align:center;margin-top:10px">House rule: end every answer with ¿Y tú?</div>';
 app.innerHTML=h;window.scrollTo(0,0);
}
home();
</script>
</body>
</html>
